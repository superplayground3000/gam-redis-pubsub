# Active QoS profile. Selects which connect config pair is mounted
# (files/connect/<profile>-forward.yaml + <profile>-reverse.yaml).
profile: cdc

# Prefix that the rrcs.name helper prepends to every chart-rendered
# Kubernetes resource name (this chart renders: Deployments, Services,
# ConfigMaps, Secrets, Jobs, RBAC objects, and one optional PVC). Empty string
# disables prefixing for back-compat with any existing values overrides
# that reference the unprefixed names.
#
# Length budget: keep the prefix short — the verifier-Job template enforces a
# 57-char name budget at render time (see below).
# Binding case is the harness-generated verifier Job
# (verifier-<epoch>): default "lab-" leaves ample headroom for a custom
# prefix. The verifier-Job template fails loud at render time if you exceed
# the 57-char name budget.
resourcePrefix: "lab-"

# The chart does NOT template a Namespace (design fix #3). Install with:
#   helm install rrcs ./chart -n rrcs-k8s --create-namespace

images:
  registry: ""              # prepended to every image ref. "" => use ref as-is.
  app: redis-rrcs/cdc-apps:dev   # single image for ALL Go programs (command: per workload)
  pullPolicy: IfNotPresent  # global default; public images need this on kind.
  pullSecrets: []           # list of { name: <secret-name> }

# Extra labels merged into spec.template.metadata.labels of EVERY workload
# (all Deployments + the nats-init / verifier Jobs). The mandatory `app`
# label is always added by the chart and cannot be overridden here — the
# per-workload selector pins it and selectors are immutable after install.
# Add team/owner/cost-center/etc. labels for policy, billing, or NetworkPolicy
# selection. Block style keeps it easy to hand-edit:
#   podLabels:
#     team: payments
#     app.kubernetes.io/part-of: rrcs
podLabels: {}

redis:
  image: redis:7.4-alpine          # used only in bundled mode
  # Bundled redis-central / redis-region boot with --protected-mode no so the
  # in-cluster writer/verifier/connect clients can reach them without an ACL
  # password (these are throwaway lab Redises on a private Service, never public).
  protectedMode: "no"
  central:
    mode: standalone               # bundled topology: standalone | cluster
                                   #   standalone → single-node Deployment (default)
                                   #   cluster    → minimal 3-master / 0-replica Redis Cluster
                                   # ignored when external.enabled=true
    external:
      enabled: false
      url: ""                      # required when enabled, e.g. "redis://redis.prod:6379"
      cluster: false               # route to url with a ClusterClient; requires enabled: true
      authSecret: ""               # RESERVED — v1 does NOT consume it (see spec §2 non-goals)
  region:
    mode: standalone               # bundled topology: standalone | cluster (see central)
    external:
      enabled: false
      url: ""
      cluster: false               # route to url with a ClusterClient; requires enabled: true
      authSecret: ""               # RESERVED — v1 does NOT consume it

nats:
  external:
    enabled: false                # bundled (default) → chart deploys NATS + mints creds
    url: ""                       # required when enabled, e.g. "nats://nats.prod.example.com:4222"
    monitorUrl: ""                # optional; "" → verifier skips JetStream pending checks during quiescence
    auth:
      publisherSecret: ""         # pre-created Secret name, key: user.creds
      subscriberSecret: ""
      adminSecret: ""             # optional; "" → harness purge is skipped with warning
  # ── bundled-mode config below; ignored when external.enabled=true ──
  image: nats:2.10-alpine
  clientPort: 4222
  monitorPort: 8222
  stream:
    name: KV_CDC
    subjectPrefix: "kv.cdc"
    # Second subject segment that ALL normal CDC traffic moves under when set.
    # Empty (default) = today's layout, byte-identical render.
    #
    # Why it exists: on external PROD NATS the stream's subject prefix is FIXED at
    # kv.cdc and cannot be widened, so a shared-stream DLQ cannot live at a sibling
    # root like dlq.cdc.> (that subject is unbindable on the fixed stream). Instead,
    # normal and DLQ traffic are separated by the SECOND segment under the fixed
    # prefix: normal at <subjectPrefix>.<normalSegment>.>, DLQ at
    # <subjectPrefix>.<connect.deadLetter.segment>.> (see connect.deadLetter.segment).
    # The stream keeps binding the superset <subjectPrefix>.> so the external stream
    # binding never has to change.
    #
    # When set, publishes become <subjectPrefix>.<normalSegment>.<op> (or
    # <subjectPrefix>.<normalSegment>.<kv_prefix>.<op> under prefix-routing / sharding)
    # and every derived sink filter shifts under the segment too — one global rule,
    # no per-mode taxonomy fork.
    #
    # Migration from an existing install is TWO-PHASE and zero-loss: set this together
    # with nats.stream.consumer.migrationFilter first (phase A), then move the DLQ
    # in-prefix in a second upgrade (phase B). See
    # docs/superpowers/plans/2026-07-20-shared-prefix-subject-layout.md §6.
    #
    # Grammar: a single subject token [A-Za-z0-9_-]+ (no dots, no wildcards). Must
    # differ from connect.deadLetter.segment (the render fails otherwise — guard N1).
    normalSegment: ""
    consumer:
      durable: "cdc_sink"
      # Server-side pull-consumer settings. In pull(bind) mode Redpanda
      # Connect ignores deliver/ack_wait/max_ack_pending in the input YAML and
      # uses whatever the durable was created with — so these live here and are
      # applied by the nats-init Job's `nats consumer add` (and by the manual
      # scripts/create-consumer.sh).
      ackWait: "30s"        # redelivery timeout if the sink hasn't acked. COUPLING:
                            # the CDCUnprocessableMessages alert window in
                            # files/prometheus/cdc-alerts.yaml must stay >= 2x this.
                            # If you raise ackWait, raise that window too.
      maxAckPending: 1024    # max un-acked msgs in flight (sink throughput knob)
      maxDeliver: -1         # -1 = redeliver forever until acked
      # Migration-only override: when set (e.g. "kv.cdc.>") it REPLACES the
      # synthesized whole-stream/default group's consumer filter for the duration of a
      # segment-layout migration (nats.stream.normalSegment). Empty (default) = no
      # override.
      #
      # Why a replacement and not a union: narrowing the durable's filter from kv.cdc.>
      # straight to kv.cdc.<normalSegment>.> would silently skip any message still
      # retained on an old bare kv.cdc.<op> subject = at-least-once loss. The op space
      # is OPEN, so an enumerated filter list cannot cover it, and JetStream forbids
      # overlapping filter_subjects (so [kv.cdc.aio.>, kv.cdc.>] is not a valid union).
      # A single superset wildcard held across phase A keeps matching BOTH old and new
      # subjects; phase B clears it and the filter narrows once the backlog is drained.
      #
      # EXTERNAL NATS: the bundled init job never edits user-owned durables — it only
      # ASSERTS the desired filter (which incorporates this value). The operator edits
      # the durable's filter first (nats consumer edit KV_CDC cdc_sink --filter ...),
      # then runs the helm upgrade. See the plan §6. Must NOT be combined with an
      # in-prefix DLQ (connect.deadLetter.segment + enabled) — the render fails (N6).
      migrationFilter: ""
    maxAge: "1h"
    maxBytes: "256MB"
    maxMsgSize: "1MB"
    dupeWindow: "5m"
  # ── Topology drift manifest (multi-env drift gate, design §7 / E6) ────────────
  # Cross-release safety net for the shared PROD stream. Each helm release renders
  # independently, so no render-time guard can see across releases — but if the
  # PUBLISHER's shard count N (or normalSegment / prefixes) drifts from a SINK
  # env's, that sink derives durables for a different subject set than the forward
  # publishes to, and the mismatched events park unconsumed until the 72h stream
  # max-age SILENTLY discards them (a VF-16 at-least-once loss no metric catches).
  #
  # When enabled:
  #   - a PUBLISHER-shaped release (connect.source.enabled) writes the resolved
  #     taxonomy JSON {schema,normalSegment,families,prefixes} to NATS KV bucket
  #     cdc_topology, key "current", on every nats-init run;
  #   - a SINK-shaped release (any enabled sinkGroup) reads that key at init time
  #     and compares the fields that affect ITS filters — normalSegment always,
  #     families+N when it is sharded, prefixes when it has a prefixed group.
  #     MISMATCH => the init fails closed (the release is blocked). UNREADABLE
  #     (bucket/key missing or no grant) => fail closed on a NEW env's first
  #     install, but fail OPEN with a loud CDCTopologyManifestUnverified log banner
  #     + a best-effort cdc_topology/_unverified_<env> marker on a REDEPLOY, so an
  #     emergency rollback is never blocked on the manifest bucket.
  #
  # Grant: needs a user-provisioned NATS KV bucket cdc_topology and the
  # $KV.cdc_topology.> permission on the publisher (put) and subscriber (get) creds
  # — gen-nats-auth.sh must mint it. In bundled mode the init CREATES the bucket if
  # absent; on an EXTERNAL NATS the bucket must be pre-provisioned (the init fails
  # loud with instructions if it is missing — the chart never creates buckets on a
  # user-owned NATS).
  #
  # F2 ROLLOUT RULE (design §16): before ANY publisher-taxonomy change (P3) may
  # roll, this manifest MUST be live and EVERY sink release already registered on
  # it (i.e. each sink has done at least one verified deploy). Turning it off
  # reintroduces the silent-drift risk — do NOT disable it while a taxonomy change
  # is mid-rollout. Default false keeps the init jobs byte-identical (INV-3).
  topologyManifest:
    enabled: false
    # F2 taxonomy-change escape hatch (design §16 / F2). Default false.
    #
    # A sharded PUBLISHER owns the publish taxonomy (sharding families + N,
    # normalSegment, sinkGroup prefixes). When it re-runs with a DIFFERENT taxonomy
    # than the manifest already records, the init job BLOCKS the manifest overwrite
    # (fail closed): shifting the taxonomy re-points the published subjects, and any
    # sink release still filtering the OLD subjects would silently lose every event
    # on a changed subject until the 72h stream max-age (VF-16). First publisher
    # deploy (no manifest yet) is never blocked — there is nothing to break.
    #
    # Set true ONLY after you have rolled EVERY sink release onto the new taxonomy
    # and confirmed each is registered on the manifest — then this run overwrites
    # cdc_topology/current with the new taxonomy. Leave it false again afterwards.
    # Inert unless enabled=true (with the manifest off the F2 rule rests entirely on
    # the operator following the rollout runbook). Never touched by legacy (empty
    # taxonomy) publishers — the guard only compares when shardingEnabled.
    allowTaxonomyChange: false
  persistence:
    mode: emptyDir
    size: 4Gi
    storageClassName: ""
  auth:                            # bundled-mode rendered creds Secrets + in-pod mount paths
    secrets:
      publisher: publisher-creds
      subscriber: subscriber-creds
      admin: admin-creds
    creds:
      publisher: /etc/nats-creds/publisher/user.creds
      subscriber: /etc/nats-creds/subscriber/user.creds
      admin: /etc/nats-creds/admin/user.creds

natsBox:
  image: natsio/nats-box:0.14.5

# Each connect leg runs in streams mode (empty boot) with an elector sidecar.
# replicas>1 gives active/standby HA: only the Lease holder POSTs the leg's
# pipeline; standbys idle. One Lease + stream id + ServiceAccount per leg.
connect:
  # ── Environment id (multi-env sink scoping) ──────────────────────────────────
  # The single per-release identity that lets MANY downstream sink environments
  # share ONE JetStream stream without colliding. Default "" keeps the render
  # byte-identical to the legacy single-env chart in every dimension at once, so
  # leaving it unset changes nothing.
  #
  # What it feeds (all derived from this one knob):
  #   - Durable base: cdc_sink -> cdc_sink_<envId>; per-group cdc_sink_<envId>_<name>;
  #     per-shard cdc_sink_<envId>_<fam>_s<K>. A durable IS a per-consumer ack floor,
  #     so two envs on the SAME durable name would SHARE one floor and split delivery
  #     (each sees only part of the stream) instead of each getting a full copy.
  #     env-scoping the durable is what makes native JetStream fan-out give every env
  #     its own complete copy.
  #   - DLQ subject: <dlqRoot>.<envId>.<reason> (kv.cdc.dlq.<envId>.<reason> in
  #     segment mode) and DLQ msg-id: dlq.<envId>.<event_id> — so each env parks
  #     poison on its own lane and its own dedup key (msg-id dedup is stream-wide, so
  #     without the env segment one env's park would dedup-swallow another's).
  #   - resourcePrefix: when resourcePrefix is left empty it defaults to "<envId>-"
  #     (an explicit resourcePrefix always wins).
  #   - Prometheus `env` label on the connect legs' scraped metrics (via the
  #     ServiceMonitor), for per-env dashboards and alert routing.
  #
  # Grammar (validated fail-loud at render): a DNS-1123 label
  # ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$ — lowercase letters, digits and dashes only; no
  # underscores, no dots, no uppercase, no leading/trailing dash — and at most 16
  # chars. The grammar is not cosmetic: envId is concatenated into Kubernetes names
  # (an underscore or uppercase renders fine but fails `kubectl apply`) and it is the
  # token alerts extract back out of the durable name cdc_sink_<envId>_<fam>_s<K>
  # (an underscore or an _s<digits> run would make that extraction ambiguous). The
  # 16-char cap keeps the longest derived durable within its 64-char budget.
  #
  # IMMUTABLE for a release's life. Renaming envId does NOT rename the existing
  # durable — it mints a NEW durable that starts from a fresh ack floor (a
  # --deliver-all replay burst), orphans the old durable (which keeps accruing
  # num_pending), AND moves the DLQ lane, stranding any poison already parked on the
  # old one. Same hazard class as changing the source consumer id (INV-1 row 2): if
  # you must re-identify an env, plan a durable split/re-adopt, never a live rename.
  envId: ""
  image: hpdevelop/connect:4.92.0-claudefix
  # Wire format for the CDC body carried inside the NATS envelope. Only the FORWARD
  # (source) leg honors this; the REVERSE (sink) leg auto-detects per message via the
  # envelope's "enc" field, so it always consumes BOTH formats.
  #   "none"        — legacy plain body (content().string()). UTF-8 only: binary or
  #                   invalid-UTF-8 values are bloated and silently corrupted (U+FFFD).
  #   "gzip:base64" — body is gzip-compressed then base64-encoded: binary-safe,
  #                   lossless, and smaller for compressible payloads.
  #
  # Default is "none" so a chart upgrade is BACKWARD-SAFE by default (the wire format
  # does not change until you opt in). This is a wire-format change, so the READER must
  # understand the new format before the WRITER produces it — upgrade in two steps:
  #   1. helm upgrade (bodyEncoding stays "none") and roll BOTH legs. The sink becomes
  #      decode-capable while the source still emits plain bodies — safe in any order.
  #   2. set bodyEncoding="gzip:base64" and roll ONLY the source leg. Every sink already
  #      decodes, so no encoded body is ever produced for a sink that can't read it.
  # Fresh installs may set "gzip:base64" directly (both legs start new together).
  bodyEncoding: "none"
  # Debug-only: dump full Redis stream + NATS message content on both CDC legs
  # (forward: redis_in/nats_out; reverse: nats_in/redis_apply). OFF by default —
  # the dumped body is real application data (exposure risk) and it logs one line
  # per message (high volume). Enable only for transient data-flow debugging.
  contentLog:
    enabled: false
    level: INFO   # level for the content dump when enabled (e.g. INFO / DEBUG)
  # ── Dead-letter queue (opt-in) ───────────────────────────────────────────────
  # This lets the sink leg "park" a message it can NEVER apply — instead of
  # nacking it and redelivering forever — by publishing it to a dead-letter
  # subject on the SAME JetStream stream and then acking (write-then-ack).
  #
  # Why this exists:
  # - A poison message (one that fails on every attempt) with the at-least-once
  #   settings this chart requires (maxDeliver: -1 = redeliver forever) never
  #   leaves the consumer. Because the sink applies with max_ack_pending small
  #   and in delivery order, that one stuck message head-of-line-blocks the ack
  #   floor: nothing behind it can advance, and the whole shard/consumer stalls.
  # - The three poison reasons the sink recognises today are decode_error (the
  #   gzip:base64 body will not decode), unknown_op (an op the pipeline has no
  #   branch for), and hash_decode_error (a hash payload that will not parse).
  #   These are permanent by nature — retrying them forever cannot help, so the
  #   safe move is to set them aside for a human and keep the pipeline flowing.
  #
  # Safe default: DISABLED. With this off the render is byte-identical to the
  # pre-DLQ chart and poison redelivers forever exactly as before — a
  # conservative default because dropping a message off the main consumer is a
  # deliberate operational choice, not something to turn on by accident. Turn it
  # on only once you have somewhere to watch the DLQ subject and a plan to drain
  # it. See chart/examples/values-dlq.yaml for a full worked example.
  #
  # Verified by: scripts/verify-dlq-e2e.sh (end-to-end: a poison message is
  # parked, the ack floor advances, and the consumer is no longer blocked) and
  # scripts/test-dlq-guard.sh (the render-time guards below).
  deadLetter:
    # Turn the DLQ on for the sink leg. Leave false unless you have read the
    # subject and credentials notes below — both can bite on an in-place upgrade.
    #
    # SHARDED SINK (subject-sharding v2): the DLQ is now supported WITH
    # connect.sharding.families (the old mutual-exclusion render error is gone,
    # design §5, E2-E4). The sharded sink (cdc-reverse-sharded.yaml) carries the
    # same park-then-ack switch output as the AIO sink: three permanent-poison
    # classes — decode_error, hash_decode_error, unknown_op — are published to the
    # DLQ lane and acked instead of nack-looping and head-of-line-blocking their
    # shard forever. Transient region-Redis errors and the sx CROSSSLOT-rename
    # fail-stop still nack (never parked). ENV-SCOPING (connect.envId, see above):
    # each env parks on its OWN lane <dlqRoot>.<envId>.<reason> with msg-id
    # dlq.<envId>.<event_id>, so two envs consuming one shared stream never dedup
    # each other's parked copies away. Parked copies also carry dlq_env + dlq_shard
    # headers (the AIO sink adds dlq_env only — it has no shard) for per-env drain
    # correlation. The hash_decode_error counter now fires on the sharded path too,
    # DLQ on or off (a pre-existing un-counted poison hole; INV-2).
    #
    # Credentials: the DLQ publishes with the subscriber creds, which must grant
    # pub on <subject>.> . The committed chart/files/nats-auth/ creds were
    # regenerated with that grant (2026-07-16), so on a FRESH install enabling
    # the DLQ is just flipping this toggle — nothing else to do.
    #
    # CAUTION for releases installed with the PRE-2026-07-16 creds: that regen
    # also rotated the operator and account identities. Redeploying these creds
    # onto such a release orphans its existing KV_CDC stream state, so plan a
    # fresh NATS (new install or namespace) or a migration rather than an
    # in-place upgrade.
    #
    # Failure mode if the grant is ever missing (creds out of sync): the DLQ
    # publish is permission-denied. This fails SAFE — the message is nacked and
    # retried, so nothing is lost — but you will see it on the dashboard as
    # "routed" climbing while "confirmed parked" stays flat. That divergence is
    # the signal to re-check the creds grant.
    enabled: false
    # Where parked messages go. There are TWO mutually-exclusive DLQ layouts:
    #
    # LEGACY out-of-prefix (this `subject` key, the default): the sink publishes
    # per-reason as <subject>.<reason> (e.g. dlq.cdc.decode_error) and the stream
    # binds <subject>.> alongside <subjectPrefix>.> to capture them all. This subject
    # MUST live OUTSIDE nats.stream.subjectPrefix (kv.cdc.*): if it overlapped, a
    # whole-stream sink consumer would re-consume its own dead letters in an endless
    # loop — so the render fails loud when the subject is not disjoint. Keep the
    # default unless you have a naming convention that also stays clear of kv.cdc.*.
    #
    # IN-PREFIX (set connect.deadLetter.segment below instead): when the stream prefix
    # is FIXED and cannot be widened (external PROD NATS), an out-of-prefix dlq.cdc.>
    # root is unbindable. In that mode you set nats.stream.normalSegment +
    # connect.deadLetter.segment so normal traffic lives at
    # <subjectPrefix>.<normalSegment>.> and the DLQ at <subjectPrefix>.<segment>.>,
    # both under the single superset binding <subjectPrefix>.>. Disjointness is then
    # enforced by the normalSegment != segment render guard (N1) rather than
    # structurally. In segment mode this `subject` key MUST stay at its default —
    # setting both layouts is a render error (guard N4), since one would be ignored.
    subject: "dlq.cdc"
    # In-prefix DLQ segment (opt-in; requires nats.stream.normalSegment). When set
    # (e.g. "dlq") the DLQ root becomes <nats.stream.subjectPrefix>.<segment> — e.g.
    # kv.cdc.dlq — so the per-reason park subject is kv.cdc.dlq.<reason> and the stream
    # binds the superset kv.cdc.> alone (no separate dlq.cdc.> root, no external stream
    # binding change). Empty (default) = legacy out-of-prefix mode using `subject`
    # above. Grammar: a single token [A-Za-z0-9_-]+; must differ from
    # nats.stream.normalSegment (guard N1). See
    # docs/superpowers/plans/2026-07-20-shared-prefix-subject-layout.md.
    segment: ""
  # ── All-in-one sink (validating preset) ──────────────────────────────────────
  # A single named switch for the topology "ONE consumer drains the entire stream
  # (kv.cdc.>, or kv.cdc.<normalSegment>.> in segment mode) and any message it can
  # never apply is parked to the DLQ (dlq.cdc.<reason> legacy, or
  # kv.cdc.<deadLetter.segment>.<reason> in segment mode, same stream) instead of
  # redelivering forever." That is already the DEFAULT single-sink shape — this preset
  # just makes the intent explicit and ASSERTS it, so a later edit cannot quietly
  # drift away from it.
  #
  # It adds no new pipeline, deployment, durable, stream, or DLQ code path. It is
  # a render-time alias that REQUIRES the all-in-one topology and fails loud on
  # any contradiction:
  # - deadLetter.enabled MUST be true (G1). All-in-one is a single whole-stream
  #   consumer, so it has ONE ack floor for every key family — the DLQ is what
  #   keeps a poison message from head-of-line-blocking the whole stream forever
  #   (see the deadLetter block above). Requiring it here (rather than forcing it
  #   on) keeps deadLetter.enabled the sole DLQ source of truth.
  # - connect.sinkGroups MUST be empty (G2). All-in-one OWNS the whole stream; any
  #   explicit prefix-routed group would re-consume subjects it already drains
  #   (double delivery).
  # - connect.sharding.families MUST be empty (G3). Sharding is the exact opposite
  #   of one-consumer-drains-all (K per-shard durables vs one whole-stream consumer);
  #   a whole-stream drainer would double-consume every shard subject. NOTE: this is
  #   NOT about DLQ support any more — the sharded sink now has its own park-then-ack
  #   DLQ (design §5); the topology conflict is what keeps all-in-one and sharding
  #   mutually exclusive.
  #
  # DLQ drain SLA: parked messages share the stream's retention (--retention
  # limits --discard old; lab default nats.stream.maxAge = 1h, PROD external NATS
  # = 72h). A parked message not drained within that window is discarded — this is
  # an accepted operational bound (owner ruling 2026-07-20), not a bug. Drain
  # dlq.cdc.> (or kv.cdc.<deadLetter.segment>.> in segment mode) within the stream
  # max-age.
  #
  # EXTERNAL NATS (the PROD case): the external nats-init variant does NOT
  # reconcile external streams — it only ASSERTS that the stream binds the
  # expected subjects and fails loud otherwise. In LEGACY out-of-prefix mode the
  # operator must add dlq.cdc.> to the external stream's subject binding before
  # enabling this, otherwise the init job fails (correctly) at install time. In
  # SEGMENT mode (nats.stream.normalSegment + connect.deadLetter.segment) the DLQ
  # lives under the already-bound superset kv.cdc.>, so NO external binding change is
  # needed — that is the whole point of the fixed-prefix layout.
  #
  # MIGRATION from a prefix-routed install (collapsing sinkGroups into all-in-one):
  # the non-sharded orphan prune deletes the per-prefix cdc_sink_<name> durables
  # UNCONDITIONALLY (no drain gate), and messages are only loss-free if every
  # un-applied message is still retained on the stream when the fresh cdc_sink
  # (--deliver all) re-scans — the stream max-age is that window. So: (1) quiesce
  # the forward leg / stop the writer, (2) wait until every per-prefix durable
  # reports num_pending=0 and num_ack_pending=0
  # (nats consumer info KV_CDC cdc_sink_<name> --json), (3) helm upgrade to
  # all-in-one, (4) verify cdc_sink's ack floor advances (expect an idempotent
  # redelivery burst), (5) resume the writer. A fresh/default install needs none
  # of this — enabling all-in-one there is rolling and byte-stable on the sink.
  #
  # Safe default: DISABLED — the render stays byte-identical to today.
  # Worked example: chart/examples/values-all-in-one.yaml.
  sinkAllInOne:
    enabled: false
  source:
    # Render the forward (source) leg at all: Deployment, headless Service, and
    # its pipeline ConfigMap. Disabling stops central→NATS propagation entirely
    # (the writer's wait-connect-source init container will also block).
    enabled: true
    # Minimum 3 for HA: one active leader + two standbys, so leadership survives
    # a node/pod loss without dropping to a single point of failure mid-failover.
    replicas: 3
    streamID: forward_leg          # streams-mode stream id the elector POSTs
    # Stable logical Redis consumer name for the forward leg. It MUST NOT be
    # pod-scoped: on ungraceful (SIGKILL) failover the incoming leader reuses this
    # name and the redis_streams input replays the dead leader's un-acked PEL
    # (backlog read from "0"), deduped downstream by Nats-Msg-Id. Set to __POD__
    # only to reproduce the pre-fix message-loss baseline.
    consumerClientId: cdc_propagator_active
    # Max concurrent un-acked NATS publishes for the forward output. Unset =>
    # the template renders its default 256 (the prod value). The failover
    # verifier lowers this (e.g. 1) so the input reads batches into its Redis PEL
    # faster than the serialized publisher can drain them — forming a
    # deterministic, catchable un-acked PEL to SIGKILL against. That only widens
    # the vulnerable window for the test; it does not change the loss mechanism.
    #
    # HARD RULE with sharding: leave this UNSET whenever connect.sharding.families
    # is configured. Sharding hard-codes max_in_flight: 1 on the forward output
    # (ordering link O-4 — serialized publish is what preserves per-key order in
    # the fence-free v2 design), and the render FAILS LOUD if a leftover value is
    # present here. That guard is deliberate: an explicit 256 would silently
    # re-parallelize publishes and reintroduce old-overwrites-new, which NO metric
    # can detect after the fact (docs/design/subject-sharding/design.md §3). The
    # render guard is exercised by scripts/test-shard-mapping.sh.
    maxInFlight:
    # Redis XREADGROUP batch size (input `limit`). 50 in prod. The failover verifier
    # raises this so the reader pulls a large chunk into its PEL that the serialized
    # publisher (maxInFlight:1) cannot drain before the SIGKILL — enlarging the genuine
    # read-but-unpublished in-flight set that an ungraceful failover strands.
    readLimit: 50
    lease:
      name: connect-source-elector # Lease object name (run through rrcs.name)
      duration: 6s
      renewDeadline: 4s
      retryPeriod: 1s
  sink:
    # Render the reverse (sink) leg: Deployment, headless Service, and its
    # pipeline ConfigMap. Disabling stops NATS→region-Redis applies; JetStream
    # retains messages (subject to stream limits) until a sink binds again.
    #
    # LEGACY SINGLE-SINK BLOCK. When connect.sinkGroups (below) is empty/unset the
    # chart synthesises exactly ONE sink group named "default" from these keys plus
    # nats.stream.consumer.* — so the default render is byte-for-byte identical to
    # the pre-multi-subject chart. These keys are ALSO the inheritance source for
    # any group that omits a field (group -> sinkDefaults -> here).
    enabled: true
    replicas: 3
    streamID: reverse_leg
    lease:
      name: connect-sink-elector
      duration: 6s
      renewDeadline: 4s
      retryPeriod: 1s
    # ── New-env bootstrap start policy (EXTERNAL NATS onboarding; design §8.4, R3) ──
    # Chooses the deliver_policy the EXTERNAL nats-init job gives a durable it CREATES
    # for this env, and — when `deliver` is non-empty — makes that job VALIDATE an
    # already-existing durable's start semantics against this choice, FAILING CLOSED on
    # a mismatch instead of blessing whatever position it happens to be at. This closes
    # the F3 gap: today the init accepts any existing consumer as "usable" without
    # inspecting deliver_policy, so a durable left from a prior `--deliver all` create
    # silently replays 72h of history even when you want a fresh go-forward env.
    #
    # ONLY the external init acts on this. The bundled nats-init (bundled NATS / labs)
    # owns and freely recreates its throwaway consumers and always creates them
    # --deliver all — a bundled disposable region Redis does not need this switch. A
    # bootstrap value set on a bundled release is therefore inert (see nats-init-job.yaml).
    #
    #   deliver:
    #     ""        LEGACY (default): create --deliver all, run NO start-semantics
    #               validation. Byte-identical to the pre-bootstrap chart. A future
    #               major may flip this default to "new".
    #     "new"     go-forward only — the durable starts at the stream head and replays
    #               NOTHING. The safe default for a NEW env that is seeded another way
    #               (or is change-tolerant). Needs the validation so a stale --deliver
    #               all durable can't be silently accepted in its place (design R3/F3).
    #     "all"     replay the whole 72h retained backlog of CHANGES (a partial history,
    #               NOT a snapshot — VF-16). Only for a snapshot-seeded or change-tolerant
    #               env. Same effect as legacy, but now explicit and validated.
    #     "by-time" start at `byStartTime` (deliver_policy=by_start_time). The strict
    #               snapshot-seed path (§8.4): snapshot the source at T0, load this env's
    #               region Redis, then start the durable at T0 so nothing before it and
    #               nothing after it is missed. See runbook-new-env-bootstrap.md.
    bootstrap:
      deliver: ""
      # RFC3339 UTC timestamp, REQUIRED iff deliver="by-time" (and rejected otherwise so
      # it can't be silently ignored). The stream position the durable starts from — set
      # it to the snapshot instant T0. Passed verbatim to `nats consumer add --deliver`.
      byStartTime: ""
      # Escape hatch for the start-semantics validation. When an existing durable's
      # deliver_policy / opt_start_time does NOT match `deliver`, the init fails closed
      # by default (the operator deletes+recreates the durable, since a durable's start
      # policy is fixed at creation and the chart never mutates a user-owned consumer).
      # Set true to DOWNGRADE that failure to a WARN and proceed with the existing
      # durable as-is — use only when you deliberately pre-created it and accept its
      # position (this is also the machinery the P6 assert-only handoff builds on).
      allowStartMismatch: false

    # ── Assert-only handoff mode (AIO→sharded per-env cutover; design §8.3, E7) ──
    # Set true ONLY during the §8.3 AIO→sharded handoff window, then turn it back
    # OFF once the handoff completes. It makes the EXTERNAL nats-init REFUSE to
    # auto-create any durable and instead ASSERT that every durable this release
    # derives already exists as deliver_policy=by_start_sequence — the position the
    # operator precreated at F0+1 (F0 = the old AIO durable's ack_floor.stream_seq,
    # the contiguous-APPLIED prefix, read at quiesce; see runbook-aio-to-sharded-
    # handoff.md). Any start_seq value is accepted (F0 is runtime-discovered, not
    # known at render time); the observed start_seq is logged for audit.
    #
    # Why a whole mode instead of create-if-absent: the ordinary external init
    # create path defaults --deliver all, so a single typo'd or missing precreate
    # would silently build a durable that replays the entire 72h backlog (VF-16)
    # the instant the old AIO durable is deleted. Assert-only exists precisely to
    # catch that mistake BEFORE traffic moves — so it fails the release loud
    # (missing durable => exit 1; wrong deliver_policy => exit 1) rather than
    # papering over it. For the same reason it does NOT honour
    # bootstrap.allowStartMismatch (an escape hatch would defeat the guard) and is
    # mutually exclusive with bootstrap.deliver (a handoff release must not also
    # declare a bootstrap start policy). It is EXTERNAL-NATS only — a bundled
    # release carrying it fails render (bundled labs recreate from scratch).
    handoffAssertOnly: false

  # ── Multi-subject sink groups (design D3) ──────────────────────────────────
  # Split the sink leg into N groups, each = (durable pull consumer × filter
  # subject × sink Deployment × Lease/elector), so key-prefix-routed messages
  # apply in parallel. EMPTY/UNSET => one implicit "default" group == the legacy
  # connect.sink.* block above (byte-identical default render).
  #
  # Each group element:
  #   name:      DNS-1123 + NATS-token safe (^[a-z0-9]([a-z0-9-]*[a-z0-9])?$).
  #              Used in every derived name (connect-sink-<name>, cdc_sink_<name>,
  #              connect-sink-<name>-elector). "default" is special: no suffix, so
  #              it reproduces today's names verbatim. Reused names fail-loud.
  #   enabled:   per-group toggle (INV-3). false => NONE of this group's objects
  #              render (Deployment/Service/pipeline CM/Lease/SA/Role/RoleBinding)
  #              and its durable is neither created nor pruned by nats-init.
  #   Routing — set at most ONE of:
  #     prefixes:      key prefixes this group owns: ONE or TWO ':'-separated
  #                    segments, each ^[a-z0-9]([a-z0-9_-]*[a-z0-9])?$ (e.g.
  #                    "prefix-a", "tg:caveat", "tg:caveat_context"). ':' is not
  #                    a legal NATS subject character, so the subject token is
  #                    the prefix with ':' -> '.': filter kv.cdc.tg.caveat.>,
  #                    publish kv.cdc.tg.caveat.<op> (union if many; turns ON
  #                    forward-leg prefix routing). Matching is set-based and
  #                    longest-first: a key matches its first-two-seg prefix,
  #                    then its first-one-seg prefix, else routes to "others".
  #                    First segments "others"/"unknown" are reserved; a one-seg
  #                    prefix overlapping a two-seg one (tg + tg:caveat) and
  #                    duplicate prefixes across enabled groups fail the render.
  #     filterSubject: explicit NATS filter subject (escape hatch, non-prefix).
  #     catchAll:      true => this group consumes kv.cdc.others.>: every event
  #                    whose key matches NO configured prefix (counted by
  #                    cdc_forward_others). At most one enabled catchAll group,
  #                    only alongside >=1 enabled prefixes group. WITHOUT a
  #                    catchAll group, unmatched events park on kv.cdc.others.<op>
  #                    and fire CDCForwardUnrouted (reason=no_match).
  #     (none)      => the group filters the whole stream kv.cdc.> (the default).
  #                    Fail-loud when any prefixes group is enabled alongside it —
  #                    a whole-stream consumer would double-receive every routed
  #                    subject. Use catchAll (or an explicit filterSubject) instead.
  #   mode:      "ha" (default) = Lease-elected single active puller per group
  #              (INV-1 row 10 held per group). "shared" (concurrent pullers) is a
  #              documented follow-up (§10.4) and currently fails-loud at render.
  #   streamID:  streams-mode id the elector POSTs (per-group unique; default
  #              "reverse_leg" for "default", else "reverse_leg_<name>").
  #   replicas / consumer.{ackWait,maxAckPending,maxDeliver} / lease.{duration,
  #   renewDeadline,retryPeriod} / resources: per-group overrides; unset keys
  #   inherit connect.sinkDefaults then the legacy connect.sink.* / consumer.*.
  #
  # INV-1: consumer.maxDeliver MUST stay -1 and ackWait finite for EVERY group
  # (per-group at-least-once). maxAckPending is a redelivery/memory bound, NOT a
  # throughput knob (the pull input keeps ~1 fetch in flight regardless — §10.1).
  #
  # NATS auth: running >1 group needs the subscriber creds to cover per-group
  # durable names. Re-run scripts/gen-nats-auth.sh --force (it now grants
  # $JS.API.CONSUMER.*.KV_CDC.* wildcard) and commit chart/files/nats-auth/. The
  # default single "default"/cdc_sink install works on the existing grant.
  #
  # Example — first-two-segment routing for the tg:* key families
  # (docs/requests/first-two-seg-routing.md), plus the others catch-all:
  #   sinkGroups:
  #     - { name: caveat,         prefixes: ["tg:caveat"] }
  #     - { name: caveat-context, prefixes: ["tg:caveat_context"] }
  #     - { name: g2m,            prefixes: ["tg:g2m"] }
  #     - { name: m2g,            prefixes: ["tg:m2g"] }
  #     - { name: r2g,            prefixes: ["tg:r2g"] }
  #     - { name: uint32id,       prefixes: ["tg:uint32id"] }
  #     - { name: others,         catchAll: true }
  # Durables become cdc_sink_caveat ... cdc_sink_others; a key like
  # tg:caveat:123 publishes to kv.cdc.tg.caveat.<op>; any other key (e.g.
  # tg:new_family:1) flows to kv.cdc.others.<op> via the others group.
  #
  #   Sharding — instead of a prefix, a group may claim SHARDS of a family that
  #   is declared under connect.sharding below (full design:
  #   docs/design/subject-sharding/design.md; worked example:
  #   chart/examples/values-sharding.yaml):
  #     shardsOf: "lp:m2g"       # family name; MUST exist in sharding.families
  #     shards: [0,1,2,3]        # claimed shard numbers; "x" = the isolation shard
  #   A shard group renders the BROKER sink variant: a single pipeline binds one
  #   durable PER claimed shard (cdc_sink_lp_m2g_s0, cdc_sink_lp_m2g_s1, ... each
  #   filtering kv.cdc.lp.m2g.s0.>, kv.cdc.lp.m2g.s1.>, ...). This is how one sink
  #   pod fans in several shard lanes at once and still applies each key in order.
  #
  #   Three parameters are hard-coded on this variant and MUST NOT be loosened —
  #   together they are the per-key ordering guarantee (design §3, ordering links
  #   O-6/O-7), and loosening any one silently reintroduces old-overwrites-new
  #   with no metric able to catch it:
  #     - broker copies: 1        (one puller per durable, never parallel)
  #     - pipeline threads: 1     (apply in delivery order)
  #     - every shard durable is created with max_ack_pending: 1 — set directly
  #       in the helper, NOT via the consumer.* inheritance chain. Because of
  #       that, putting consumer.maxAckPending on a shard group FAILS the render
  #       on purpose (it would otherwise inherit 1024 and let redeliveries jump
  #       ahead of an un-acked message).
  #
  #   Coverage rule: across all ENABLED shard groups for a family, the union of
  #   claimed shards must equal {0..N-1, "x"} exactly once — every numeric shard
  #   and the isolation shard "x" claimed, none claimed twice. The render fails
  #   loud on a gap or an overlap, so a missing shard cannot silently strand its
  #   traffic. shardsOf is exclusive with prefixes/filterSubject/catchAll on the
  #   same group — a group is either a shard owner or a prefix router, not both.
  sinkGroups: []

  # ── Per-key sharding (subject-sharding v2: strict per-key ordering) ──────────
  # Reach for this in one specific situation: a single Redis key family is too
  # busy for one sink to keep up, yet each individual entity still needs its
  # updates applied in strict order. Sharding splits that one family-wide NATS
  # lane into many shard lanes, so several sinks drain it in parallel while every
  # key stays on exactly one lane (and therefore stays ordered).
  #
  # How a key becomes a shard subject: the numeric id in the key (by default the
  # employee id inside the Redis Cluster hash tag) is taken mod N. For family
  # "lp:m2g" with shards: 32, this key:
  #   lp:m2g:active:{employee:123}
  # is published to:
  #   kv.cdc.lp.m2g.s27.<op>   # because 123 mod 32 = 27
  # The sinkGroups above must then claim those shard subjects with
  # shardsOf/shards (see chart/examples/values-sharding.yaml for the full setup).
  #
  # Empty families means sharding is OFF (the safe default). In that mode
  # keyPattern and pruneOrphans are ignored and the chart behaves exactly like
  # the normal prefix-routed chart — so leaving this untouched costs nothing.
  #
  # Trade-off you are accepting when you turn this on: to preserve order without a
  # last-write-wins fence, the forward leg is forced to publish one message at a
  # time (threads: 1, max_in_flight: 1). Sink-side sharding removes the cross-
  # region fetch bottleneck, but this serialized forward publish is a hard
  # ceiling of roughly one message per Connect→NATS round trip (~1000 msg/s when
  # NATS is co-located). If your whole-site throughput needs to exceed that, the
  # only exit is the fence-based v1 design — this is a known, documented cost, not
  # a tuning knob. Remove any connect.source.maxInFlight override before enabling
  # sharding; the render fails loud if both are set.
  #
  # Verified by: scripts/test-shard-mapping.sh (the shard math and render
  # guards), scripts/verify-sharding.sh (end-to-end apply on a kind cluster), and
  # the failover/replay proofs scripts/verify-sharding-failover.sh and
  # scripts/verify-sharding-replay.sh (order survives a mid-flight SIGKILL).
  sharding:
    # Regular expression that finds the numeric id deciding a key's shard. It MUST
    # contain a named capture group called "id" — written (?P<id>...) — because
    # only that captured number is fed to the shard math (id mod N).
    #
    # The default pattern reads ids from Redis Cluster hash tags like
    # "{employee:123}". Pulling the id from a STABLE hash tag is what makes
    # sharding correct: every key variant for the same entity (active/standby,
    # different sub-keys) contains the same tag, so they all hash to the same
    # shard and their updates stay ordered relative to each other. Choose an id
    # that is fixed for the life of the entity — if the captured value can change,
    # a key can migrate between shards and lose its ordering guarantee.
    #
    # Failure mode for a key that belongs to a sharded family but does NOT match
    # this pattern: rather than guess a shard, the forward leg routes it to the
    # isolation shard "sx" and increments
    # cdc_forward_unrouted{reason="unparseable_shard"}. That is fail-safe only if
    # some sinkGroup claims shard "x" — otherwise those messages have no consumer.
    # Always give shard "x" an owner, and watch that counter: a rising sx rate
    # means keys are reaching the family that this pattern cannot parse.
    keyPattern: '\{employee:(?P<id>[0-9]+)\}'
    # The families to shard. Each map key is a Redis key family prefix, in the
    # same one- or two-segment format as sinkGroup prefixes ("lp" or "lp:m2g").
    # A family may have only ONE owner: do not also list it under any
    # sinkGroup.prefixes entry, or the render fails loud on the conflict.
    #
    # shards (per family) is the count of normal numeric shards, s0 through
    # s(N-1). Pick it ONCE with generous headroom for future scale, because
    # changing N later re-maps keys to different subjects — that is not a rolling
    # change: it needs the deliberate pause/drain/cutover procedure in
    # docs/design/subject-sharding/cutover.md (rehearse it with
    # scripts/sharding-cutover-drill.sh first). Over-provisioning N up front (the
    # design suggests 32) is cheap; re-sharding a live family is not.
    #
    # Every enabled sharded family must be FULLY covered by the sinkGroups above,
    # or the render fails:
    #   - each numeric shard 0..N-1 claimed exactly once, and
    #   - the isolation shard "x" claimed exactly once.
    # Example (pair this with the shardsOf sinkGroups shown earlier):
    #   families:
    #     "lp:m2g":
    #       shards: 32
    families: {}
    # Whether nats-init is allowed to DELETE old JetStream consumers that the
    # current sinkGroups no longer describe (only meaningful while sharding is on).
    #
    # Safe default: false. With false, nats-init merely PRINTS the orphan
    # consumers it finds and leaves them alone. Keep it false for normal installs
    # and for every cutover step except the final cleanup — deleting a consumer
    # that still has undrained messages would strand them, so this defaults to
    # look-but-don't-touch.
    #
    # Set true only for the one deliberate cleanup upgrade AFTER you have
    # confirmed each old consumer is fully drained (num_pending == 0 and
    # num_ack_pending == 0 — check with `nats consumer info`). Flip it back to
    # false immediately after that upgrade so a later accidental config change
    # can never trigger a delete.
    pruneOrphans: false

  # Defaults every sinkGroup inherits when it omits a key (group -> sinkDefaults
  # -> legacy connect.sink.* / nats.stream.consumer.*). Leave empty to inherit the
  # legacy values verbatim (keeps the default render byte-identical).
  sinkDefaults: {}
    # replicas: 3
    # consumer:
    #   ackWait: "30s"
    #   maxAckPending: 1024
    #   maxDeliver: -1
    # lease:
    #   duration: 6s
    #   renewDeadline: 4s
    #   retryPeriod: 1s

elector:
  pullPolicy: ""            # "" => inherit images.pullPolicy

writer:
  enabled: true             # render the writer Deployment + Service
  pullPolicy: ""
  env:
    STREAM_MAXLEN: "100000"
    WORKERS: "8"
    PIPELINE_DEPTH: "50"
    KEY_SPACE_SIZE: "1000"
    PAYLOAD_BYTES: "200"
    MAX_RATE: "20000"
    OP_CREATE: "40"
    OP_UPDATE: "40"
    OP_DELETE: "10"
    OP_RENAME: "10"

dashboard:
  enabled: true             # render the live dashboard Deployment + Service
  pullPolicy: ""            # "" => inherit images.pullPolicy

# ServiceAccounts + Roles + RoleBindings for the elector sidecars. Disable only
# if you pre-create equivalents out-of-band (or both connect legs are disabled):
# the connect pods reference these ServiceAccounts by name and will not schedule
# without them.
rbac:
  enabled: true

verifier:
  pullPolicy: ""
  run: false           # harness renders the Job
  jobName: ""
  epoch: "run"         # harness sets a unique value per run
  rate: 5000
  durationS: 30
  warmupS: 5
  drainS: 10

latencyCalculator:
  enabled: false           # off by default, like other optional components
  pullPolicy: ""           # "" => inherit images.pullPolicy
  # Sidecar stream the sink writes to and the calculator reads. These exist even
  # when enabled=false, because the sink emits the stream unconditionally so
  # enabling the calculator later still finds data.
  stream: "cdc:latency"
  # Rate-dependent: set to at least ~2x the peak XADD rate per intervalSec so the
  # approximate MAXLEN ~ trim cannot evict entries before the calculator reads
  # them (lost samples only, never lost CDC).
  streamMaxLen: 50000
  windowSec: 60            # rolling window for percentiles
  intervalSec: 10          # report write cadence
  reportPath: /reports/latency-report.json
  persistence:
    enabled: false         # false => emptyDir at /reports; true => PVC
    size: 1Gi
    storageClass: ""

scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}

resources:
  redis:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: "2"
      memory: 512Mi
  nats:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  connect:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  elector:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 500m
      memory: 128Mi
  writer:
    requests:
      cpu: 250m
      memory: 64Mi
    limits:
      cpu: "2"
      memory: 256Mi
  verifier:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi
  dashboard:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi
  latencyCalculator:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

# Observability artifacts for an EXISTING cluster monitoring stack. The chart ships
# a Grafana dashboard, a PrometheusRule alert, and a ServiceMonitor — but NOT
# Prometheus/Grafana/Alertmanager. Opt-in: the ServiceMonitor/PrometheusRule need
# the prometheus-operator CRDs to exist, so this defaults to false.
observability:
  enabled: false
  serviceMonitor:
    interval: 15s
    labels: {}          # match the operator's serviceMonitorSelector, e.g. { release: kube-prometheus-stack }
  prometheusRule:
    labels: {}          # match the operator's ruleSelector (CRD metadata only)
  dashboard:
    folder: ""          # optional Grafana sidecar target folder
    labels: {}          # extra ConfigMap labels beyond grafana_dashboard: "1"
