# Example values for connect.sharding.*.
#
# Scenario:
#   Keys for the lp:m2g family look like lp:m2g:active:{employee:123}.
#   The employee id decides the shard, so every key variant for employee 123 is
#   delivered to the same shard and applied in order.
#
# Install example:
#   helm upgrade --install rrcs ./chart -n rrcs-k8s --create-namespace \
#     -f chart/examples/values-sharding.yaml

connect:
  # Required for sharding: leave maxInFlight unset. Sharding renders the forward
  # output with max_in_flight: 1 to keep publish order strict.
  source:
    maxInFlight:

  sharding:
    # Extract the numeric id from the hash-tag part of the key. For
    # lp:m2g:active:{employee:123}, the captured id is 123.
    keyPattern: '\{employee:(?P<id>[0-9]+)\}'

    # Shard only the lp:m2g family. With shards: 8, normal shard subjects are
    # kv.cdc.lp.m2g.s0.> through kv.cdc.lp.m2g.s7.>.
    families:
      "lp:m2g":
        shards: 8

    # Safety default. nats-init reports obsolete consumers but does not delete
    # them. Change to true only during the explicit post-drain cleanup upgrade,
    # then change it back to false.
    pruneOrphans: false

  # Each shardsOf group owns part of the family. The union must cover every
  # numeric shard exactly once and also cover isolation shard "x" exactly once.
  #
  # For a larger installation, split these ranges across more groups or more
  # replicas, but keep each shard owned by exactly one enabled group.
  sinkGroups:
    - name: m2g-a
      shardsOf: "lp:m2g"
      shards: [0, 1, 2, 3]

    - name: m2g-b
      shardsOf: "lp:m2g"
      shards: [4, 5, 6, 7]

    # The isolation shard receives keys that match lp:m2g but do not match
    # keyPattern, plus cross-shard rename events. Monitor it; it should normally
    # stay empty or near zero.
    - name: m2g-isolation
      shardsOf: "lp:m2g"
      shards: ["x"]
