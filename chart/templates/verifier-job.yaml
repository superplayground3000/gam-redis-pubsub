{{- if .Values.verifier.run }}
{{- $base := .Values.verifier.jobName | default (printf "verifier-%s" .Values.verifier.epoch) -}}
{{- $name := include "rrcs.name" (dict "root" $ "base" $base) -}}
{{- if gt (len $name) 57 -}}
{{- fail (printf "verifier Job name %q (%d chars) exceeds 57-char budget. Shorten resourcePrefix or verifier.epoch." $name (len $name)) -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}
  labels:
    app: verifier
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" "verifier") | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      containers:
        - name: verifier
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.images.app) }}
          imagePullPolicy: {{ include "rrcs.pullPolicy" (dict "root" $ "override" .Values.verifier.pullPolicy) }}
          command: ["/usr/local/bin/app", "verifier"]
          args:
            - --epoch={{ .Values.verifier.epoch }}
            - --redis-central={{ include "rrcs.redis.central.hostPort" . }}
            - --redis-region={{ include "rrcs.redis.region.hostPort" . }}
            - --redis-central-cluster={{ include "rrcs.redis.central.cluster" . }}
            - --redis-region-cluster={{ include "rrcs.redis.region.cluster" . }}
            - --nats={{ include "rrcs.nats.monitorUrl" . }}
            - --nats-stream={{ .Values.nats.stream.name }}
            - --nats-consumer={{ .Values.nats.stream.consumer.durable }}
            - --source-group=cdc_propagator
            # Must outlast the sink electors' post-election settle delay
            # (postDelay = ackWait, 30s default) plus drain: on a fresh election
            # the sink POSTs its pipeline only after postDelay, so quiescence
            # legitimately takes >30s. WaitQuiescent returns early once drained —
            # a large timeout costs nothing on passing runs.
            - --quiesce-timeout=90s
          resources:
            {{- toYaml .Values.resources.verifier | nindent 12 }}
{{- end }}
