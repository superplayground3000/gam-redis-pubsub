{{- if .Values.observability.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect") }}
  labels:
    app: cdc-observability
    {{- with .Values.observability.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  # Namespace-scoped isolation: only this release's namespace. Selects the source
  # leg, EVERY enabled sink group's Service (connect-sink for the sole "default"
  # group, connect-sink-<name> per additional group — design D3), plus the writer
  # and latency-calculator. Each sink group's Service name becomes a distinct
  # Prometheus `job` label, so a stuck group is attributable without a per-group
  # metric label (design §8, ServiceMonitor-scrape-identity option); the $job
  # dashboard variable and `by (job)` panels break metrics out per group. Queries
  # are further scoped by namespace/job in PromQL.
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [connect-source, {{ range $g := (include "rrcs.connect.sinkGroups" $ | fromYamlArray) }}{{ if $g.enabled }}{{ $g.appLabel }}, {{ end }}{{ end }}writer, latency-calculator]
      # Release-scoped: two releases of this chart in one namespace both label
      # their Services `app: connect-source` (etc.); without this ANDed match each
      # release's ServiceMonitor would scrape BOTH releases' Services and merge
      # their series. The scoped Services carry `release: {{ "{{" }} .Release.Name {{ "}}" }}`.
      - key: release
        operator: In
        values: [{{ .Release.Name }}]
  {{- /* When connect.envId is set, stamp a static `env` label onto every series
       scraped through this ServiceMonitor (source + sink groups + writer +
       latency-calculator + elector), so Grafana's $env variable and per-env alert
       routing work off pipeline metrics directly (design §9). This is the
       "external label" route: pipeline metrics carry env via this relabeling +
       namespace/job, while the NATS-exporter A1/A6 series (durable-labelled only)
       recover env via label_replace on the durable name in a later phase. Empty
       envId emits nothing here => byte-identical. */}}
  {{- $env := include "rrcs.envId" . }}
  endpoints:
    # `http` matches connect (4195), writer (8081), latency-calculator (8082) —
    # every selected Service names its metrics port `http`.
    - port: http
      path: /metrics
      interval: {{ .Values.observability.serviceMonitor.interval }}
      {{- if ne $env "" }}
      relabelings:
        - targetLabel: env
          replacement: {{ $env | quote }}
      {{- end }}
    # `elector` exists only on the connect Services (sidecar on 8090); Services
    # without a port of this name are simply not scraped by this endpoint.
    - port: elector
      path: /metrics
      interval: {{ .Values.observability.serviceMonitor.interval }}
      {{- if ne $env "" }}
      relabelings:
        - targetLabel: env
          replacement: {{ $env | quote }}
      {{- end }}
{{- end }}
