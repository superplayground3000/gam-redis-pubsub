{{- /* One sink Deployment + headless Service per ENABLED sinkGroup (design D3).
     The sole "default" group renders name connect-sink / app connect-sink /
     durable cdc_sink / lease connect-sink-elector — byte-identical to the pre-D3
     single sink. $g fields come from the rrcs.connect.sinkGroups helper; root
     helpers/Values are reached via $ because inside `range` the dot is $g. */ -}}
{{- $first := true -}}
{{- range $g := (include "rrcs.connect.sinkGroups" $ | fromYamlArray) }}
{{- if $g.enabled }}
{{- if not $first }}
---
{{- end }}
{{- $first = false }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" $g.deployBase) }}
  labels:
    app: {{ $g.appLabel }}
    release: {{ $.Release.Name }}
spec:
  replicas: {{ $g.replicas }}
  selector:
    matchLabels:
      app: {{ $g.appLabel }}
      release: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" $g.appLabel) | nindent 8 }}
      annotations:
        # Roll the pods when any connect ConfigMap changes: the elector POSTs
        # the pipeline only when it wins the Lease, so without a rollout a
        # helm upgrade that edits the pipeline never reaches the running leg.
        checksum/connect-config: {{ include (print $.Template.BasePath "/connect-configmaps.yaml") $ | sha256sum }}
    spec:
      serviceAccountName: {{ include "rrcs.name" (dict "root" $ "base" $g.saBase) }}
      {{- include "rrcs.imagePullSecrets" $ | nindent 6 }}
      {{- include "rrcs.scheduling" $ | nindent 6 }}
      initContainers:
        - name: wait-redis-region
          image: {{ include "rrcs.image" (dict "root" $ "ref" $.Values.redis.image) }}
          imagePullPolicy: {{ $.Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - {{ include "rrcs.redis.region.waitCmd" $ }}
        - name: wait-consumer
          image: {{ include "rrcs.image" (dict "root" $ "ref" $.Values.natsBox.image) }}
          imagePullPolicy: {{ $.Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          # bind:true attaches to a pre-created pull consumer; gate on the
          # consumer (not just the stream) so the input doesn't crashloop on
          # "consumer does not exist for bind mode" before the nats-init Job
          # creates it. consumer info also implies the stream exists.
          {{- /* Sharded groups gate on EVERY shard durable: the broker input
               needs all its bind children to attach (one missing durable would
               crashloop the whole group's pipeline). */}}
          args:
            {{- if $g.sharded }}
            - for d in{{ range $c := $g.consumers }} {{ $c.durable }}{{ end }}; do until nats --server {{ include "rrcs.nats.url" $ | quote }} --creds /etc/nats-creds/subscriber/user.creds consumer info {{ $.Values.nats.stream.name }} "$d" >/dev/null 2>&1; do echo "waiting pull consumer $d"; sleep 1; done; done
            {{- else }}
            - until nats --server {{ include "rrcs.nats.url" $ | quote }} --creds /etc/nats-creds/subscriber/user.creds consumer info {{ $.Values.nats.stream.name }} {{ $g.durable }} >/dev/null 2>&1; do echo waiting pull consumer; sleep 1; done
            {{- end }}
          volumeMounts:
            - name: nats-creds
              mountPath: /etc/nats-creds/subscriber
              readOnly: true
      containers:
        - name: connect
          image: {{ include "rrcs.image" (dict "root" $ "ref" $.Values.connect.image) }}
          imagePullPolicy: {{ $.Values.images.pullPolicy }}
          # streams mode, empty boot (no stream until the elector POSTs one while leading).
          args:
            - streams
            - -o
            - /etc/connect/observability.yaml
          ports:
            - containerPort: 4195
          readinessProbe:
            # /ready returns 200 even with zero streams — a healthy standby is
            # ready yet not consuming until its elector wins the Lease.
            httpGet:
              path: /ready
              port: 4195
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /ping
              port: 4195
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          volumeMounts:
            - name: observability
              mountPath: /etc/connect/observability.yaml
              subPath: observability.yaml
            - name: nats-creds
              mountPath: /etc/nats-creds/subscriber
              readOnly: true
          resources:
            {{- toYaml $.Values.resources.connect | nindent 12 }}
        - name: elector
          image: {{ include "rrcs.image" (dict "root" $ "ref" $.Values.images.app) }}
          imagePullPolicy: {{ include "rrcs.pullPolicy" (dict "root" $ "override" $.Values.elector.pullPolicy) }}
          command: ["/sbin/tini", "--", "/usr/local/bin/app", "elector"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LEASE_NAME
              value: {{ include "rrcs.name" (dict "root" $ "base" $g.saBase) | quote }}
            - name: CONNECT_ADDR
              value: "http://localhost:4195"
            - name: STREAM_ID
              value: {{ $g.streamID | quote }}
            - name: PIPELINE_PATH
              value: /etc/elector/pipeline.yaml
            - name: HEALTH_ADDR
              value: ":8090"
            - name: LEASE_DURATION
              value: {{ $g.leaseDuration | quote }}
            - name: RENEW_DEADLINE
              value: {{ $g.renewDeadline | quote }}
            - name: RETRY_PERIOD
              value: {{ $g.retryPeriod | quote }}
          ports:
            - containerPort: 8090
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          volumeMounts:
            - name: pipeline
              mountPath: /etc/elector
              readOnly: true
          resources:
            {{- toYaml $.Values.resources.elector | nindent 12 }}
      volumes:
        - name: observability
          configMap:
            name: {{ include "rrcs.name" (dict "root" $ "base" "connect-observability") }}
        - name: pipeline
          configMap:
            name: {{ include "rrcs.name" (dict "root" $ "base" $g.pipelineBase) }}
        - name: nats-creds
          secret:
            secretName: {{ include "rrcs.nats.credsSecret.subscriber" $ }}
            defaultMode: 0444    # Secret is in a per-pod tmpfs; non-root connect user needs read access
---
# Headless Service: DNS returns ALL connect-sink pod IPs so the dashboard sums
# cdc_apply across the active leader + standbys (standbys expose no series).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" $g.deployBase) }}
  labels:
    app: {{ $g.appLabel }}
    release: {{ $.Release.Name }}
spec:
  clusterIP: None
  selector:
    app: {{ $g.appLabel }}
    release: {{ $.Release.Name }}
  ports:
    - name: http
      port: 4195
      targetPort: 4195
    # Elector sidecar metrics (elector_leading / elector_post_total …); scraped
    # by the observability ServiceMonitor's `elector` endpoint.
    - name: elector
      port: 8090
      targetPort: 8090
{{- end }}
{{- end }}
