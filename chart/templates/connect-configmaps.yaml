{{/*
Streams-mode connect boots empty with this observability config (-o flag): it
carries the http/logger/metrics blocks that a run-mode config would hold at the
top level. The per-leg pipeline ConfigMaps below hold ONLY input/pipeline/output
(a valid streams stream config); the elector sidecar POSTs one to its local
connect via the streams REST API while it holds the Lease.
*/}}
{{- if or .Values.connect.source.enabled (eq (include "rrcs.connect.anySinkEnabled" .) "true") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-observability") }}
  labels:
    app: connect
data:
  observability.yaml: |-
{{ tpl (.Files.Get "files/connect/observability.yaml") . | indent 4 }}
{{- end }}
{{- if .Values.connect.source.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-source-pipeline") }}
  labels:
    app: connect-source
data:
  pipeline.yaml: |-
{{ tpl (.Files.Get (printf "files/connect/%s-forward.yaml" .Values.profile)) . | indent 4 }}
{{- end }}
{{- /* One reverse pipeline ConfigMap per ENABLED sinkGroup (design D3). The sole
     "default" group renders name connect-sink-pipeline with durable cdc_sink —
     byte-identical to the pre-D3 single sink. .Group is passed into tpl so
     cdc-reverse.yaml binds this group's per-group durable. SHARDED groups
     (shardsOf/shards — subject-sharding v2) render the broker variant
     <profile>-reverse-sharded.yaml instead: one bind child per shard durable,
     copies:1 + threads:1 hard-coded. */ -}}
{{- range $g := (include "rrcs.connect.sinkGroups" $ | fromYamlArray) }}
{{- if $g.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" $g.pipelineBase) }}
  labels:
    app: {{ $g.appLabel }}
data:
  pipeline.yaml: |-
{{- if $g.sharded }}
{{ tpl ($.Files.Get (printf "files/connect/%s-reverse-sharded.yaml" $.Values.profile)) (merge (dict "Group" $g) $) | indent 4 }}
{{- else }}
{{ tpl ($.Files.Get (printf "files/connect/%s-reverse.yaml" $.Values.profile)) (merge (dict "Group" $g) $) | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
