{{- if not .Values.nats.external.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  # Hash-suffixed so a changed stream config, image, or sink-group set yields a
  # NEW Job name rather than failing `helm upgrade` on the immutable completed Job
  # (spec §5.2). sinkGroups/sinkDefaults are in the hash (design §4 item 4) so
  # adding/removing a group actually re-runs the per-group consumer reconcile.
  {{- /* sharding joins the hash ONLY when configured, so the unconfigured
       job name (and render) stays byte-identical to the pre-sharding chart. */}}
  {{- $shardHash := "" }}
  {{- if eq (include "rrcs.connect.shardingEnabled" $) "true" }}
  {{- $shardHash = toYaml .Values.connect.sharding }}
  {{- end }}
  {{- /* deadLetter joins the hash ONLY when enabled (same rule as sharding above):
       enabling the DLQ extends DESIRED_SUBJECTS (kv.cdc.> -> kv.cdc.>,dlq.cdc.>),
       and without a new Job name an in-place enable inside the previous Job's
       ttlSecondsAfterFinished window would try to patch the immutable completed
       Job — failing the upgrade or silently skipping the subject reconcile, which
       leaves the DLQ publishing to an unbound subject (fail-safe nack loop, no
       loss, but the DLQ looks inert). Disabled keeps the hash input — and the
       default render — byte-identical. */}}
  {{- $dlqHash := "" }}
  {{- if .Values.connect.deadLetter.enabled }}
  {{- $dlqHash = toYaml .Values.connect.deadLetter }}
  {{- end }}
  {{- /* topologyManifest joins the hash ONLY when enabled (same rule as sharding/DLQ
       above): enabling it adds the KV write/read hooks, and a taxonomy change must
       re-run the write so cdc_topology/current is republished. The manifest JSON is
       the exact resolved taxonomy, so any families/prefixes/normalSegment change
       yields a new Job name. Disabled keeps the hash input — and the default render —
       byte-identical. */}}
  {{- $tmHash := "" }}
  {{- if .Values.nats.topologyManifest.enabled }}
  {{- $tmHash = printf "tm|%s|%v" (include "rrcs.connect.topologyManifest.json" $) .Values.connect.source.enabled }}
  {{- end }}
  name: {{ include "rrcs.name" (dict "root" $ "base" (printf "nats-init-%s" (printf "%s|%s|%s|%s|%s|%s%s%s%s" (toYaml .Values.nats.stream) (toYaml .Values.nats.auth) (.Files.Get "files/nats-auth/nats-server.conf") (include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image)) (toYaml .Values.connect.sinkGroups) (toYaml (.Values.connect.sinkDefaults | default dict)) $shardHash $dlqHash $tmHash | sha256sum | trunc 8))) }}
  labels:
    app: nats-init
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" "nats-init") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      volumes:
        - name: admin-creds
          secret:
            secretName: {{ include "rrcs.nats.credsSecret.admin" . }}
            defaultMode: 0444    # Secret is in a per-pod tmpfs; non-root nats-box user needs read access
      initContainers:
        - name: wait-nats
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              until nats --server {{ include "rrcs.nats.url" . }} --creds /etc/nats-creds/admin/user.creds rtt >/dev/null 2>&1; do
                echo "waiting for nats..."; sleep 1;
              done
          volumeMounts:
            - name: admin-creds
              mountPath: /etc/nats-creds/admin
              readOnly: true
      containers:
        - name: create-stream
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              SERVER={{ include "rrcs.nats.url" . | quote }}
              CREDS="/etc/nats-creds/admin/user.creds"
              STREAM={{ .Values.nats.stream.name | quote }}
              DESIRED_SUBJECTS='{{ include "rrcs.nats.stream.subjects" . }}'
              if nats --server "$SERVER" --creds "$CREDS" stream info "$STREAM" >/dev/null 2>&1; then
                # Stream exists. Reconcile bound subjects so a subjectPrefix change
                # on `helm upgrade` actually takes effect — without this, the new
                # init Job (hash-renamed by the values change) would no-op and
                # publishers + the connect-sink consumer would move to the new
                # prefix while the stream stayed bound to the old one, silently
                # dropping every message.
                CURRENT_SUBJECTS=$(nats --server "$SERVER" --creds "$CREDS" stream info "$STREAM" --json \
                                   | jq -r '.config.subjects | join(",")')
                if [ "$CURRENT_SUBJECTS" != "$DESIRED_SUBJECTS" ]; then
                  echo "reconcile: $STREAM subjects [$CURRENT_SUBJECTS] -> [$DESIRED_SUBJECTS]"
                  nats --server "$SERVER" --creds "$CREDS" stream edit "$STREAM" \
                    --subjects="$DESIRED_SUBJECTS" --force
                else
                  echo "$STREAM exists with desired subjects [$DESIRED_SUBJECTS]"
                fi
              else
                nats --server "$SERVER" --creds "$CREDS" stream add "$STREAM" \
                  --subjects "$DESIRED_SUBJECTS" \
                  --storage file \
                  --replicas 1 \
                  --retention limits \
                  --discard old \
                  --max-age {{ .Values.nats.stream.maxAge }} \
                  --max-bytes {{ .Values.nats.stream.maxBytes }} \
                  --max-msgs=-1 \
                  --max-msg-size={{ .Values.nats.stream.maxMsgSize }} \
                  --dupe-window {{ .Values.nats.stream.dupeWindow }} \
                  --defaults
              fi
              nats --server "$SERVER" --creds "$CREDS" stream info "$STREAM"
              {{- include "rrcs.connect.topologyManifest.writeScript" (dict "root" $ "bundled" true) }}
              {{- include "rrcs.connect.topologyManifest.readScript" $ }}

              # ── Per-group pull consumers (cdc-reverse binds each with bind:true) ──
              # The nats_jetstream input does NOT create a pull consumer; it only
              # ATTACHES. We create/reconcile one durable PER enabled sinkGroup here
              # with admin creds (all params live server-side; the input ignores them
              # in pull/bind mode). scripts/create-consumer.sh is the manual fallback.
              #
              # IDEMPOTENCY CONTRACT (docs/superpowers/specs/idempotemcy-pull-consumer.md):
              #   * Re-running with UNCHANGED config is a strict NO-OP — the consumer's
              #     delivery state (ack floor / PEL / position) is never touched. So
              #     running this Job many times cannot disturb an established consumer.
              #   * MUTABLE drift (filter_subject, ack_wait, max_ack_pending,
              #     max_deliver — all mutable per the doc §4) is applied IN PLACE with
              #     `consumer edit`, NOT delete+recreate, so the ack floor / PEL survive
              #     and no stream replay is triggered.
              #   * Only an IMMUTABLE change (an existing PUSH consumer — push<->pull is
              #     immutable) forces delete+recreate, the sole path that resets
              #     delivery state. This never happens on a steady-state re-run.
              #
              # GROUPS: one line, records ';'-separated, fields '|'-separated —
              #   DURABLE|FILTER(csv)|MAXPENDING|ACKWAIT|MAXDELIVER
              {{- /* One record per CONSUMER: non-shard groups have exactly one;
                   sharded groups one per claimed shard, with max_ack_pending
                   HARD-CODED to 1 by the helper (ordering link O-6 — never the
                   consumer.* inheritance chain). */}}
              SINK_GROUPS='{{ range $g := (include "rrcs.connect.sinkGroups" $ | fromYamlArray) }}{{ if $g.enabled }}{{ range $c := $g.consumers }}{{ printf "%s|%s|%v|%s|%v;" $c.durable $c.filter $c.maxAckPending $g.ackWait $g.maxDeliver }}{{ end }}{{ end }}{{ end }}'
              DESIRED_DURABLES='{{ range $g := (include "rrcs.connect.sinkGroups" $ | fromYamlArray) }}{{ if $g.enabled }}{{ range $c := $g.consumers }}{{ printf "%s " $c.durable }}{{ end }}{{ end }}{{ end }}'
              {{- /* Env-scoped prune root: cdc_sink_<envId> when connect.envId is
                   set, else the bare base. Scoping the "our family" match to the
                   env-scoped base is what keeps env A's init from pruning env B's
                   cdc_sink_<envB>_* durables on the shared stream (empty envId =>
                   the bare base, byte-identical to before). */}}
              BASE_DURABLE={{ include "rrcs.connect.durableBase" $ | quote }}

              # Normalize a desired ack_wait ("30s") to ns to diff it against the
              # consumer's .config.ack_wait (always ns). Single unit (ms/s/m/h) or
              # bare int; "ERR" => skip ack_wait drift only (still edits/creates with
              # the raw --wait string, which accepts the full Go duration grammar).
              to_ns() {
                n=${1%%[a-z]*}; u=${1#"$n"}
                case "$n" in ''|*[!0-9]*) echo "ERR"; return;; esac
                case "$u" in
                  ms) echo $(( n * 1000000 ));;
                  s)  echo $(( n * 1000000000 ));;
                  m)  echo $(( n * 60000000000 ));;
                  h)  echo $(( n * 3600000000000 ));;
                  '') echo "$n";;
                  *)  echo "ERR";;
                esac
              }
              # sort a csv so a multi-prefix filter compares order-independently.
              sort_csv() { printf '%s' "$1" | tr ',' '\n' | sort | tr '\n' ',' | sed 's/,$//'; }

              echo "$SINK_GROUPS" | tr ';' '\n' | while IFS='|' read -r CONSUMER DESIRED_FILTER DESIRED_MAXPENDING DESIRED_ACKWAIT DESIRED_MAXDELIVER; do
                [ -z "$CONSUMER" ] && continue
                DESIRED_ACKWAIT_NS=$(to_ns "$DESIRED_ACKWAIT")
                if [ "$DESIRED_ACKWAIT_NS" = "ERR" ]; then
                  echo "warn: cannot normalize ackWait=$DESIRED_ACKWAIT to ns for $CONSUMER; it is still created/edited with that value, but ack_wait drift won't be auto-detected. Use a single-unit duration (e.g. 30s, 1m)." >&2
                fi
                # --filter can repeat (a multi-prefix group => union filter).
                FILTER_ARGS=""; OLDIFS=$IFS; IFS=','
                for f in $DESIRED_FILTER; do FILTER_ARGS="$FILTER_ARGS --filter $f"; done
                IFS=$OLDIFS
                DESIRED_FILTER_SORTED=$(sort_csv "$DESIRED_FILTER")

                ACTION=create
                if nats --server "$SERVER" --creds "$CREDS" consumer info "$STREAM" "$CONSUMER" --json >/tmp/cons.json 2>/dev/null; then
                  DELIVER=$(jq -r '.config.deliver_subject // ""' /tmp/cons.json)
                  if [ -n "$DELIVER" ]; then
                    # IMMUTABLE push<->pull change: the ONLY delete+recreate path.
                    echo "$CONSUMER is PUSH (deliver=$DELIVER); delete+recreate as pull (immutable change — delivery-state reset is unavoidable here)"
                    nats --server "$SERVER" --creds "$CREDS" consumer rm "$STREAM" "$CONSUMER" --force
                    ACTION=create
                  else
                    CUR_FILTER=$(jq -r 'if ((.config.filter_subjects // []) | length) > 0 then (.config.filter_subjects | join(",")) else (.config.filter_subject // "") end' /tmp/cons.json)
                    CUR_FILTER_SORTED=$(sort_csv "$CUR_FILTER")
                    CUR_ACKWAIT=$(jq -r '.config.ack_wait' /tmp/cons.json)
                    CUR_MAXPENDING=$(jq -r '.config.max_ack_pending' /tmp/cons.json)
                    CUR_MAXDELIVER=$(jq -r '.config.max_deliver' /tmp/cons.json)
                    if [ "$CUR_FILTER_SORTED" != "$DESIRED_FILTER_SORTED" ] \
                      || { [ "$DESIRED_ACKWAIT_NS" != "ERR" ] && [ "$CUR_ACKWAIT" != "$DESIRED_ACKWAIT_NS" ]; } \
                      || [ "$CUR_MAXPENDING" != "$DESIRED_MAXPENDING" ] \
                      || [ "$CUR_MAXDELIVER" != "$DESIRED_MAXDELIVER" ]; then
                      ACTION=edit
                    else
                      ACTION=none
                      echo "pull consumer $CONSUMER already up to date (filter[$CUR_FILTER_SORTED] ackwait[$CUR_ACKWAIT] maxpending[$CUR_MAXPENDING] maxdeliver[$CUR_MAXDELIVER])"
                    fi
                  fi
                fi

                if [ "$ACTION" = edit ]; then
                  # MUTABLE drift → in-place edit; ack floor / PEL / position preserved.
                  echo "pull consumer $CONSUMER drifted; editing IN PLACE (filter->[$DESIRED_FILTER_SORTED] ackwait->[$DESIRED_ACKWAIT_NS] maxpending->[$DESIRED_MAXPENDING] maxdeliver->[$DESIRED_MAXDELIVER])"
                  nats --server "$SERVER" --creds "$CREDS" consumer edit "$STREAM" "$CONSUMER" \
                    $FILTER_ARGS \
                    --wait "$DESIRED_ACKWAIT" \
                    --max-pending "$DESIRED_MAXPENDING" \
                    --max-deliver="$DESIRED_MAXDELIVER" \
                    --force
                elif [ "$ACTION" = create ]; then
                  echo "creating pull consumer $CONSUMER (filter [$DESIRED_FILTER_SORTED])"
                  nats --server "$SERVER" --creds "$CREDS" consumer add "$STREAM" "$CONSUMER" \
                    --pull \
                    $FILTER_ARGS \
                    --ack explicit \
                    --deliver all \
                    --replay instant \
                    --wait "$DESIRED_ACKWAIT" \
                    --max-pending "$DESIRED_MAXPENDING" \
                    --max-deliver="$DESIRED_MAXDELIVER" \
                    --defaults
                fi
                nats --server "$SERVER" --creds "$CREDS" consumer info "$STREAM" "$CONSUMER"
              done

              {{- if eq (include "rrcs.connect.shardingEnabled" $) "true" }}

              # ── Orphan pruning — MANUAL-GATED while sharding is configured ────
              # Deleting a durable that fell out of the config is cutover STEP 4
              # (docs/design/subject-sharding/cutover.md) and is only safe AFTER
              # the drain criterion (num_pending==0 && num_ack_pending==0) holds:
              # the old group's superset filter (kv.cdc.<family>.>) dual-consumes
              # every shard subject, and WITHOUT a fence dual consumption is a
              # correctness error, not waste. So with sharding configured this
              # block only REPORTS orphans unless connect.sharding.pruneOrphans
              # was deliberately set for the cutover upgrade.
              PRUNE='{{ ternary "1" "0" (((.Values.connect.sharding).pruneOrphans) | default false) }}'
              EXISTING=$(nats --server "$SERVER" --creds "$CREDS" consumer ls "$STREAM" --names 2>/dev/null || true)
              for existing in $EXISTING; do
                case "$existing" in
                  "$BASE_DURABLE"|"$BASE_DURABLE"_*) ;;
                  *) continue;;
                esac
                keep=0
                for d in $DESIRED_DURABLES; do [ "$existing" = "$d" ] && keep=1 && break; done
                if [ "$keep" = 0 ]; then
                  if [ "$PRUNE" = 1 ]; then
                    echo "orphan prune: removing unbound consumer $existing (no longer in sinkGroups; connect.sharding.pruneOrphans=true)"
                    nats --server "$SERVER" --creds "$CREDS" consumer rm "$STREAM" "$existing" --force
                  else
                    echo "orphan prune SKIPPED for $existing: sharding is configured and connect.sharding.pruneOrphans=false — verify the drain criterion (num_pending==0 && num_ack_pending==0), then re-run the upgrade with pruneOrphans=true (cutover step 4)"
                  fi
                fi
              done
              {{- else }}

              # ── Orphan pruning (design §4 item 3) ──────────────────────────────
              # Scaling sinkGroups DOWN must delete the now-unbound durables (an
              # unbound pull consumer accrues num_pending forever). Only ever touch
              # OUR family ($BASE_DURABLE / ${BASE_DURABLE}_*); a foreign consumer is
              # never removed. Best-effort: if the list can't be read, prune nothing
              # (safe — never a false delete). This is reconcile-completeness only; it
              # never touches a consumer that is still in the desired set.
              EXISTING=$(nats --server "$SERVER" --creds "$CREDS" consumer ls "$STREAM" --names 2>/dev/null || true)
              for existing in $EXISTING; do
                case "$existing" in
                  "$BASE_DURABLE"|"$BASE_DURABLE"_*) ;;
                  *) continue;;
                esac
                keep=0
                for d in $DESIRED_DURABLES; do [ "$existing" = "$d" ] && keep=1 && break; done
                if [ "$keep" = 0 ]; then
                  echo "orphan prune: removing unbound consumer $existing (no longer in sinkGroups)"
                  nats --server "$SERVER" --creds "$CREDS" consumer rm "$STREAM" "$existing" --force
                fi
              done
              {{- end }}
          volumeMounts:
            - name: admin-creds
              mountPath: /etc/nats-creds/admin
              readOnly: true
          resources:
            {{- toYaml .Values.resources.verifier | nindent 12 }}
{{- end }}
