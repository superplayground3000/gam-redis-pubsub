{{- if not .Values.nats.external.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  # Hash-suffixed so a changed stream config or image yields a NEW Job name
  # rather than failing `helm upgrade` on the immutable completed Job (spec §5.2).
  name: {{ include "rrcs.name" (dict "root" $ "base" (printf "nats-init-%s" (printf "%s|%s|%s|%s" (toYaml .Values.nats.stream) (toYaml .Values.nats.auth) (.Files.Get "files/nats-auth/nats-server.conf") (include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image)) | sha256sum | trunc 8))) }}
  labels:
    app: nats-init
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" "nats-init") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      volumes:
        - name: admin-creds
          secret:
            secretName: {{ include "rrcs.nats.credsSecret.admin" . }}
            defaultMode: 0444    # Secret is in a per-pod tmpfs; non-root nats-box user needs read access
      initContainers:
        - name: wait-nats
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              until nats --server {{ include "rrcs.nats.url" . }} --creds /etc/nats-creds/admin/user.creds rtt >/dev/null 2>&1; do
                echo "waiting for nats..."; sleep 1;
              done
          volumeMounts:
            - name: admin-creds
              mountPath: /etc/nats-creds/admin
              readOnly: true
      containers:
        - name: create-stream
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              SERVER={{ include "rrcs.nats.url" . | quote }}
              CREDS="/etc/nats-creds/admin/user.creds"
              STREAM={{ .Values.nats.stream.name | quote }}
              DESIRED_SUBJECTS='{{ include "rrcs.nats.stream.subjects" . }}'
              if nats --server "$SERVER" --creds "$CREDS" stream info "$STREAM" >/dev/null 2>&1; then
                # Stream exists. Reconcile bound subjects so a subjectPrefix change
                # on `helm upgrade` actually takes effect — without this, the new
                # init Job (hash-renamed by the values change) would no-op and
                # publishers + the connect-sink consumer would move to the new
                # prefix while the stream stayed bound to the old one, silently
                # dropping every message.
                CURRENT_SUBJECTS=$(nats --server "$SERVER" --creds "$CREDS" stream info "$STREAM" --json \
                                   | jq -r '.config.subjects | join(",")')
                if [ "$CURRENT_SUBJECTS" != "$DESIRED_SUBJECTS" ]; then
                  echo "reconcile: $STREAM subjects [$CURRENT_SUBJECTS] -> [$DESIRED_SUBJECTS]"
                  nats --server "$SERVER" --creds "$CREDS" stream edit "$STREAM" \
                    --subjects="$DESIRED_SUBJECTS" --force
                else
                  echo "$STREAM exists with desired subjects [$DESIRED_SUBJECTS]"
                fi
              else
                nats --server "$SERVER" --creds "$CREDS" stream add "$STREAM" \
                  --subjects "$DESIRED_SUBJECTS" \
                  --storage file \
                  --replicas 1 \
                  --retention limits \
                  --discard old \
                  --max-age {{ .Values.nats.stream.maxAge }} \
                  --max-bytes {{ .Values.nats.stream.maxBytes }} \
                  --max-msgs=-1 \
                  --max-msg-size={{ .Values.nats.stream.maxMsgSize }} \
                  --dupe-window {{ .Values.nats.stream.dupeWindow }} \
                  --defaults
              fi
              nats --server "$SERVER" --creds "$CREDS" stream info "$STREAM"

              # ── Pull consumer (cdc-reverse binds to this with bind:true) ──
              # The nats_jetstream input does NOT create a pull consumer; it
              # only attaches. We create/reconcile it here with admin creds so
              # all consumer params live server-side (input YAML ignores them in
              # pull/bind mode). The standalone scripts/create-consumer.sh forms
              # the same command for external NATS / manual recreation.
              CONSUMER={{ .Values.nats.stream.consumer.durable | quote }}
              DESIRED_MAXPENDING={{ .Values.nats.stream.consumer.maxAckPending | quote }}
              DESIRED_MAXDELIVER={{ .Values.nats.stream.consumer.maxDeliver | quote }}
              # Best-effort normalize the desired ack_wait (a string like "30s")
              # to nanoseconds so we can diff it against the consumer's
              # .config.ack_wait (always nanoseconds). Handles a single unit
              # (ms/s/m/h) or a bare integer (already ns). The raw string is ALSO
              # passed verbatim to `consumer add --wait`, which accepts the full
              # Go duration grammar (e.g. "1m30s", "100us") — so anything to_ns
              # can't normalize still CREATES correctly; we just emit "ERR" and
              # skip ack_wait drift detection for it rather than failing. Express
              # ackWait as a single unit if you want it auto-reconciled on drift.
              to_ns() {
                n=${1%%[a-z]*}   # leading integer part
                u=${1#"$n"}      # trailing unit (may be empty)
                case "$n" in ''|*[!0-9]*) echo "ERR"; return;; esac
                case "$u" in
                  ms) echo $(( n * 1000000 ));;
                  s)  echo $(( n * 1000000000 ));;
                  m)  echo $(( n * 60000000000 ));;
                  h)  echo $(( n * 3600000000000 ));;
                  '') echo "$n";;   # bare integer = already nanoseconds
                  *)  echo "ERR";;
                esac
              }
              DESIRED_ACKWAIT={{ .Values.nats.stream.consumer.ackWait | quote }}
              DESIRED_ACKWAIT_NS=$(to_ns "$DESIRED_ACKWAIT")
              if [ "$DESIRED_ACKWAIT_NS" = "ERR" ]; then
                echo "warn: cannot normalize ackWait=$DESIRED_ACKWAIT to ns (compound or non-ms/s/m/h unit); the consumer is still created with it, but ack_wait drift won't be auto-detected. Use a single-unit duration (e.g. 30s, 1m) for full reconcile." >&2
              fi
              if nats --server "$SERVER" --creds "$CREDS" consumer info "$STREAM" "$CONSUMER" --json >/tmp/cons.json 2>/dev/null; then
                # bind:true attaches to whatever the server has, so the
                # server-side config is authoritative. Recreate (delete+add) on
                # any drift that bind cannot fix at runtime:
                #   - PUSH consumer (has deliver_subject): bind can't attach.
                #   - filter_subject drift: e.g. a subjectPrefix change would
                #     leave the consumer filtering the OLD subjects, silently
                #     dropping every event (same failure the stream-subject
                #     reconcile above guards against).
                #   - ack_wait / max_ack_pending / max_deliver drift from values.
                DELIVER=$(jq -r '.config.deliver_subject // ""' /tmp/cons.json)
                CUR_FILTER=$(jq -r '.config.filter_subject // ""' /tmp/cons.json)
                CUR_ACKWAIT=$(jq -r '.config.ack_wait' /tmp/cons.json)
                CUR_MAXPENDING=$(jq -r '.config.max_ack_pending' /tmp/cons.json)
                CUR_MAXDELIVER=$(jq -r '.config.max_deliver' /tmp/cons.json)
                if [ -n "$DELIVER" ]; then
                  echo "consumer $CONSUMER is PUSH (deliver=$DELIVER); recreating as pull"
                  NEED_CREATE=1
                elif [ "$CUR_FILTER" != "$DESIRED_SUBJECTS" ] \
                  || { [ "$DESIRED_ACKWAIT_NS" != "ERR" ] && [ "$CUR_ACKWAIT" != "$DESIRED_ACKWAIT_NS" ]; } \
                  || [ "$CUR_MAXPENDING" != "$DESIRED_MAXPENDING" ] \
                  || [ "$CUR_MAXDELIVER" != "$DESIRED_MAXDELIVER" ]; then
                  echo "pull consumer $CONSUMER drifted (filter[$CUR_FILTER]->[$DESIRED_SUBJECTS] ackwait[$CUR_ACKWAIT]->[$DESIRED_ACKWAIT_NS] maxpending[$CUR_MAXPENDING]->[$DESIRED_MAXPENDING] maxdeliver[$CUR_MAXDELIVER]->[$DESIRED_MAXDELIVER]); recreating"
                  NEED_CREATE=1
                else
                  echo "pull consumer $CONSUMER already up to date"
                  NEED_CREATE=0
                fi
                if [ "$NEED_CREATE" = 1 ]; then
                  nats --server "$SERVER" --creds "$CREDS" consumer rm "$STREAM" "$CONSUMER" --force
                fi
              else
                NEED_CREATE=1
              fi
              if [ "$NEED_CREATE" = 1 ]; then
                echo "creating pull consumer $CONSUMER (filter [$DESIRED_SUBJECTS])"
                nats --server "$SERVER" --creds "$CREDS" consumer add "$STREAM" "$CONSUMER" \
                  --pull \
                  --filter "$DESIRED_SUBJECTS" \
                  --ack explicit \
                  --deliver all \
                  --replay instant \
                  --wait {{ .Values.nats.stream.consumer.ackWait }} \
                  --max-pending {{ .Values.nats.stream.consumer.maxAckPending }} \
                  --max-deliver={{ .Values.nats.stream.consumer.maxDeliver }} \
                  --defaults
              fi
              nats --server "$SERVER" --creds "$CREDS" consumer info "$STREAM" "$CONSUMER"
          volumeMounts:
            - name: admin-creds
              mountPath: /etc/nats-creds/admin
              readOnly: true
          resources:
            {{- toYaml .Values.resources.verifier | nindent 12 }}
{{- end }}
