{{- if .Values.nats.external.enabled }}
{{- /*
  External-JetStream counterpart of nats-init-job.yaml (which runs only when
  nats.external.enabled=false). Against an EXTERNAL NATS the chart does NOT own
  the stream — but the sink still binds (bind:true) to the durable PULL consumer
  named by nats.stream.consumer.durable, and the nats_jetstream input only
  ATTACHES, never creates. So this Job ensures a USABLE consumer exists:
    - verify the user-owned stream is present (fail-closed if not),
    - create the pull consumer if absent; if it already exists, validate it and
      fail-closed when it is unusable (PUSH) or stale (wrong filter_subject).
      We never mutate or delete the user-owned consumer — but we also never
      report success while leaving one the sink cannot bind to.
  Credential: nats.external.auth.adminSecret if set, else subscriberSecret
  (whose JWT must carry $JS.API.CONSUMER.*CREATE grants — gen-nats-auth.sh mints
  them). create-consumer.sh remains the manual fallback when neither cred can
  create the consumer.
*/}}
{{- $credsSecret := .Values.nats.external.auth.adminSecret | default (include "rrcs.nats.credsSecret.subscriber" .) }}
{{- /* Bootstrap start policy (design §8.4, R3/F3). bDeliver="" is LEGACY: create
     --deliver all and render NO start-semantics validation, so the whole job stays
     byte-identical. Calling the helper also runs its render guards. deliverArg is the
     literal `--deliver` argument (byte-identically "all" when legacy) and
     expectedPolicy is the JetStream deliver_policy an EXISTING durable must report. */}}
{{- $bDeliver := include "rrcs.connect.sink.bootstrapDeliver" . }}
{{- $bTs := ((.Values.connect.sink).bootstrap | default dict).byStartTime | default "" }}
{{- $bAllowMismatch := ((.Values.connect.sink).bootstrap | default dict).allowStartMismatch | default false }}
{{- $deliverArg := "all" }}
{{- $expectedPolicy := "all" }}
{{- if eq $bDeliver "new" }}{{- $deliverArg = "new" }}{{- $expectedPolicy = "new" }}{{- end }}
{{- if eq $bDeliver "by-time" }}{{- $deliverArg = ($bTs | quote) }}{{- $expectedPolicy = "by_start_time" }}{{- end }}
{{- /* Assert-only handoff mode (design §8.3/E7, P6). When true, the SINK_GROUPS loop
     REFUSES to create any durable and instead asserts each already exists as
     deliver_policy=by_start_sequence (operator-precreated at F0+1). The helper also
     runs its render guards: fail on a bundled release, and fail if bootstrap.deliver
     is also set (mutually exclusive — enforced here so both entry points share it). */}}
{{- $handoffAssertOnly := eq (include "rrcs.connect.sink.handoffAssertOnly" .) "true" }}
{{- /* F1 (Codex review 2026-07-21): the EXACT start sequence (F0+1) every precreated
     shard durable must report. rrcs.connect.sink.validateHandoffStartSeq (run via
     rrcs.connect.sinkGroups) has already proven it is a positive integer when
     handoffAssertOnly is on, so the assert branch below can compare opt_start_seq
     against it verbatim. */}}
{{- $handoffStartSeq := ((.Values.connect.sink).handoffStartSeq | default "") }}
apiVersion: batch/v1
kind: Job
metadata:
  # Helm HOOK (not a plain manifest). pre-install/pre-upgrade means helm RUNS
  # this Job and BLOCKS on it before creating/upgrading the sink — so a
  # fail-closed exit (missing stream, or an unusable/stale consumer) FAILS THE
  # RELEASE rather than letting a "successful" deploy bring up a sink that can't
  # bind. (A plain Job wouldn't gate anything: helm reports success while it
  # retries and fails in the background.) Safe as a hook only in external mode —
  # the external NATS already exists, so the hook can reach it; the bundled
  # nats-init Job can't be a hook because its NATS is deployed by the same
  # release. Stable name + before-hook-creation: helm deletes the prior run by
  # name on each install/upgrade. No hash needed — hook Jobs aren't part of the
  # release manifest, so the immutable-completed-Job upgrade failure (which the
  # bundled Job's hash guards against) does not apply here. A FAILED run is kept
  # (no hook-failed in the delete policy) for debugging.
  name: {{ include "rrcs.name" (dict "root" $ "base" "nats-init-ext") }}
  labels:
    app: nats-init-ext
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" "nats-init-ext") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      volumes:
        - name: manage-creds
          secret:
            secretName: {{ $credsSecret | quote }}
            defaultMode: 0444    # Secret is in a per-pod tmpfs; non-root nats-box user needs read access
      initContainers:
        - name: wait-nats
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              until nats --server {{ include "rrcs.nats.url" . }} --creds /etc/nats-creds/manage/user.creds rtt >/dev/null 2>&1; do
                echo "waiting for nats..."; sleep 1;
              done
          volumeMounts:
            - name: manage-creds
              mountPath: /etc/nats-creds/manage
              readOnly: true
      containers:
        - name: ensure-consumer
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              SERVER={{ include "rrcs.nats.url" . | quote }}
              CREDS="/etc/nats-creds/manage/user.creds"
              STREAM={{ .Values.nats.stream.name | quote }}
              DESIRED_MAXDELIVER={{ .Values.nats.stream.consumer.maxDeliver | quote }}
              DESIRED_MAXPENDING={{ .Values.nats.stream.consumer.maxAckPending | quote }}

              # The external stream is USER-OWNED — the chart never creates or
              # reconciles it. Fail clearly if it is missing so the operator
              # provisions it first; the Job's backoffLimit retries until it
              # appears (creating a consumer on a non-existent stream errors).
              if ! nats --server "$SERVER" --creds "$CREDS" stream info "$STREAM" >/dev/null 2>&1; then
                echo "ERROR: external stream '$STREAM' not found on $SERVER (or creds lack \$JS.API.STREAM.INFO.$STREAM)." >&2
                echo "Create the stream first — it must bind subjects '{{ include "rrcs.nats.stream.subjects" . }}'. The chart does NOT reconcile external streams." >&2
                exit 1
              fi
              {{- include "rrcs.connect.topologyManifest.writeScript" (dict "root" $ "bundled" false) }}
              {{- include "rrcs.connect.topologyManifest.readScript" $ }}

              sort_csv() { printf '%s' "$1" | tr ',' '\n' | sort | tr '\n' ',' | sed 's/,$//'; }

              # One durable PER enabled sinkGroup (design D3). For an EXTERNAL NATS
              # the consumers are user-owned, so we CREATE if absent but only
              # VALIDATE (never edit/delete) existing ones — failing loud when one
              # is unusable (PUSH), stale (wrong filter), or weakens at-least-once
              # (ack_policy != explicit, or a divergent max_deliver). One line,
              # records ';'-separated: DURABLE|FILTER(csv)|ACKWAIT
              {{- if eq (include "rrcs.connect.shardingEnabled" $) "true" }}
              # Sharded record format adds MAXPENDING|SHARDED per consumer:
              # shard durables are created with (and validated against)
              # max_ack_pending=1 — ordering link O-6 breaks silently otherwise.
              SINK_GROUPS='{{ range $g := (include "rrcs.connect.sinkGroups" $ | fromYamlArray) }}{{ if $g.enabled }}{{ range $c := $g.consumers }}{{ printf "%s|%s|%s|%v|%v;" $c.durable $c.filter $g.ackWait $c.maxAckPending $g.sharded }}{{ end }}{{ end }}{{ end }}'
              echo "$SINK_GROUPS" | tr ';' '\n' | while IFS='|' read -r CONSUMER FILTER DESIRED_ACKWAIT DESIRED_MAXPENDING_C SHARDED_C; do
              {{- else }}
              SINK_GROUPS='{{ range $g := (include "rrcs.connect.sinkGroups" $ | fromYamlArray) }}{{ if $g.enabled }}{{ printf "%s|%s|%s;" $g.durable $g.filter $g.ackWait }}{{ end }}{{ end }}'
              echo "$SINK_GROUPS" | tr ';' '\n' | while IFS='|' read -r CONSUMER FILTER DESIRED_ACKWAIT; do
              {{- end }}
                [ -z "$CONSUMER" ] && continue
                FILTER_SORTED=$(sort_csv "$FILTER")
                FILTER_ARGS=""; OLDIFS=$IFS; IFS=','
                for f in $FILTER; do FILTER_ARGS="$FILTER_ARGS --filter $f"; done
                IFS=$OLDIFS
                if nats --server "$SERVER" --creds "$CREDS" consumer info "$STREAM" "$CONSUMER" --json >/tmp/cons.json 2>/dev/null; then
                  DELIVER=$(jq -r '.config.deliver_subject // ""' /tmp/cons.json)
                  CUR_FILTER=$(jq -r 'if ((.config.filter_subjects // []) | length) > 0 then (.config.filter_subjects | join(",")) else (.config.filter_subject // "") end' /tmp/cons.json)
                  CUR_FILTER_SORTED=$(sort_csv "$CUR_FILTER")
                  if [ -n "$DELIVER" ]; then
                    echo "ERROR: consumer '$CONSUMER' on '$STREAM' is PUSH (deliver_subject=$DELIVER); the sink uses bind:true and needs a PULL consumer." >&2
                    echo "The chart will not mutate a user-owned consumer. Delete it and re-run this Job (or scripts/create-consumer.sh) to recreate it as pull." >&2
                    exit 1
                  fi
                  if [ "$CUR_FILTER_SORTED" != "$FILTER_SORTED" ]; then
                    echo "ERROR: consumer '$CONSUMER' filter [$CUR_FILTER_SORTED] != desired [$FILTER_SORTED] (stale — e.g. subjectPrefix or the group's prefixes changed). The sink would silently drop every event." >&2
                    echo "The chart will not mutate a user-owned consumer. Delete it and re-run this Job, or realign the consumer's filter manually." >&2
                    exit 1
                  fi
                  CUR_ACKPOLICY=$(jq -r '.config.ack_policy // ""' /tmp/cons.json)
                  CUR_MAXDELIVER=$(jq -r '.config.max_deliver' /tmp/cons.json)
                  if [ "$CUR_ACKPOLICY" != "explicit" ]; then
                    echo "ERROR: consumer '$CONSUMER' ack_policy=[$CUR_ACKPOLICY] but the sink requires 'explicit' — it acks on success and relies on nack->redelivery for at-least-once delivery; any other policy silently loses or mis-acks on a processing failure." >&2
                    echo "The chart will not mutate a user-owned consumer. Delete it and re-run this Job (or scripts/create-consumer.sh), which creates it with --ack explicit." >&2
                    exit 1
                  fi
                  if [ "$CUR_MAXDELIVER" != "$DESIRED_MAXDELIVER" ]; then
                    echo "ERROR: consumer '$CONSUMER' max_deliver=[$CUR_MAXDELIVER] != desired [$DESIRED_MAXDELIVER] — this changes the redelivery/loss posture the sink expects (default -1 = redeliver until acked; a finite cap drops a still-failing message -> silent data loss)." >&2
                    echo "The chart will not mutate a user-owned consumer. Delete it and re-run this Job, or set nats.stream.consumer.maxDeliver to match if that posture is intentional." >&2
                    exit 1
                  fi
                  CUR_MAXPENDING=$(jq -r '.config.max_ack_pending' /tmp/cons.json)
                  {{- if eq (include "rrcs.connect.shardingEnabled" $) "true" }}
                  if [ "$SHARDED_C" = "true" ] && [ "$CUR_MAXPENDING" != "1" ]; then
                    echo "ERROR: shard consumer '$CONSUMER' has max_ack_pending=$CUR_MAXPENDING but MUST be 1 — with more than one in-flight delivery a redelivery can overtake a later message and the per-shard apply order breaks SILENTLY (no metric detects it; ordering link O-6, design v2 D-8)." >&2
                    echo "The chart will not mutate a user-owned consumer. Recreate it with --max-pending 1 (or delete it and re-run this Job)." >&2
                    exit 1
                  fi
                  if [ "$CUR_MAXPENDING" != "$DESIRED_MAXPENDING_C" ]; then
                    echo "note: consumer '$CONSUMER' max_ack_pending=$CUR_MAXPENDING vs values $DESIRED_MAXPENDING_C (throughput only; still usable, not changing a user-owned consumer)." >&2
                  fi
                  {{- else }}
                  if [ "$CUR_MAXPENDING" != "$DESIRED_MAXPENDING" ]; then
                    echo "note: consumer '$CONSUMER' max_ack_pending=$CUR_MAXPENDING vs values $DESIRED_MAXPENDING (throughput only; still usable, not changing a user-owned consumer)." >&2
                  fi
                  {{- end }}
                  {{- if $handoffAssertOnly }}
                  # ── Assert-only handoff: deliver_policy==by_start_sequence AND ─────────
                  #    opt_start_seq==connect.sink.handoffStartSeq (design §8.3/E7, F1) ──
                  # The operator precreated each shard durable with
                  # `--deliver by_start_sequence --start-sequence <F0+1>` (F0 = the old
                  # AIO durable's ack_floor.stream_seq, the contiguous-APPLIED prefix) and
                  # passed that SAME F0+1 as connect.sink.handoffStartSeq. We assert BOTH
                  # the policy AND the exact sequence: a wrong policy (a leftover
                  # --deliver all durable squatting the name) would replay the whole 72h
                  # backlog (VF-16), and a wrong SEQUENCE (a typo, or a stale
                  # by_start_sequence durable at a different position) would replay too
                  # much (duplicate reapply) or skip a range (silent gap) the moment the
                  # old AIO durable is deleted — so we fail closed on either and never
                  # auto-fix.
                  EXPECTED_START_SEQ={{ $handoffStartSeq | quote }}
                  CUR_DELIVER_POLICY=$(jq -r '.config.deliver_policy // "all"' /tmp/cons.json)
                  CUR_START_SEQ=$(jq -r '.config.opt_start_seq // ""' /tmp/cons.json)
                  echo "note: [handoff assert-only] consumer '$CONSUMER' deliver_policy=$CUR_DELIVER_POLICY start_seq=[${CUR_START_SEQ:-none}] — asserting deliver_policy=by_start_sequence AND opt_start_seq=$EXPECTED_START_SEQ (= connect.sink.handoffStartSeq = the F0+1 you precreated at)." >&2
                  if [ "$CUR_DELIVER_POLICY" != "by_start_sequence" ]; then
                    echo "ERROR: [handoff assert-only] consumer '$CONSUMER' on '$STREAM' has deliver_policy=[$CUR_DELIVER_POLICY], but the §8.3 AIO→sharded handoff requires by_start_sequence — the operator must precreate every shard durable with '--deliver by_start_sequence --start-sequence <F0+1>' before deleting the old AIO durable. connect.sink.handoffAssertOnly=true will NOT auto-create or bless a wrong-policy durable: a --deliver all durable here replays the whole 72h backlog (VF-16) the instant the old AIO durable is gone. Precreate '$CONSUMER' correctly and re-run this Job." >&2
                    echo "note: connect.sink.bootstrap.allowStartMismatch does NOT override this assertion — the handoff mode exists precisely to catch precreate mistakes, so an escape hatch would defeat it." >&2
                    exit 1
                  fi
                  if [ "$CUR_START_SEQ" != "$EXPECTED_START_SEQ" ]; then
                    echo "ERROR: [handoff assert-only] consumer '$CONSUMER' on '$STREAM' has opt_start_seq=[${CUR_START_SEQ:-none}], but connect.sink.handoffStartSeq=$EXPECTED_START_SEQ — the durable must start at EXACTLY F0+1 (F0 = the old AIO durable's ack_floor.stream_seq you read at quiesce). A durable at the wrong sequence replays too much (duplicate reapply) or skips a range (silent gap) the instant the old AIO durable is deleted. Recreate '$CONSUMER' with '--deliver by_start_sequence --start-sequence $EXPECTED_START_SEQ' (or, if $EXPECTED_START_SEQ is wrong, re-read F0 and pass the corrected --set connect.sink.handoffStartSeq), then re-run this Job." >&2
                    exit 1
                  fi
                  echo "note: [handoff assert-only] consumer '$CONSUMER' start_seq verified = [$CUR_START_SEQ] == connect.sink.handoffStartSeq ($EXPECTED_START_SEQ)." >&2
                  {{- else if ne $bDeliver "" }}
                  # ── Start-semantics validation (design §8.4, R3/F3) ────────────────
                  # Without this, a durable created by a PRIOR `--deliver all` (or any
                  # other policy) is accepted as "usable" below without ever inspecting
                  # its deliver_policy — so this env would silently run from the WRONG
                  # stream position (e.g. replay the whole 72h backlog when it asked to
                  # start fresh). deliver_policy/opt_start_time are FIXED at creation and
                  # we never mutate a user-owned consumer, so a mismatch fails closed.
                  CUR_DELIVER_POLICY=$(jq -r '.config.deliver_policy // "all"' /tmp/cons.json)
                  CUR_OPT_START_TIME=$(jq -r '.config.opt_start_time // ""' /tmp/cons.json)
                  CUR_START_SEQ=$(jq -r '.config.opt_start_seq // ""' /tmp/cons.json)
                  # start_sequence is REPORTED only — the P6 assert-only handoff mode
                  # owns sequence assertions; here we assert policy (+ time for by-time).
                  echo "note: consumer '$CONSUMER' deliver_policy=$CUR_DELIVER_POLICY start_seq=[${CUR_START_SEQ:-none}] start_time=[${CUR_OPT_START_TIME:-none}] (checking against bootstrap.deliver={{ $bDeliver }})" >&2
                  norm_ts() { printf '%s' "$1" | sed -e 's/[.][0-9]*//' -e 's/+00:00$/Z/' -e 's/-00:00$/Z/'; }
                  START_MISMATCH=""
                  if [ "$CUR_DELIVER_POLICY" != {{ $expectedPolicy | quote }} ]; then
                    START_MISMATCH="deliver_policy=[$CUR_DELIVER_POLICY], but bootstrap.deliver={{ $bDeliver }} wants [{{ $expectedPolicy }}]"
                  fi
                  {{- if eq $bDeliver "by-time" }}
                  if [ -z "$START_MISMATCH" ] && [ "$(norm_ts "$CUR_OPT_START_TIME")" != "$(norm_ts {{ $bTs | quote }})" ]; then
                    START_MISMATCH="opt_start_time=[$CUR_OPT_START_TIME], but bootstrap.byStartTime wants [{{ $bTs }}]"
                  fi
                  {{- end }}
                  if [ -n "$START_MISMATCH" ]; then
                    {{- if $bAllowMismatch }}
                    echo "WARN: consumer '$CONSUMER' start-semantics MISMATCH ($START_MISMATCH); connect.sink.bootstrap.allowStartMismatch=true => proceeding with the EXISTING durable as-is. Its delivery position is NOT what bootstrap.deliver requests — you asserted this is intentional." >&2
                    {{- else }}
                    echo "ERROR: consumer '$CONSUMER' on '$STREAM' has start semantics that do NOT match connect.sink.bootstrap.deliver: $START_MISMATCH." >&2
                    echo "A durable's deliver_policy/opt_start_time are FIXED at creation and the chart never mutates a user-owned consumer, so this env would run from the wrong stream position — e.g. a stale --deliver all durable replays the whole 72h backlog when you asked for 'new'. Two ways out: (1) delete the durable and re-run this Job (or scripts/create-consumer.sh) so it is recreated with the requested start policy; or (2) set connect.sink.bootstrap.allowStartMismatch=true to accept the existing durable's position as-is." >&2
                    exit 1
                    {{- end }}
                  fi
                  {{- end }}
                  echo "pull consumer '$CONSUMER' already exists on '$STREAM' with desired filter [$FILTER_SORTED], ack_policy=explicit, max_deliver=$CUR_MAXDELIVER; usable"
                else
                  {{- if $handoffAssertOnly }}
                  # Assert-only handoff (design §8.3/E7): the durable is MISSING. We
                  # never auto-create in this mode — the operator must PRECREATE every
                  # shard durable (--deliver by_start_sequence --start-sequence F0+1)
                  # before deleting the old AIO durable. Auto-creating here would
                  # default --deliver all (VF-16) → a 72h replay burst. Fail closed.
                  echo "ERROR: [handoff assert-only] consumer '$CONSUMER' does NOT exist on '$STREAM'. connect.sink.handoffAssertOnly=true REFUSES to auto-create durables: the §8.3 AIO→sharded handoff requires the operator to PRECREATE every shard durable with '--deliver by_start_sequence --start-sequence <F0+1>' before deleting the old AIO durable. Auto-creating here would default --deliver all (VF-16) and replay the whole 72h backlog. Precreate '$CONSUMER' and re-run this Job." >&2
                  exit 1
                  {{- else }}
                  {{- if ne $bDeliver "" }}
                  # bootstrap.deliver={{ $bDeliver }} => create with deliver_policy={{ $expectedPolicy }}{{ if eq $bDeliver "by-time" }} (opt_start_time={{ $bTs }}; natscli reads the RFC3339 --deliver value as by_start_time){{ end }} (design §8.4, R3). Legacy ("") keeps --deliver all.
                  {{- end }}
                  echo "creating pull consumer '$CONSUMER' (filter [$FILTER_SORTED]) on external stream '$STREAM'"
                  nats --server "$SERVER" --creds "$CREDS" consumer add "$STREAM" "$CONSUMER" \
                    --pull \
                    $FILTER_ARGS \
                    --ack explicit \
                    --deliver {{ $deliverArg }} \
                    --replay instant \
                    --wait "$DESIRED_ACKWAIT" \
                    {{- if eq (include "rrcs.connect.shardingEnabled" $) "true" }}
                    --max-pending "$DESIRED_MAXPENDING_C" \
                    {{- else }}
                    --max-pending "$DESIRED_MAXPENDING" \
                    {{- end }}
                    --max-deliver="$DESIRED_MAXDELIVER" \
                    --defaults
                  {{- end }}
                fi
                nats --server "$SERVER" --creds "$CREDS" consumer info "$STREAM" "$CONSUMER"
              done
          volumeMounts:
            - name: manage-creds
              mountPath: /etc/nats-creds/manage
              readOnly: true
          resources:
            {{- toYaml .Values.resources.verifier | nindent 12 }}
{{- end }}
