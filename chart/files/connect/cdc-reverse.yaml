# cdc-reverse.yaml — STREAMS-MODE stream config (input/pipeline/output only).
# Binds to a pre-created durable PULL consumer; switch on op:
#   create/update -> SET kv_key body ; delete -> DEL kv_key ;
#   rename -> EVAL cdc_rename.lua (native RENAME old->new, value-preserving) ;
#   unknown -> throw -> nack.
# No version fence: reordered/late same-key arrivals overwrite (no-LWW).
# reject_errored drop: success acks JetStream; processor failure nacks -> redelivery
# (absorbed by SET/DEL/Lua idempotency).
#
# TRANSPORT DECODING: the forward leg encodes the body as gzip-then-base64
# (envelope enc="gzip:base64"). We decode+decompress it back to the ORIGINAL raw
# bytes when stashing into meta("body"), so every downstream op (SET / HSET via
# parse_json / latency ts parse / rename-Lua) sees exactly the source bytes —
# lossless for binary, identical behaviour for JSON/text. Only this one stash line
# changes; the op switch and apply logic are untouched.
#
# This file is POSTed verbatim by the sink elector once it wins the Lease (the
# http/logger/metrics blocks live in observability.yaml). With active/standby
# leader election only the leader binds the pull consumer, so exactly one POD
# consumes at a time -> clean active/standby failover and no cross-pod
# double-processing. NOTE: within the active pod `pipeline.threads` below still
# processes each fetched batch CONCURRENTLY, so same-key ops within one batch may
# apply out of order — accepted by this lab's no-LWW, order-insensitive design
# (SET/DEL/rename-Lua are idempotent). Set threads: 1 for strict per-key ordering.
input:
  label: __POD__
  nats_jetstream:
    urls:
      - "{{ include "rrcs.nats.url" . }}"
    auth:
      user_credentials_file: {{ .Values.nats.auth.creds.subscriber | quote }}
    stream: {{ .Values.nats.stream.name | quote }}
    durable: {{ .Group.durable | quote }}
    # bind:true => attach to the EXISTING pull consumer the nats-init Job (or
    # scripts/create-consumer.sh) created server-side. Without bind, this input
    # would instead create a durable PUSH consumer. In pull(bind) mode Redpanda
    # Connect derives the subject from the consumer's FilterSubject and IGNORES
    # deliver / ack_wait / max_ack_pending here — those are set on
    # `nats consumer add` (see values nats.stream.consumer.*).
    bind: true

pipeline:
  threads: 4
  processors:
    {{- if .Values.connect.contentLog.enabled }}
    # Dump the raw inbound JetStream message (the full envelope JSON) FIRST, before
    # any processor touches it — the `redis` processor below REPLACES content with
    # the Redis reply, so this is the only place the original NATS payload is intact.
    # Debug-only, gated by connect.contentLog.enabled (dumps real payload data).
    - log:
        level: {{ .Values.connect.contentLog.level }}
        message: "cdc-reverse nats_in"
        fields_mapping: |
          root.leg      = "reverse"
          root.stage    = "nats_in"
          root.envelope = content().string()
    {{- end }}
    # Stash the envelope fields into metadata FIRST: the `redis` processor below
    # REPLACES message content with the Redis reply, so any field needed by a
    # later processor (the metric label) or by args_mapping must live in metadata.
    - mapping: |
        meta op      = this.op
        meta type    = this.type.or("string")
        meta kv_key  = this.kv_key
        meta old_key = this.old_key
        meta new_key = this.new_key
        # OP-GATE the body decode: only create/update carry a value. delete carries
        # just kv_key; rename just old_key/new_key — their envelopes have an empty or
        # absent body (the forward still stamps enc/body for EVERY op, so we must NOT
        # decode blindly: a null/missing body would make .decode("base64") throw ->
        # nack -> redelivery poison-loop). So judge op FIRST, decode body only when the
        # op actually has one; for delete/rename meta("body") stays unset (the switch
        # below never reads it for those ops).
        #   Transport (create/update only): the new forward publishes body as
        #   gzip-then-base64 and marks it enc="gzip:base64" — decode+decompress ONLY
        #   those. Legacy / in-flight create/update messages carry a plain body and no
        #   enc marker, so the else branch passes them through unchanged (a rolling
        #   upgrade or a replay of pre-encoding JetStream messages won't fail the decode).
        # OP-GATE the body decode; on failure set decode_failed so the switch's
        # first branch counts it as unprocessable (reason=decode_error) and nacks —
        # WITHOUT ever reaching the apply logic. .catch(null) turns a bad
        # base64/gzip body into null instead of throwing mid-mapping.
        # Single source for the "carries a gzip:base64 body to decode" gate, so the
        # decode branch and the decode_failed flag can never drift apart.
        let is_encoded = (this.op == "create" || this.op == "update") && this.enc.or("") == "gzip:base64"
        # NOTE the trailing `else { null }`: a Bloblang `let` bound to an
        # if-WITHOUT-else leaves the variable UNDEFINED when the condition is false
        # (delete/rename), and the next line's `$decoded` reference would then throw
        # "variable undefined" and nack every delete/rename forever. `else { null }`
        # makes $decoded null for those ops (meta body stays effectively unset; the
        # delete/rename switch branches read only kv_key/old_key/new_key).
        let decoded = if this.op == "create" || this.op == "update" {
          if $is_encoded {
            this.body.decode("base64").decompress("gzip").catch(null)
          } else { this.body }
        } else { null }
        meta body = $decoded
        meta decode_failed = if $is_encoded && $decoded == null { "yes" } else { "no" }
    {{- if .Values.connect.deadLetter.enabled }}
        # DLQ guard: hash bodies must be a valid JSON OBJECT for the HSET args_mapping
        # below. Validate up front so a malformed body is COUNTED
        # (cdc_unprocessable{reason=hash_decode_error}) and dead-lettered, instead of
        # throwing UN-COUNTED inside the HSET args_mapping (silent poison loop). Only
        # checked for create/update hash bodies that decoded OK.
        let hash_body_ok = if (this.op == "create" || this.op == "update") && this.type.or("string") == "hash" && meta("decode_failed") == "no" {
          # Must be a JSON OBJECT: the HSET args_mapping below does
          # .parse_json().key_values(), which throws on arrays/scalars/strings. A
          # parseable-but-non-object body (e.g. `["a","b"]` or `"5566"`) would slip
          # past a bare != null check and throw UN-COUNTED inside args_mapping. On
          # parse failure .catch(null) yields null whose .type() is "null" -> also
          # (correctly) classified failed.
          $decoded.parse_json().catch(null).type() == "object"
        } else { true }
        meta hash_decode_failed = if $hash_body_ok { "no" } else { "yes" }
    {{- end }}
    {{- if .Values.connect.contentLog.enabled }}
    # Dump exactly what is about to be applied to region Redis (the op switch below
    # turns these into SET / DEL / rename-EVAL). body holds the full value payload.
    # Debug-only, gated by connect.contentLog.enabled (dumps real payload data).
    - log:
        level: {{ .Values.connect.contentLog.level }}
        message: "cdc-reverse redis_apply"
        fields_mapping: |
          root.leg     = "reverse"
          root.stage   = "redis_apply"
          root.op      = meta("op")
          root.type    = meta("type")
          root.kv_key  = meta("kv_key")
          root.old_key = meta("old_key")
          root.new_key = meta("new_key")
          # body is post-decompress raw bytes (may be binary) — log length, not
          # content, so binary doesn't garble the log line. .or("") because body is
          # now unset for delete/rename (op-gated above); null.length() would error.
          root.body_len = meta("body").or("").length()
    {{- end }}
    - switch:
        - check: meta("decode_failed") == "yes"
          processors:
            # Permanent poison: the gzip:base64 body could not be decoded. Count it,
            {{- if .Values.connect.deadLetter.enabled }}
            # then set dlq meta -> the output publishes to <subject>.decode_error and
            # acks only after PubAck (captured, not retried forever).
            {{- else }}
            # then throw to nack (redelivered under maxDeliver=-1 until removed).
            {{- end }}
            - metric:
                type: counter
                name: cdc_unprocessable
                labels:
                  reason: decode_error
            {{- if .Values.connect.deadLetter.enabled }}
            # per-delivery count of messages routed to the DLQ (INV-2). Emitted in
            # the pipeline (not the switch-output case, where `processors` is not a
            # valid field on this Connect build) alongside the dlq meta.
            - metric:
                type: counter
                name: cdc_dlq_forwarded
                labels:
                  reason: decode_error
            - mapping: |
                meta dlq        = "yes"
                meta dlq_reason = "decode_error"
                meta dlq_error  = "undecodable gzip:base64 body for kv_key %s".format(meta("kv_key").or("?"))
            {{- else }}
            - mapping: 'root = throw("decode_error: undecodable gzip:base64 body for kv_key %s".format(meta("kv_key").or("?")))'
            {{- end }}
    {{- if .Values.connect.deadLetter.enabled }}
        - check: meta("hash_decode_failed") == "yes"
          processors:
            - metric:
                type: counter
                name: cdc_unprocessable
                labels:
                  reason: hash_decode_error
            - metric:
                type: counter
                name: cdc_dlq_forwarded
                labels:
                  reason: hash_decode_error
            - mapping: |
                meta dlq        = "yes"
                meta dlq_reason = "hash_decode_error"
                meta dlq_error  = "hash body is not valid JSON for kv_key %s".format(meta("kv_key").or("?"))
    {{- end }}
        - check: meta("op") == "create" || meta("op") == "update"
          processors:
            # Best-effort latency telemetry, emitted BEFORE the SET. ts-bearing
            # bodies only (verifier-injected events without ts are skipped).
            - try:
                - switch:
                    - check: meta("body").parse_json().ts.or(0) > 0
                      processors:
                        - redis:
                            url: {{ include "rrcs.redis.region.url" . }}
                            kind: {{ include "rrcs.redis.region.connectKind" . }}
                            command: xadd
                            args_mapping: |
                              root = [
                                {{ .Values.latencyCalculator.stream | quote }},
                                "MAXLEN", "~", {{ .Values.latencyCalculator.streamMaxLen | quote }}, "*",
                                "op", meta("op"),
                                "kv_key", meta("kv_key"),
                                # parse_json() decodes the JSON number `ts` as a
                              # float64; .string() on it would emit scientific
                              # notation (e.g. 1.78e+12) that downstream int
                              # parsers reject. .int64() coerces back to the
                              # integer epoch-millis the writer encoded.
                              "writer_ts", meta("body").parse_json().ts.int64().string(),
                                "sink_ts", now().ts_unix_milli().string()
                              ]
            - catch:
                - log:
                    level: WARN
                    message: 'latency xadd failed (best-effort, ignored): ${! error() }'
            # Authoritative apply, type-aware. NOT wrapped — a failure must nack/redeliver.
            - switch:
                - check: meta("type") == "hash"
                  processors:
                    - redis:
                        url: {{ include "rrcs.redis.region.url" . }}
                        kind: {{ include "rrcs.redis.region.connectKind" . }}
                        command: hset
                        # Flatten the JSON field-map body into HSET args. Kept on ONE
                        # line: Bloblang rejects a method chain split across newlines
                        # inside the .concat( ) call ("expected comma or closing bracket").
                        # key_values() -> [{key,value}]; map_each -> [[k,v]];
                        # flatten -> [k,v,...]; concat prepends the key.
                        args_mapping: 'root = [meta("kv_key")].concat(meta("body").parse_json().key_values().map_each(kv -> [kv.key, kv.value.string()]).flatten())'
                - processors:
                    - redis:
                        url: {{ include "rrcs.redis.region.url" . }}
                        kind: {{ include "rrcs.redis.region.connectKind" . }}
                        command: set
                        args_mapping: 'root = [ meta("kv_key"), meta("body") ]'
            - metric:
                type: counter
                name: cdc_apply
                labels:
                  op: '${! meta("op") }'
                  type: '${! meta("type") }'
        - check: meta("op") == "delete"
          processors:
            - redis:
                url: {{ include "rrcs.redis.region.url" . }}
                kind: {{ include "rrcs.redis.region.connectKind" . }}
                command: del
                args_mapping: 'root = [ meta("kv_key") ]'
            - metric:
                type: counter
                name: cdc_apply
                labels:
                  op: delete
        - check: meta("op") == "rename"
          processors:
            - redis:
                url: {{ include "rrcs.redis.region.url" . }}
                kind: {{ include "rrcs.redis.region.connectKind" . }}
                command: eval
                args_mapping: |
                  let script = {{ .Files.Get "files/connect/cdc_rename.lua" | toJson }}
                  root = [ $script, 2, meta("old_key"), meta("new_key") ]
            - metric:
                type: counter
                name: cdc_apply
                labels:
                  op: rename
        - processors:
            - metric:
                type: counter
                name: cdc_unprocessable
                labels:
                  reason: unknown_op
            {{- if .Values.connect.deadLetter.enabled }}
            - metric:
                type: counter
                name: cdc_dlq_forwarded
                labels:
                  reason: unknown_op
            - mapping: |
                meta dlq        = "yes"
                meta dlq_reason = "unknown_op"
                meta dlq_error  = "unknown op: %s".format(meta("op").or("missing"))
            {{- else }}
            - mapping: 'root = throw("unknown op: %s".format(meta("op").or("missing")))'
            {{- end }}

output:
{{- if .Values.connect.deadLetter.enabled }}
  # DLQ enabled: applied messages -> drop (ack). Permanent poison (dlq==yes) ->
  # publish to <deadLetter.subject>.<reason> on the same stream, THEN ack (the
  # nats_jetstream send is the write; a send failure surfaces as an output error so
  # reject_errored nacks -> retry = write-then-ack, INV-1 preserved). Transient apply
  # failures still error -> reject_errored -> nack -> redelivery.
  reject_errored:
    switch:
      cases:
        - check: meta("dlq") == "yes"
          output:
            label: dlq_out
            nats_jetstream:
              urls:
                - "{{ include "rrcs.nats.url" . }}"
              auth:
                user_credentials_file: {{ .Values.nats.auth.creds.subscriber | quote }}
              subject: '{{ .Values.connect.deadLetter.subject }}.${! meta("dlq_reason") }'
              headers:
                Nats-Msg-Id: ${! meta("event_id") }
                dlq_reason: ${! meta("dlq_reason") }
                dlq_error: ${! meta("dlq_error") }
                dlq_orig_subject: ${! meta("nats_subject") }
        - output:
            drop: {}
{{- else }}
  reject_errored:
    drop: {}
{{- end }}
