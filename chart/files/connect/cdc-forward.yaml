{{- include "rrcs.connect.forward.assertShardingConsistency" . -}}
# cdc-forward.yaml — STREAMS-MODE stream config (input/pipeline/output only).
# Reads central app.events stream; publishes each CDC event to NATS JetStream on
# <subjectPrefix>.<op> with Nats-Msg-Id=event_id for dedup. XADD fields
# (event_id/op/kv_key/old_key/new_key/ts) arrive as metadata; the body arrives as
# content (body_key=body). We republish a self-contained JSON ENVELOPE in the
# PAYLOAD (op/keys/body inside it) so the sink never depends on NATS
# header->metadata mapping.
#
# TRANSPORT ENCODING (connect.bodyEncoding): when "gzip:base64" the body is carried
# as gzip-then-base64 and tagged with envelope enc="gzip:base64"; when "none" it is
# the legacy plain content().string(). We compress content() RAW BYTES — never
# content().string() — because reinterpreting binary as UTF-8 and stuffing it into a
# JSON string both (a) bloats it (control bytes escape 1->6 as \u00XX) and
# (b) CORRUPTS it (Go's json encoder replaces invalid UTF-8 with U+FFFD,
# irreversibly). base64 is pure ASCII (no JSON escaping, lossless); gzip shrinks
# compressible bodies. The reverse leg AUTO-DETECTS per message via the enc field, so
# it consumes BOTH formats — which makes a backward-safe upgrade reader-first: roll
# the sink leg onto this chart BEFORE flipping bodyEncoding to "gzip:base64" on the
# source, so no encoded body is ever produced for a sink that can't decode it. See
# values.yaml connect.bodyEncoding for the two-step procedure.
#
# This file is POSTed verbatim by the source elector once it wins the Lease (the
# http/logger/metrics blocks live in observability.yaml). The streams REST API
# does NOT expand environment variables, so client_id and output.label use the
# __POD__ token, which the elector replaces with the pod name before POSTing
# (Connect accepts hyphenated labels, so the raw pod name is used verbatim).
input:
  label: redis_source
  redis_streams:
    url: {{ include "rrcs.redis.central.url" . }}
    kind: {{ include "rrcs.redis.central.connectKind" . }}
    streams:
      - app.events
    # Load-bearing (INV-1 row 3, rules/05-invariants.md): the consumer group name
    # `cdc_propagator` is the identity of the Pending Entries List (PEL) that tracks
    # which stream entries have been read but not yet XACKed. Rename it and the new
    # group starts from a fresh PEL, so entries the old group had in flight are never
    # replayed — silent loss. Keep it stable across upgrades.
    consumer_group: cdc_propagator
    # Load-bearing (INV-1 row 2, rules/05-invariants.md): this client id MUST stay
    # stable and role-scoped (the value is `cdc_propagator_active`), never pod-scoped.
    # Redis tracks unacked entries per (group, client_id). If the id embeds the pod
    # name, a SIGKILL orphans that pod's PEL under a name no future pod ever claims,
    # so its in-flight entries are never re-read. That exact bug lost 757 messages in
    # the 2026 failover A/B test (docs/failover-report/REPORT.md). Changing this
    # requires the L4 failover proof — see the invariants table.
    client_id: {{ .Values.connect.source.consumerClientId }}
    body_key: body
    create_streams: true
    start_from_oldest: false
    # Load-bearing (INV-1 row 1, rules/05-invariants.md): this is the "write-then-ack"
    # heartbeat. Connect XACKs the Redis entries it has fully processed every
    # commit_period — and a message only counts as processed once the output stage
    # got its NATS PubAck. So an entry is durably in JetStream BEFORE it is acked in
    # Redis. If the pod dies in the gap, the entry stays in the PEL and is re-read.
    # Never move the ack ahead of the publish.
    commit_period: 200ms
    timeout: 500ms
    limit: {{ .Values.connect.source.readLimit | default 50 }}
    # Load-bearing (INV-1 row 3, rules/05-invariants.md): when the output nacks a
    # message (publish failed), auto_replay_nacks re-reads it from the PEL instead of
    # leaving it stuck. This is what turns a nack into an actual retry. Pair it with
    # the output fallback's `reject` child below (non-sharded) or the blocking
    # in-place retry of the sharded output.
    auto_replay_nacks: true

pipeline:
  {{- if eq (include "rrcs.connect.shardingEnabled" .) "true" }}
  # O-3 (design v2 §3): read order == process order. Serialized pipeline is a
  # link in the ordering chain that REPLACES the LWW fence — hard-coded, no
  # values override. Loosening it silently reintroduces old-overwrites-new
  # with no metric able to detect it.
  {{- end }}
  threads: {{ include "rrcs.connect.forward.threads" . }}
  processors:
    {{- if .Values.connect.contentLog.enabled }}
    # Dump the raw inbound Redis stream entry (app.events): XADD fields arrive as
    # metadata, the body arrives as content. Logged BEFORE the mapping so it shows
    # exactly what was read off the stream. Pass-through — does not alter the message.
    # Debug-only, gated by connect.contentLog.enabled (dumps real payload data).
    - log:
        level: {{ .Values.connect.contentLog.level }}
        message: "cdc-forward redis_in"
        fields_mapping: |
          root.leg   = "forward"
          root.stage = "redis_in"
          root.meta  = metadata()
          root.body  = content().string()
    {{- end }}
    - mapping: |
        # Hash content() (raw bytes), not content().string(): stable for binary and
        # independent of any string reinterpretation.
        let eid  = meta("event_id").or(content().hash("sha256").encode("hex"))
        root = {
          "event_id": $eid,
          "op":       meta("op").or("update"),
          "type":     meta("type").or("string"),
          "kv_key":   meta("kv_key").or(""),
          "old_key":  meta("old_key").or(""),
          "new_key":  meta("new_key").or(""),
          "ts":       meta("ts").or("0"),
          {{- if eq (include "rrcs.connect.bodyEncoding" .) "gzip:base64" }}
          "enc":      "gzip:base64",                                   # self-describing marker; the reverse leg auto-detects it
          "body":     content().compress("gzip").encode("base64")      # raw bytes -> gzip -> base64: lossless, no JSON escape/U+FFFD
          {{- else }}
          "body":     content().string()                              # legacy plain body (UTF-8 only); no enc marker -> reverse passes through
          {{- end }}
        }
        meta op       = meta("op").or("update")     # used for the subject interpolation
        meta event_id = $eid                          # used for the Nats-Msg-Id header
        {{- if eq (include "rrcs.connect.prefixRouting" .) "true" }}
        # Prefix routing (first-two-segment, set-based): match the key's first
        # TWO ':'-segments, then its first ONE, against the configured prefix
        # set (rrcs.connect.routeMap: raw prefix -> subject token, ':' -> '.').
        # A hit publishes to <subjectPrefix>.<token>.<op>, which exactly one
        # group's durable filters (<subjectPrefix>.<token>.>). NO hit => token
        # "others" (<subjectPrefix>.others.<op>): consumed by the catchAll group
        # when one is deployed, otherwise it parks in the stream — either way
        # counted by the switch below via kv_prefix_reason. rename/delete may
        # omit kv_key, so fall back to new_key (.or() fires on ABSENT metadata);
        # a key with no derivable first segment is "empty_prefix" (malformed).
        # kv_prefix_reason is internal: the NATS output sends only explicit
        # headers, so neither meta leaves this process.
        let raw_key = meta("kv_key").or(meta("new_key")).or("")
        let segs    = $raw_key.split(":")
        let p1      = $segs.index(0)
        let p2      = $segs.slice(0, 2).join(":")
        let routes  = {{ include "rrcs.connect.routeMap" . }}
        let hit     = $routes.get($p2).or($routes.get($p1))
        {{- if eq (include "rrcs.connect.shardingEnabled" .) "true" }}
        let base_prefix = $hit.or("others")
        # ── Per-key sharding (design v2 D-1/D-2): family hit => fold the shard
        # token into kv_prefix (kv.cdc.<family>.s<K>.<op>). Shard key = the
        # numeric id captured by keyPattern — deliberately excludes the
        # active/standby segment, so every variant of one entity lands on one
        # shard, one durable, one consumer. Computed via $base_prefix (a let,
        # NOT a meta read-back: meta() reads the INPUT message's metadata, so
        # reading kv_prefix back here would see pre-mapping state).
        # shard_map is keyed by the RAW (colon) family and looked up with the
        # same $p2/$p1 keys as the routeMap: Bloblang .get() path-splits on '.',
        # so a dotted-token key would never match.
        let shard_map = {{ include "rrcs.connect.shardMap" . }}
        let fam_n     = $shard_map.get($p2).or($shard_map.get($p1))
        let sh_id     = if $fam_n != null {
            $raw_key.re_find_object({{ include "rrcs.connect.sharding.keyPatternLit" . }}).catch({}).get("id").or("")
          } else { "" }
        let sh_tok    = if $fam_n == null { "" }
          else if $sh_id == "" { "sx" }
          # An id >= 2^63 overflows the .int64() cast ("float value too large to
          # be cast as a signed integer"); .catch("sx") routes it to the
          # isolation shard exactly like a missing id, instead of erroring the
          # mapping. A mapping error would leave kv_prefix unset -> the bare
          # sharded output publishes to kv.cdc.<fam>.null.<op>, the stream
          # (kv.cdc.>) accepts it, PubAck triggers XACK, and NO consumer filter
          # matches -> silent per-message loss with zero metrics.
          else { ("s" + ($sh_id.number().int64() % $fam_n.int64()).string()).catch("sx") }
        # Cross-shard rename assertion (INV-S7): ANY disagreement among the
        # rename's parsed ids — old vs new, or (when the producer set kv_key,
        # which this repo's writer never does) the routing key vs new — means
        # the same-entity-same-shard premise broke. Quarantine to sx instead of
        # letting one rename's ordering split across two consumers. Note ids
        # go through .number() (float64): between 2^53 and 2^63 precision loss
        # shifts PLACEMENT only — it stays deterministic per id string, so
        # same-entity-same-shard and this consistency check are unaffected. At
        # or above 2^63 the .int64() cast ERRORS (float too large to cast); the
        # id arithmetic below is .catch(false)-wrapped so an overflowing rename
        # falls through to the sh_id/sh_tok path (sx + "unparseable"), NOT to
        # cross_shard_rename — an overflow is an unplaceable id, not an INV-S7
        # violation, so it must not perturb that must-stay-0 counter. Letting it
        # error instead would leave kv_prefix unset -> silent loss (see sh_tok).
        let old_id = meta("old_key").or("").re_find_object({{ include "rrcs.connect.sharding.keyPatternLit" . }}).catch({}).get("id").or("")
        let new_id = meta("new_key").or("").re_find_object({{ include "rrcs.connect.sharding.keyPatternLit" . }}).catch({}).get("id").or("")
        let x_shard = $fam_n != null && meta("op").or("") == "rename" &&
                      (($old_id != "" && $new_id != "" &&
                        ($old_id.number().int64() % $fam_n.int64()) != ($new_id.number().int64() % $fam_n.int64())) ||
                       ($sh_id != "" && $new_id != "" &&
                        ($sh_id.number().int64() % $fam_n.int64()) != ($new_id.number().int64() % $fam_n.int64()))).catch(false)
        meta kv_prefix = if $fam_n == null { $base_prefix }
          else if $x_shard { $base_prefix + ".sx" }
          else { $base_prefix + "." + $sh_tok }
        meta kv_prefix_reason = if $p1 == "" { "empty_prefix" } else if $hit == null { "no_match" } else { "matched" }
        # "none" (not ""): empty-string metadata reads back as absent across
        # processors, which would make the counter switch below unreliable.
        meta kv_shard_reason = if $fam_n == null { "none" }
          else if $x_shard { "cross_shard_rename" }
          else if $sh_tok == "sx" { "unparseable" }
          else { "sharded" }
        {{- else }}
        meta kv_prefix        = $hit.or("others")
        meta kv_prefix_reason = if $p1 == "" { "empty_prefix" } else if $hit == null { "no_match" } else { "matched" }
        {{- end }}
        {{- end }}
    {{- if eq (include "rrcs.connect.prefixRouting" .) "true" }}
    # Routing-miss visibility (INV-2). empty_prefix (no derivable key segment —
    # malformed event) is ALWAYS cdc_forward_unrouted. A set-miss (no_match) is
    # cdc_forward_others when a catchAll group consumes kv.cdc.others.> (routed,
    # legitimate traffic), but cdc_forward_unrouted when NO catchAll exists (the
    # event parks unconsumed => the CDCForwardUnrouted alert fires, unchanged).
    # The `switch` passes every message through untouched. Gated on prefix
    # routing so the default (non-prefix) render is byte-identical.
    - switch:
        - check: meta("kv_prefix_reason") == "empty_prefix"
          processors:
            - metric:
                type: counter
                name: cdc_forward_unrouted
                labels:
                  reason: empty_prefix
        - check: meta("kv_prefix_reason") == "no_match"
          processors:
            {{- if eq (include "rrcs.connect.hasCatchAll" .) "true" }}
            - metric:
                type: counter
                name: cdc_forward_others
                labels:
                  reason: no_match
            {{- else }}
            - metric:
                type: counter
                name: cdc_forward_unrouted
                labels:
                  reason: no_match
            {{- end }}
        {{- if eq (include "rrcs.connect.shardingEnabled" .) "true" }}
        # Sharding isolation lane (design v2 D-9): both land on the family's sx
        # subject — still delivered (sx durable), never dropped. unparseable =
        # a family key without the keyPattern id (key contract broken);
        # cross_shard_rename = INV-S7 violation, any non-zero value is a bug.
        - check: meta("kv_shard_reason") == "unparseable"
          processors:
            - metric:
                type: counter
                name: cdc_forward_unrouted
                labels:
                  reason: unparseable_shard
        - check: meta("kv_shard_reason") == "cross_shard_rename"
          processors:
            - metric:
                type: counter
                name: cdc_forward_cross_shard_rename
                labels:
                  reason: invariant_violation
        {{- end }}
    {{- end }}
    {{- if .Values.connect.contentLog.enabled }}
    # Dump the self-contained JSON envelope about to be published to JetStream,
    # plus the op/event_id meta that drive subject interpolation and the
    # Nats-Msg-Id dedup header. Logged AFTER the mapping (content() is now the envelope).
    # Debug-only, gated by connect.contentLog.enabled (dumps real payload data).
    - log:
        level: {{ .Values.connect.contentLog.level }}
        message: "cdc-forward nats_out"
        fields_mapping: |
          root.leg      = "forward"
          root.stage    = "nats_out"
          root.subject_op = meta("op")
          root.event_id = meta("event_id")
          root.envelope = content().string()
    {{- end }}

output:
  label: __POD__
  {{- if eq (include "rrcs.connect.shardingEnabled" .) "true" }}
  # O-4 (design v2 §3, D-6/D-7): SERIALIZED publish — wait for each PubAck
  # before the next publish; on failure retry IN PLACE (blocking backpressure).
  # There is deliberately NO fallback/reject path here: a forward-leg nack goes
  # back to the Redis PEL, and PEL replay would re-emit the nacked (older)
  # event AFTER later events that already published — silent out-of-order
  # apply. Blocking beats reordering (fail-stop > silent corruption). Publish
  # failures are visible via output_error / output_connection_* + the backlog
  # alert (CDCForwardPublishBlocked) instead of cdc_forward_publish_failed.
  # Ceiling: ~1/RTT(central Connect ↔ NATS) msg/s for ALL families combined —
  # the known price of the no-fence design (design v2 §14).
  nats_jetstream:
    urls:
      - "{{ include "rrcs.nats.url" . }}"
    auth:
      user_credentials_file: {{ .Values.nats.auth.creds.publisher | quote }}
    subject: {{ include "rrcs.nats.stream.publishSubject" . | quote }}
    headers:
      # Load-bearing (INV-1 row 4, rules/05-invariants.md): stamping event_id as the
      # Nats-Msg-Id lets JetStream server-side dedup absorb a replay. If the pod
      # crashes AFTER the publish but BEFORE the Redis XACK, the entry is re-read and
      # re-published — same event_id, so JetStream returns PubAck{duplicate} and the
      # sink sees it once. This is why at-least-once does not become
      # at-least-twice-applied. Keep the dupe window (nats.stream.dupeWindow) wider
      # than the realistic crash-replay gap (INV-1 row 5).
      Nats-Msg-Id: ${! meta("event_id") }
      Content-Type: application/json
    # Load-bearing (INV-1 row 13, rules/05-invariants.md): max_in_flight: 1 makes the
    # publish SERIAL — one PubAck before the next publish. In the sharded (v2) design
    # this is a link in the ordering chain that replaces the old last-writer-wins
    # fence: allowing >1 in flight lets a later event's PubAck land before an earlier
    # one's, so an older value can overwrite a newer one on the same key, and NO
    # metric can detect it. Never raise this in the sharded render.
    max_in_flight: {{ include "rrcs.connect.forward.maxInFlight" . }}
  {{- else }}
  # Non-sharded output: a two-child `fallback`. Child 1 tries the real JetStream
  # publish; child 2 runs ONLY if child 1 failed, to count and nack.
  #
  # Why this exists:
  # - We need "publish failed" to become a retry, not a silent drop. `fallback`
  #   gives us a place to react to the failure while keeping the entry un-acked.
  #
  # Important details:
  # - Load-bearing (INV-1 row 11, rules/05-invariants.md): the failure child MUST
  #   stay `reject` (nack -> replay). Never change it to `drop` or anything that
  #   "succeeds" without a real PubAck — that would XACK an entry that never reached
  #   JetStream, which is exactly the silent-loss shape INV-1 forbids.
  # - The sharded render (the `if` branch above) deliberately has NO fallback — see
  #   that block's comment for why a forward nack would reorder there.
  fallback:
    # Child 1 — the real publish. Every load-bearing setting (Nats-Msg-Id dedup
    # header, publish-then-XACK ordering via the input's commit_period) lives
    # here unchanged.
    - nats_jetstream:
        urls:
          - "{{ include "rrcs.nats.url" . }}"
        auth:
          user_credentials_file: {{ .Values.nats.auth.creds.publisher | quote }}
        subject: {{ include "rrcs.nats.stream.publishSubject" . | quote }}
        headers:
          Nats-Msg-Id: ${! meta("event_id") }
          Content-Type: application/json
        max_in_flight: {{ .Values.connect.source.maxInFlight | default 256 }}
    # Child 2 — reached only when the JetStream publish failed. Count it, then
    # reject: the message is NACKed back to the redis_streams input, which
    # replays it (auto_replay_nacks) — the entry is never XACKed here, so the
    # at-least-once write-then-ack guarantee is unchanged; this branch only
    # makes the failure visible (INV-2: forward-leg publish-failure metric).
    - reject: 'jetstream publish failed: ${! metadata("fallback_error") }'
      processors:
        - metric:
            type: counter
            name: cdc_forward_publish_failed
            labels:
              reason: publish_error
  {{- end }}
