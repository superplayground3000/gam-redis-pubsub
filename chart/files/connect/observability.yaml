# Streams-mode bootstrap config (passed via `connect streams -o`). Holds the
# http/logger/metrics that a run-mode pipeline would carry at its top level.
# The actual stream (input/pipeline/output) is POSTed at runtime by the elector
# sidecar over the streams REST API on :4195.
http:
  address: 0.0.0.0:4195
  enabled: true
logger:
  level: INFO
  format: json
  add_timestamp: true
metrics:
  prometheus:
    # Load-bearing (INV-2, rules/05-invariants.md): use_histogram_timing makes every
    # `timing` metric (e.g. cdc_sync_latency_seconds, and the built-in
    # processor_latency_ns) export as a Prometheus histogram, which is what the
    # Grafana dashboard's p50/p95/p99 panels query. Quirk of this pinned Connect
    # build: the pipelines feed timing VALUES in nanoseconds and the metric NAMES
    # still end in _ns, but the exporter divides by 1e9 so the recorded BUCKETS are
    # SECONDS. Always read these values as seconds; never rename a metric to _seconds
    # expecting a unit change, and never add an _ns suffix expecting nanoseconds.
    use_histogram_timing: true
    # Buckets are SECONDS (exporter divides timing ns by 1e9). 30/60/120 keep
    # outage/PEL-replay tails out of +Inf (DefBuckets top out at 10s). GLOBAL:
    # the built-in timing metrics (processor_latency_ns etc.) get the same
    # seconds buckets — owner-approved 2026-07-13.
    histogram_buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30, 60, 120]
