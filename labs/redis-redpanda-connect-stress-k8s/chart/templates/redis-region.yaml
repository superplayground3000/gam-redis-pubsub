{{- if not .Values.redis.region.external.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "redis-region") }}
  labels: { app: redis-region }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis-region }
  template:
    metadata:
      labels: { app: redis-region }
    spec:
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      containers:
        - name: redis
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.redis.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args:
            - redis-server
            - --notify-keyspace-events
            - ""
            - --appendonly
            - "no"
            - --save
            - ""
            - --protected-mode
            - "no"
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          livenessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources.redis | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "redis-region") }}
  labels: { app: redis-region }
spec:
  selector: { app: redis-region }
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- end }}
