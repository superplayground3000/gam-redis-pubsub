# Reads central Redis stream and publishes each entry to NATS JetStream.
# Each XADD entry has fields: event_id, key, value, pattern, t_send_ms.
#   key     = lp:m2g:active:employee:<id>  or  lp:r2g:active:tkms:<rule>#<role>
#   pattern = "m2g" or "r2g"
#   value   = SHA-256 hex hash of the key's current content (set by the writer)
# body_key=value -> message body is the hash string; the rest land as metadata.

http:
  address: 0.0.0.0:4195
  enabled: true

input:
  label: redis_source
  redis_streams:
    url: {{ include "rrcs.redis.central.url" . }}
    kind: simple
    streams: [app.events]
    consumer_group: propagator
    client_id: ${HOSTNAME:rpconnect-forward}
    body_key: value
    create_streams: true
    start_from_oldest: false
    commit_period: 200ms
    timeout: 500ms
    limit: 50
    auto_replay_nacks: true

pipeline:
  threads: 2
  processors:
    # Re-wrap as a JSON envelope so the reverse leg has key + hash-value
    # without depending on NATS header passthrough behavior.
    - mapping: |
        let original_value = content().string()
        root = {
          "key":        meta("key").or("unknown"),
          "value":      $original_value,
          "event_id":   meta("event_id").or("unknown"),
          "pattern":    meta("pattern").or("unknown"),
          "t_send_ms":  meta("t_send_ms").or("0").number()
        }
        # Fallback: use the hash string itself as the dedup ID. It is sha256(key:seq)
        # so it is deterministic across retries — a retried message produces the
        # same fallback and JetStream dedup absorbs it correctly.
        meta event_id = meta("event_id").or($original_value)
        meta pattern  = meta("pattern").or("unknown")

output:
  label: jetstream_sink
  nats_jetstream:
    urls: ["{{ include "rrcs.nats.url" . }}"]
    auth: { user_credentials_file: {{ .Values.nats.auth.creds.publisher | quote }} }
    subject: {{ include "rrcs.nats.stream.publishSubject" . | quote }}
    headers:
      Nats-Msg-Id: ${! meta("event_id") }
      Content-Type: application/json
    max_in_flight: 256

logger:
  level: INFO
  format: json
  add_timestamp: true
