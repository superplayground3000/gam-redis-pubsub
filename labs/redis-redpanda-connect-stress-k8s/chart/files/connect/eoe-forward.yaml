# QoS profile: exactly-once-effective (EOE).
# Identical forward leg to ALO: at-least-once into JetStream, with the
# Nats-Msg-Id header keyed to event_id so the JetStream duplicate window
# absorbs forward-leg retries. The "exactly-once" part is enforced by the
# sink-side dedup gate in eoe-reverse.yaml.

http:
  address: 0.0.0.0:4195
  enabled: true

input:
  label: redis_source
  redis_streams:
    url: {{ include "rrcs.redis.central.url" . }}
    kind: simple
    streams: [app.events]
    consumer_group: propagator
    client_id: ${HOSTNAME:rpconnect-source}
    body_key: value
    create_streams: true
    start_from_oldest: false
    commit_period: 200ms
    timeout: 500ms
    limit: 50
    auto_replay_nacks: true

pipeline:
  threads: 2
  processors:
    - mapping: |
        let original_value = content().string()
        root = {
          "key":        meta("key").or("unknown"),
          "value":      $original_value,
          "event_id":   meta("event_id").or("unknown"),
          "pattern":    meta("pattern").or("unknown"),
          "t_send_ms":  meta("t_send_ms").or("0").number()
        }
        meta event_id = meta("event_id").or($original_value.hash("sha256").encode("hex"))
        meta pattern  = meta("pattern").or("unknown")

output:
  label: jetstream_sink
  nats_jetstream:
    urls: ["{{ include "rrcs.nats.url" . }}"]
    auth: { user_credentials_file: {{ .Values.nats.auth.creds.publisher | quote }} }
    subject: {{ include "rrcs.nats.stream.publishSubject" . | quote }}
    headers:
      Nats-Msg-Id: ${! meta("event_id") }
      Content-Type: application/json
    max_in_flight: 256

logger:
  level: INFO
  format: json
  add_timestamp: true
