# QoS profile: at-most-once (AMO).
# Ephemeral consumer + deliver=new + short ack_wait:
#   - No `durable:` -> consumer state is lost when this container dies.
#   - `deliver: new` -> on reconnect a fresh ephemeral consumer skips the
#     backlog accumulated during the outage.
# Net effect: messages produced while connect-sink was down NEVER reach
# region-events. AMO silently drops messages produced during the outage.

http:
  address: 0.0.0.0:4195
  enabled: true

input:
  label: jetstream_source
  nats_jetstream:
    urls: ["{{ include "rrcs.nats.url" . }}"]
    auth: { user_credentials_file: {{ .Values.nats.auth.creds.subscriber | quote }} }
    subject: {{ .Values.nats.stream.subjects | quote }}
    stream: {{ .Values.nats.stream.name | quote }}
    deliver: new
    ack_wait: 2s

pipeline:
  threads: 2
  processors:
    - mapping: |
        meta key        = this.key
        meta event_id   = this.event_id
        meta pattern    = this.pattern
        meta t_send_ms  = this.t_send_ms.string()
        meta applied_ms = (timestamp_unix_nano() / 1000000).string()
        root = this.value

output:
  label: region_sink
  broker:
    pattern: fan_out
    outputs:
      - cache:
          target: region_kv
          key: ${! meta("key") }
          max_in_flight: 64
      - redis_streams:
          url: {{ include "rrcs.redis.region.url" . }}
          stream: region-events
          body_key: value
          max_length: 100000
          max_in_flight: 64
          metadata:
            exclude_prefixes: ["nats_"]

cache_resources:
  - label: region_kv
    redis:
      url: {{ include "rrcs.redis.region.url" . }}
      kind: simple

logger:
  level: INFO
  format: json
  add_timestamp: true
