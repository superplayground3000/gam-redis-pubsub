name: redis-redpanda-throughput-stress

services:
  redis-central:
    image: redis:7.4-alpine
    container_name: rrts-redis-central
    command:
      - "redis-server"
      - "--notify-keyspace-events"
      - ""
      - "--appendonly"
      - "no"
      - "--save"
      - ""
    ports:
      - "${REDIS_CENTRAL_PORT:-17379}:6379"
    deploy:
      resources:
        limits: { cpus: "2.0", memory: "512m" }
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks: [rrts]

  redis-region:
    image: redis:7.4-alpine
    container_name: rrts-redis-region
    command:
      - "redis-server"
      - "--notify-keyspace-events"
      - ""
      - "--appendonly"
      - "no"
      - "--save"
      - ""
    ports:
      - "${REDIS_REGION_PORT:-17380}:6379"
    deploy:
      resources:
        limits: { cpus: "2.0", memory: "512m" }
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks: [rrts]

  nats:
    image: nats:2.10-alpine
    container_name: rrts-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${NATS_CLIENT_PORT:-17222}:4222"
      - "${NATS_MON_PORT:-17322}:8222"
    deploy:
      resources:
        limits: { cpus: "2.0", memory: "1g" }
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks: [rrts]

  nats-init:
    image: natsio/nats-box:0.14.5
    container_name: rrts-nats-init
    depends_on:
      nats: { condition: service_healthy }
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if nats --server nats://nats:4222 stream info APP_EVENTS >/dev/null 2>&1; then
          echo "APP_EVENTS already exists"
        else
          nats --server nats://nats:4222 stream add APP_EVENTS \
            --subjects 'app.events.>' \
            --storage file \
            --replicas 1 \
            --retention limits \
            --discard old \
            --max-age 1h \
            --max-bytes 256MB \
            --max-msgs=-1 \
            --max-msg-size=1MB \
            --dupe-window 5m \
            --defaults
        fi
        nats --server nats://nats:4222 stream info APP_EVENTS
    networks: [rrts]

  connect-source:
    image: hpdevelop/connect:4.92.0-claudefix
    container_name: rrts-connect-source
    depends_on:
      redis-central: { condition: service_healthy }
      nats-init: { condition: service_completed_successfully }
    volumes:
      - ./connect/${PROFILE_QOS:-alo}-forward.yaml:/connect.yaml:ro
    command: ["run", "/connect.yaml"]
    ports:
      - "${CONNECT_SRC_PORT:-17195}:4195"
    deploy:
      resources:
        limits: { cpus: "2.0", memory: "1g" }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4195/ready"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks: [rrts]

  connect-sink:
    image: hpdevelop/connect:4.92.0-claudefix
    container_name: rrts-connect-sink
    depends_on:
      redis-region: { condition: service_healthy }
      nats-init: { condition: service_completed_successfully }
    volumes:
      - ./connect/${PROFILE_QOS:-alo}-reverse.yaml:/connect.yaml:ro
    command: ["run", "/connect.yaml"]
    ports:
      - "${CONNECT_SINK_PORT:-17196}:4195"
    deploy:
      resources:
        limits: { cpus: "2.0", memory: "1g" }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4195/ready"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks: [rrts]

  writer:
    build: ./writer
    container_name: rrts-writer
    depends_on:
      redis-central: { condition: service_healthy }
      connect-source: { condition: service_healthy }
    environment:
      REDIS_ADDR: redis-central:6379
      STREAM_KEY: app.events
      STREAM_MAXLEN: "${STREAM_MAXLEN:-100000}"
      WORKERS: "${WORKERS:-8}"
      PIPELINE_DEPTH: "${PIPELINE_DEPTH:-50}"
      INITIAL_RATE: "0"
      KEY_SPACE_SIZE: "${KEY_SPACE_SIZE:-100000}"
      PAYLOAD_BYTES: "${PAYLOAD_BYTES:-200}"
      MAX_RATE: "${MAX_RATE:-20000}"
      HEALTH_ADDR: ":8081"
    ports:
      - "${WRITER_PORT:-17081}:8081"
    deploy:
      resources:
        limits: { cpus: "2.0", memory: "256m" }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks: [rrts]

  collector:
    build: ./collector
    container_name: rrts-collector
    profiles: ["tools"]
    depends_on:
      writer: { condition: service_healthy }
      redis-central: { condition: service_healthy }
      redis-region: { condition: service_healthy }
      nats: { condition: service_healthy }
      connect-source: { condition: service_healthy }
      connect-sink: { condition: service_healthy }
    volumes:
      - ./reports:/reports
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "128m" }
    networks: [rrts]

networks:
  rrts:
    name: rrts-net

volumes:
  nats-data:
