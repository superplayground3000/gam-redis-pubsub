# QoS profile: at-least-once (ALO).
# Consumes JetStream APP_EVENTS; for each delivery, fans out to region Redis:
#   1. SET <key> <value>            (KV state replication, via cache output)
#   2. XADD region-events ...        (delivery ledger, via redis_streams output)
# Durable consumer + ack-explicit means a sink crash/restart replays unacked.

http:
  address: 0.0.0.0:4195
  enabled: true

input:
  label: jetstream_source
  nats_jetstream:
    urls: [nats://nats:4222]
    subject: app.events.>
    durable: region-writer
    deliver: all
    ack_wait: 30s

pipeline:
  threads: 4
  processors:
    # Lift fields into metadata so the body is just the value JSON.
    - mapping: |
        meta key        = this.key
        meta event_id   = this.event_id
        meta pattern    = this.pattern
        meta t_send_ms  = this.t_send_ms.string()
        meta applied_ms = (timestamp_unix_nano() / 1000000).floor().string()
        root = this.value

output:
  label: region_sink
  broker:
    pattern: fan_out
    outputs:
      - cache:
          target: region_kv
          key: ${! meta("key") }
          max_in_flight: 1024
      - redis_streams:
          url: redis://redis-region:6379
          stream: region-events
          body_key: value
          max_length: 2000000
          max_in_flight: 1024
          metadata:
            exclude_prefixes: ["nats_"]

cache_resources:
  - label: region_kv
    redis:
      url: redis://redis-region:6379
      kind: simple

logger:
  level: INFO
  format: json
  add_timestamp: true
