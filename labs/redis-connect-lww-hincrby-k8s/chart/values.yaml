# Active QoS profile. Selects which connect config pair is mounted
# (files/connect/<profile>-forward.yaml + <profile>-reverse.yaml).
profile: lww

# Prefix that the rrcs.name helper prepends to every chart-rendered
# Kubernetes resource name (this chart renders: Deployments, Services,
# ConfigMaps, Secrets, Jobs, and one optional PVC). Empty string
# disables prefixing for back-compat with any existing values overrides
# that reference the unprefixed names.
#
# Length budget: see docs/superpowers/specs/2026-06-03-rrcs-k8s-resource-name-prefix-design.md §2.1.
# Binding case is the harness-generated verifier Job
# (verifier-<epoch>): default "lab-" leaves ample headroom for a custom
# prefix. The verifier-Job template fails loud at render time if you exceed
# the 57-char name budget.
resourcePrefix: "lab-"

# The chart does NOT template a Namespace (design fix #3). Install with:
#   helm install rrcs ./chart -n rrcs-k8s --create-namespace

images:
  registry: ""              # prepended to every image ref. "" => use ref as-is.
  pullPolicy: IfNotPresent  # global default; public images need this on kind.
  pullSecrets: []           # list of { name: <secret-name> }

redis:
  image: redis:7.4-alpine          # used only in bundled mode
  central:
    external:
      enabled: false
      url: ""                      # required when enabled, e.g. "redis://redis.prod:6379"
      authSecret: ""               # RESERVED — v1 does NOT consume it (see spec §2 non-goals)
  region:
    external:
      enabled: false
      url: ""
      authSecret: ""               # RESERVED — v1 does NOT consume it

nats:
  external:
    enabled: false                # bundled (default) → chart deploys NATS + mints creds
    url: ""                       # required when enabled, e.g. "nats://nats.prod.example.com:4222"
    monitorUrl: ""                # optional; "" → verifier skips JetStream pending checks during quiescence
    auth:
      publisherSecret: ""         # pre-created Secret name, key: user.creds
      subscriberSecret: ""
      adminSecret: ""             # optional; "" → harness purge is skipped with warning
  # ── bundled-mode config below; ignored when external.enabled=true ──
  image: nats:2.10-alpine
  clientPort: 4222
  monitorPort: 8222
  stream:
    name: APP_EVENTS
    # Single source of truth for the NATS subject namespace. The stream binds
    # to "<subjectPrefix>.>" and connect-source publishes to
    # "<subjectPrefix>.${! meta(\"pattern\") }". The publisher user JWT minted
    # by scripts/gen-nats-auth.sh also grants --allow-pub on "<subjectPrefix>.>".
    #
    # Changing this after first install:
    #   1. scripts/gen-nats-auth.sh --force         # rotates publisher creds
    #                                               # (the JWT pins the old prefix)
    #   2. helm upgrade rrcs ./chart ...            # init Job re-runs (its name is
    #                                               # hash-derived from .Values.nats.stream)
    #                                               # and reconciles the stream's
    #                                               # bound subjects via
    #                                               # `nats stream edit --subjects=...`
    #   3. kubectl rollout restart \                # ConfigMaps update but Connect
    #        deployment/connect-source \            # pods do not auto-reload; bounce
    #        deployment/connect-sink                # them so the new subject is in use
    # Bundled mode automates step 2 via the init Job; external mode requires
    # the operator to reconcile the stream out-of-band.
    subjectPrefix: "app.events"
    consumer:
      durable: "region-writer"
    maxAge: "1h"
    maxBytes: "256MB"
    maxMsgSize: "1MB"
    dupeWindow: "5m"
  persistence:
    mode: emptyDir
    size: 4Gi
    storageClassName: ""
  auth:                            # bundled-mode rendered creds Secrets + in-pod mount paths
    secrets:
      publisher: publisher-creds
      subscriber: subscriber-creds
      admin: admin-creds
    creds:
      publisher: /etc/nats-creds/publisher/user.creds
      subscriber: /etc/nats-creds/subscriber/user.creds
      admin: /etc/nats-creds/admin/user.creds

natsBox:
  image: natsio/nats-box:0.14.5

connect:
  image: hpdevelop/connect:4.92.0-claudefix
  # Multi-instance is the whole point of this lab: source + sink run N>1 so that
  # reordering is INTER-pod (parallel stream consumption at the source; concurrent
  # same-key CAS at the sink), not just intra-pod threads. The LWW fence must hold
  # regardless. >=2 each is required to exercise the property; 3 is the default.
  source:
    replicas: 3
  sink:
    replicas: 3

writer:
  image: redis-rrcs/writer:dev
  pullPolicy: ""            # "" => inherit images.pullPolicy
  env:
    STREAM_MAXLEN: "100000"
    WORKERS: "8"
    PIPELINE_DEPTH: "50"
    # Small keyspace ON PURPOSE: same-key messages must fall within the pipeline's
    # in-flight windows (connect-source max_in_flight=256, connect-sink threads=4) to
    # actually reorder — which is what the LWW fence must survive. At KEY_SPACE_SIZE=32
    # same-key messages are ~32 apart in the stream (<< 256), so reordering is the
    # common case and the verifier reliably observes stale>0. Larger values (e.g. 1000)
    # space same-key messages beyond the in-flight window → no reorder → inconclusive.
    KEY_SPACE_SIZE: "64"
    PAYLOAD_BYTES: "200"
    MAX_RATE: "20000"
    # Op-mix weights for the writer's set/delete/rename selection.
    OP_W_SET: "8"
    OP_W_DELETE: "1"
    OP_W_RENAME: "1"

# GC sweeper: tombstone reaper that drops region keys whose tombstone is older
# than gc.horizon, polling every gc.interval.
gc:
  image: redis-rrcs/gc-sweeper:dev
  pullPolicy: ""
  horizon: "5m"
  interval: "30s"

# Sweep harness tiers (rate ladder) + per-tier duration, consumed by scripts.
sweep:
  tiers: "5000,10000,20000,40000"
  durationS: 30

# HTML report generator image.
report:
  image: redis-rrcs/report-gen:dev
  pullPolicy: ""

dashboard:
  image: redis-rrcs/dashboard:dev
  pullPolicy: ""            # "" => inherit images.pullPolicy

verifier:
  image: redis-rrcs/verifier:dev
  pullPolicy: ""
  run: false           # harness renders the Job
  jobName: ""
  epoch: "run"         # harness sets a unique value per run
  rate: 5000
  durationS: 30
  warmupS: 5
  drainS: 10

scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}

resources:
  redis:
    requests: { cpu: 250m, memory: 128Mi }
    limits:   { cpu: "2",  memory: 512Mi }
  nats:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: "2",  memory: 1Gi }
  connect:
    requests: { cpu: 500m, memory: 256Mi }
    limits:   { cpu: "2",  memory: 1Gi }
  writer:
    requests: { cpu: 250m, memory: 64Mi }
    limits:   { cpu: "2",  memory: 256Mi }
  verifier:
    requests: { cpu: 100m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 128Mi }
  dashboard:
    requests: { cpu: 100m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 128Mi }
  gc:
    requests: { cpu: 100m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 128Mi }
