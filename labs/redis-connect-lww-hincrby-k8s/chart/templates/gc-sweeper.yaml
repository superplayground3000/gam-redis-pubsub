apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "gc-sweeper") }}
  labels: { app: gc-sweeper }
spec:
  replicas: 1
  selector:
    matchLabels: { app: gc-sweeper }
  template:
    metadata:
      labels: { app: gc-sweeper }
    spec:
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      containers:
        - name: gc-sweeper
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.gc.image) }}
          imagePullPolicy: {{ include "rrcs.pullPolicy" (dict "root" $ "override" .Values.gc.pullPolicy) }}
          env:
            - { name: REGION_ADDR,  value: {{ include "rrcs.redis.region.hostPort" . | quote }} }
            - { name: GC_HORIZON,   value: {{ .Values.gc.horizon | quote }} }
            - { name: GC_INTERVAL,  value: {{ .Values.gc.interval | quote }} }
          ports:
            - containerPort: 9090
          livenessProbe:
            httpGet: { path: /healthz, port: 9090 }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          readinessProbe:
            httpGet: { path: /healthz, port: 9090 }
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          resources:
            {{- toYaml .Values.resources.gc | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "gc-sweeper") }}
  labels: { app: gc-sweeper }
spec:
  selector: { app: gc-sweeper }
  ports:
    - name: http
      port: 9090
      targetPort: 9090
