<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Redis → Connect — Leader Election (live)</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 14px; background: #0e1117; color: #e6e6e6; }
  h1 { font-size: 16px; margin: 0 0 12px; color: #fff; }
  h2 { font-size: 13px; color: #b8c2cc; margin: 16px 0 6px; font-weight: 500; }
  #status { font-size: 11px; color: #8b95a3; margin-bottom: 8px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .card { background: #161b22; padding: 8px 12px; border-radius: 6px; min-width: 150px; }
  .card .name { font-size: 11px; color: #b8c2cc; text-transform: uppercase; letter-spacing: 0.04em; }
  .card .val { font-size: 22px; margin-top: 4px; }
  #banner { font-size: 15px; font-weight: 600; padding: 10px 14px; border-radius: 6px; margin: 10px 0; }
  .ok { background: #16301c; color: #7ee787; border: 1px solid #2ea043; }
  .overlap { background: #3a2a12; color: #e3b341; border: 1px solid #9e6a03; }
  .gap { background: #3a1417; color: #ff7b72; border: 1px solid #da3633; }
  table { border-collapse: collapse; width: 100%; font-size: 12px; margin-top: 6px; }
  th, td { border-bottom: 1px solid #2a2f3a; padding: 5px 8px; text-align: left; }
  th { background: #161b22; color: #b8c2cc; font-weight: 500; }
  .bar { height: 10px; background: #2ea043; border-radius: 3px; }
  .rising { color: #7ee787; } .idle { color: #6b7280; }
  code { background: #161b22; padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>
<h1>Redis → Connect — best-effort active-gating (leader election)</h1>
<div id="status">connecting…</div>

<div id="banner">awaiting data…</div>

<h2>Cluster</h2>
<div class="stats">
  <div class="card"><div class="name">active streams</div><div class="val" id="c-active">—</div></div>
  <div class="card"><div class="name">pods consuming now</div><div class="val" id="c-consuming">—</div></div>
  <div class="card"><div class="name">overlap pairs (3s)</div><div class="val overlap" id="c-overlap">—</div></div>
  <div class="card"><div class="name">gap pairs (3s)</div><div class="val gap" id="c-gap">—</div></div>
  <div class="card"><div class="name">run epoch</div><div class="val" id="c-epoch">—</div></div>
</div>

<h2>Per-pod consumption (consumed:&lt;pod&gt;)</h2>
<table>
  <thead><tr><th>pod</th><th>consumed</th><th>Δ/tick</th><th></th></tr></thead>
  <tbody id="rows"></tbody>
</table>

<script>
const status = document.getElementById("status");
const banner = document.getElementById("banner");
const rows = document.getElementById("rows");
const set = (id, v) => document.getElementById(id).textContent = v;
let prev = {};   // pod -> last consumed value

function onStats(s) {
  const consumed = s.consumed || {};
  set("c-active", s.active_streams);
  set("c-overlap", s.overlap_pairs);
  set("c-gap", s.gap_pairs);
  set("c-epoch", s.epoch || "—");

  // count pods whose counter rose since the last tick
  let consuming = 0;
  const pods = Object.keys(consumed).sort();
  for (const p of pods) if ((consumed[p] || 0) > (prev[p] || 0)) consuming++;
  set("c-consuming", consuming);

  // banner: gating works AND is best-effort
  if (s.overlap_pairs > 0) { banner.className = "overlap"; banner.textContent = "DUAL-ACTIVE overlap observed — best-effort, NOT fencing (≥2 pods consumed at once)"; }
  else if (s.gap_pairs > 0) { banner.className = "gap"; banner.textContent = "ZERO-ACTIVE gap observed — failover window (no consumer briefly)"; }
  else if (s.single_active) { banner.className = "ok"; banner.textContent = "SINGLE-ACTIVE — exactly one pod consuming (active-gating holding)"; }
  else { banner.className = ""; banner.textContent = "settling…"; }

  // per-pod rows
  const maxVal = Math.max(1, ...pods.map(p => consumed[p] || 0));
  rows.innerHTML = "";
  for (const p of pods) {
    const val = consumed[p] || 0;
    const delta = val - (prev[p] || 0);
    const rising = delta > 0;
    const tr = document.createElement("tr");
    const w = Math.round(100 * val / maxVal);
    tr.innerHTML =
      `<td><code>${p}</code></td>` +
      `<td>${val.toLocaleString()}</td>` +
      `<td class="${rising ? "rising" : "idle"}">${rising ? "+" + delta : "0"}</td>` +
      `<td style="width:40%"><div class="bar" style="width:${w}%;opacity:${rising ? 1 : 0.35}"></div></td>`;
    rows.appendChild(tr);
  }
  prev = consumed;
}

let ws;
function connect() {
  ws = new WebSocket((location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/ws");
  ws.onopen = () => status.textContent = "live · " + new Date().toISOString();
  ws.onclose = () => { status.textContent = "disconnected, retrying…"; setTimeout(connect, 1500); };
  ws.onmessage = (m) => {
    try {
      const e = JSON.parse(m.data);
      if (e.type === "stats") onStats(e);
    } catch {}
  };
}
connect();
</script>
</body>
</html>
