# Prefix prepended to every chart-rendered resource name (see rrcs.name helper).
resourcePrefix: "lab-"

# Which active-standby method to deploy: "A" (Deployment + leader-election controller)
# or "C" (StatefulSet replicas:1). The verify-failover.sh harness toggles this per run.
method: A

images:
  registry: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

redis:
  image: redis:7.4-alpine
  central:
    external:
      enabled: false
      url: ""
      authSecret: ""   # RESERVED — not consumed in v1

connect:
  image: hpdevelop/connect:4.92.0-claudefix
  replicas: 3
  streamID: source_leg
  # Method C only: grace period for the StatefulSet pod to drain on graceful delete.
  terminationGracePeriodSeconds: 30
  # Lease timings — same algorithm as research's 15/10/2, shortened for fast demo failover.
  lease:
    name: connect-elector
    duration: 6s
    renewDeadline: 4s
    retryPeriod: 1s

elector:
  image: redis-rrcs/elector:dev
  pullPolicy: ""

observer:
  image: redis-rrcs/observer:dev
  pullPolicy: ""
  sampleIntervalMs: 100

writer:
  image: redis-rrcs/writer:dev
  pullPolicy: ""
  env:
    STREAM_MAXLEN: "100000"
    WORKERS: "8"
    PIPELINE_DEPTH: "50"
    PAYLOAD_BYTES: "200"
    MAX_RATE: "20000"

dashboard:
  image: redis-rrcs/dashboard:dev
  pullPolicy: ""

scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}

resources:
  redis:
    requests: { cpu: 250m, memory: 128Mi }
    limits:   { cpu: "2",  memory: 512Mi }
  connect:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: "2",  memory: 1Gi }
  elector:
    requests: { cpu: 50m,  memory: 32Mi }
    limits:   { cpu: 500m, memory: 128Mi }
  observer:
    requests: { cpu: 100m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 128Mi }
  writer:
    requests: { cpu: 250m, memory: 64Mi }
    limits:   { cpu: "2",  memory: 256Mi }
  dashboard:
    requests: { cpu: 100m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 128Mi }
