apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-sink") }}
  labels:
    app: connect-sink
spec:
  replicas: {{ .Values.connect.sink.replicas }}
  selector:
    matchLabels:
      app: connect-sink
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" "connect-sink") | nindent 8 }}
    spec:
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      initContainers:
        - name: wait-redis-region
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.redis.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - HP="{{ include "rrcs.redis.region.hostPort" . }}"; HOST="${HP%%:*}"; PORT="${HP##*:}"; until redis-cli -h "$HOST" -p "$PORT" ping | grep -q PONG; do echo waiting redis-region; sleep 1; done
        - name: wait-consumer
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/sh", "-c"]
          # bind:true attaches to a pre-created pull consumer; gate on the
          # consumer (not just the stream) so the input doesn't crashloop on
          # "consumer does not exist for bind mode" before the nats-init Job
          # creates it. consumer info also implies the stream exists.
          args:
            - until nats --server {{ include "rrcs.nats.url" . | quote }} --creds /etc/nats-creds/subscriber/user.creds consumer info {{ .Values.nats.stream.name }} {{ .Values.nats.stream.consumer.durable }} >/dev/null 2>&1; do echo waiting pull consumer; sleep 1; done
          volumeMounts:
            - name: nats-creds
              mountPath: /etc/nats-creds/subscriber
              readOnly: true
      containers:
        - name: connect
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.connect.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args: ["run", "/connect.yaml"]
          ports:
            - containerPort: 4195
          readinessProbe:
            httpGet: { path: /ready, port: 4195 }
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /ping, port: 4195 }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /connect.yaml
              subPath: connect.yaml
            - name: nats-creds
              mountPath: /etc/nats-creds/subscriber
              readOnly: true
          resources:
            {{- toYaml .Values.resources.connect | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "rrcs.name" (dict "root" $ "base" "connect-sink-config") }}
        - name: nats-creds
          secret:
            secretName: {{ include "rrcs.nats.credsSecret.subscriber" . }}
            defaultMode: 0444    # Secret is in a per-pod tmpfs; non-root connect user needs read access
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-sink") }}
  labels:
    app: connect-sink
spec:
  selector:
    app: connect-sink
  ports:
    - name: http
      port: 4195
      targetPort: 4195
