# Consumes JetStream APP_EVENTS, extracts {key, value} from the JSON envelope,
# and writes the value into region Redis via a cache resource (SET semantics).

http:
  address: 0.0.0.0:4195
  enabled: true

input:
  label: jetstream_source
  nats_jetstream:
    urls: [nats://nats:4222]
    subject: app.events.>
    durable: region-writer
    deliver: all
    ack_wait: 30s

pipeline:
  threads: 2
  processors:
    - mapping: |
        # Surface key as metadata, then collapse body to the inner value string.
        meta key = this.key
        root = this.value

output:
  label: redis_sink
  cache:
    target: region_kv
    key: ${! meta("key") }
    max_in_flight: 64

cache_resources:
  - label: region_kv
    redis:
      url: redis://redis-region:6379
      kind: simple

logger:
  level: INFO
  format: json
  add_timestamp: true
