# QoS profile: at-most-once (AMO).
# Differences vs ALO forward:
#   - auto_replay_nacks: false      -> nacked messages are DROPPED, not retried.
#   - Nats-Msg-Id header is omitted -> JetStream dedup window is irrelevant.
#   - commit_period: 50ms           -> XACK flushes more eagerly so a crash
#                                      between deliver and JS publish loses few.
# Net effect: any publish error between Redis and JetStream loses data.

http:
  address: 0.0.0.0:4195
  enabled: true

input:
  label: redis_source
  redis_streams:
    url: redis://redis-central:6379
    kind: simple
    streams: [app.events]
    consumer_group: propagator
    client_id: ${HOSTNAME:rpconnect-source}
    body_key: value
    create_streams: true
    start_from_oldest: false
    commit_period: 50ms
    timeout: 500ms
    limit: 50
    auto_replay_nacks: false

pipeline:
  threads: 2
  processors:
    - mapping: |
        let original_value = content().string()
        root = {
          "key":        meta("key").or("unknown"),
          "value":      $original_value,
          "event_id":   meta("event_id").or("unknown"),
          "pattern":    meta("pattern").or("unknown"),
          "t_send_ms":  meta("t_send_ms").or("0").number()
        }
        meta event_id = meta("event_id").or($original_value.hash("sha256").encode("hex"))
        meta pattern  = meta("pattern").or("unknown")

output:
  label: jetstream_sink
  nats_jetstream:
    urls: [nats://nats:4222]
    subject: app.events.${! meta("pattern") }
    # Deliberately NO Nats-Msg-Id header in AMO so dedup never absorbs anything.
    headers:
      Content-Type: application/json
    max_in_flight: 256

logger:
  level: INFO
  format: json
  add_timestamp: true
