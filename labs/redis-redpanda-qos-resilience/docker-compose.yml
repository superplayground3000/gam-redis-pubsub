name: redis-redpanda-qos-resilience

services:
  redis-central:
    image: redis:7.4-alpine
    container_name: rrqr-redis-central
    command:
      - "redis-server"
      - "--notify-keyspace-events"
      - "KEA"
      - "--appendonly"
      - "no"
      - "--save"
      - ""
    ports:
      - "${REDIS_CENTRAL_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks: [rrqr]

  redis-region:
    image: redis:7.4-alpine
    container_name: rrqr-redis-region
    command:
      - "redis-server"
      - "--notify-keyspace-events"
      - "KEA"
      - "--appendonly"
      - "no"
      - "--save"
      - ""
    ports:
      - "${REDIS_REGION_PORT:-16380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks: [rrqr]

  nats:
    image: nats:2.10-alpine
    container_name: rrqr-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${NATS_CLIENT_PORT:-16222}:4222"
      - "${NATS_MON_PORT:-18322}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks: [rrqr]

  nats-init:
    image: natsio/nats-box:0.14.5
    container_name: rrqr-nats-init
    depends_on:
      nats: { condition: service_healthy }
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if nats --server nats://nats:4222 stream info APP_EVENTS >/dev/null 2>&1; then
          echo "APP_EVENTS already exists"
        else
          nats --server nats://nats:4222 stream add APP_EVENTS \
            --subjects 'app.events.>' \
            --storage file \
            --replicas 1 \
            --retention limits \
            --discard old \
            --max-age 1h \
            --max-bytes=-1 \
            --max-msgs=-1 \
            --max-msg-size=1MB \
            --dupe-window 5m \
            --defaults
        fi
        nats --server nats://nats:4222 stream info APP_EVENTS
    networks: [rrqr]

  connect-source:
    image: docker.redpanda.com/redpandadata/connect:4.45.1
    container_name: rrqr-connect-source
    depends_on:
      redis-central: { condition: service_healthy }
      nats-init: { condition: service_completed_successfully }
    volumes:
      - ./connect/${PROFILE_QOS:-alo}-forward.yaml:/connect.yaml:ro
    command: ["run", "/connect.yaml"]
    ports:
      - "${CONNECT_SRC_PORT:-16195}:4195"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4195/ready"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks: [rrqr]

  connect-sink:
    image: docker.redpanda.com/redpandadata/connect:4.45.1
    container_name: rrqr-connect-sink
    depends_on:
      redis-region: { condition: service_healthy }
      nats-init: { condition: service_completed_successfully }
    volumes:
      - ./connect/${PROFILE_QOS:-alo}-reverse.yaml:/connect.yaml:ro
    command: ["run", "/connect.yaml"]
    ports:
      - "${CONNECT_SINK_PORT:-16196}:4195"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4195/ready"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks: [rrqr]

  writer:
    build: ./writer
    container_name: rrqr-writer
    depends_on:
      redis-central: { condition: service_healthy }
      connect-source: { condition: service_healthy }
    environment:
      REDIS_ADDR: redis-central:6379
      STREAM_KEY: app.events
      WRITE_INTERVAL_MS: "${WRITE_INTERVAL_MS:-1000}"
      HEALTH_ADDR: ":8081"
      PROFILE_QOS: "${PROFILE_QOS:-alo}"
    ports:
      - "${WRITER_METRICS_PORT:-16081}:8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks: [rrqr]

  dashboard:
    build: ./dashboard
    container_name: rrqr-dashboard
    depends_on:
      redis-central: { condition: service_healthy }
      redis-region: { condition: service_healthy }
      connect-sink: { condition: service_healthy }
    environment:
      CENTRAL_ADDR: redis-central:6379
      REGION_ADDR: redis-region:6379
      LISTEN_ADDR: ":8080"
      PROFILE_QOS: "${PROFILE_QOS:-alo}"
    ports:
      - "${DASHBOARD_PORT:-16080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15
    networks: [rrqr]

networks:
  rrqr:
    name: rrqr-net

volumes:
  nats-data:
