apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-sink") }}
  labels: { app: connect-sink }
spec:
  replicas: {{ .Values.connect.sink.replicas }}
  selector:
    matchLabels: { app: connect-sink }
  template:
    metadata:
      labels: { app: connect-sink }
    spec:
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      initContainers:
        - name: wait-redis-region
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.redis.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - HP="{{ include "rrcs.redis.region.hostPort" . }}"; HOST="${HP%%:*}"; PORT="${HP##*:}"; until redis-cli -h "$HOST" -p "$PORT" ping | grep -q PONG; do echo waiting redis-region; sleep 1; done
        - name: wait-stream
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - until nats --server {{ include "rrcs.nats.url" . | quote }} --creds /etc/nats-creds/subscriber/user.creds stream info {{ .Values.nats.stream.name }} >/dev/null 2>&1; do echo waiting stream; sleep 1; done
          volumeMounts:
            - name: nats-creds
              mountPath: /etc/nats-creds/subscriber
              readOnly: true
      containers:
        - name: connect
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.connect.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args: ["run", "/connect.yaml"]
          ports:
            - containerPort: 4195
          readinessProbe:
            httpGet: { path: /ready, port: 4195 }
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /ping, port: 4195 }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /connect.yaml
              subPath: connect.yaml
            - name: nats-creds
              mountPath: /etc/nats-creds/subscriber
              readOnly: true
          resources:
            {{- toYaml .Values.resources.connect | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "rrcs.name" (dict "root" $ "base" "connect-sink-config") }}
        - name: nats-creds
          secret:
            secretName: {{ include "rrcs.nats.credsSecret.subscriber" . }}
            defaultMode: 0444    # Secret is in a per-pod tmpfs; non-root connect user needs read access
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-sink") }}
  labels: { app: connect-sink }
spec:
  selector: { app: connect-sink }
  ports:
    - name: http
      port: 4195
      targetPort: 4195
---
# Headless Service: clusterIP None makes DNS return an A record per READY sink pod
# (not a single VIP). The verifier resolves this name to enumerate every sink pod
# and SUM its per-pod lww_apply counters — a single-VIP scrape would round-robin to
# one pod and undercount. publishNotReadyAddresses stays false so a not-yet-ready
# pod (no traffic, zero counters) cannot dilute the baseline.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-sink-headless") }}
  labels: { app: connect-sink }
spec:
  clusterIP: None
  publishNotReadyAddresses: false
  selector: { app: connect-sink }
  ports:
    - name: http
      port: 4195
      targetPort: 4195
