# kind / local overlay. Images for writer+verifier+dashboard are built locally
# and side-loaded via `kind load docker-image`, so pin THOSE to Never (fail fast
# if not loaded, never attempt a registry pull). Public images stay at the global
# IfNotPresent so a fresh kind node can pull them.
writer:
  pullPolicy: Never
verifier:
  pullPolicy: Never
dashboard:
  pullPolicy: Never
nats:
  persistence:
    mode: emptyDir
