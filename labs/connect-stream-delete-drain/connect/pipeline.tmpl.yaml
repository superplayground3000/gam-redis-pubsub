input:
  nats_jetstream:
    urls: ["nats://nats:4222"]
    stream: CDC
    durable: sink
    bind: true
    # max_ack_pending on a bind:true pull consumer is likely inert: the consumer
    # was created server-side and NATS owns the flow-control bound; Connect's
    # pull(bind) mode respects the server-side config, not a client override.
    # Retained for documentary symmetry with the consumer's configured bound.
    max_ack_pending: __MAX_ACK_PENDING__
pipeline:
  threads: __THREADS__
  processors:
    # Stash i into metadata BEFORE any redis processor: the redis processor
    # REPLACES message content with the Redis reply, so after the SET below
    # `this` is "OK" and i is gone. Every later write reads meta("i").
    - mapping: 'meta i = this.i.string()'
    - sleep:
        duration: __SLEEP_MS__ms
    - redis:
        url: redis://redis:6379
        command: set
        args_mapping: 'root = [ "kv:" + meta("i"), meta("i") ]'
    - redis:
        url: redis://redis:6379
        command: incr
        args_mapping: 'root = [ "applied:" + meta("i") ]'
output:
  reject_errored:
    drop: {}
