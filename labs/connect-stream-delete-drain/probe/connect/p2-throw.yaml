# P2 â€” force a processor error on every message and route the output through
# reject_errored{drop}. If throwâ‡’nack, the message REDELIVERS (num_redelivered
# climbs, ack_wait=3s); if throwâ‡’silent drop-and-ack, it is acked and never
# redelivers (num_pendingâ†’0, num_ack_pendingâ†’0, no redelivery). This is the
# causal hinge for the full lab's apply-fault experiment.
input:
  nats_jetstream:
    urls: ["nats://nats:4222"]
    stream: PROBE
    durable: probe_cons
    bind: true
    fetch_batch_size: 256
pipeline:
  threads: 1
  processors:
    - log:
        level: INFO
        message: PROBE_THROW_SEEN
        fields_mapping: |
          root.num_delivered = meta("nats_num_delivered")
    - mapping: 'root = throw("probe forced error")'
output:
  reject_errored:
    drop: {}
