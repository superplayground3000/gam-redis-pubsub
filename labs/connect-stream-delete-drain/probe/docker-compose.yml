name: cdc-drain-probe

# Minimal probe stack to empirically confirm three build-specific facts about
# hpdevelop/connect:v4.92.0-batch-nats before building the full lab:
#   P1  the JetStream delivery-count metadata key exposed at processor time
#   P2  whether a thrown processor error under reject_errored.drop nacks
#       (→ redelivery) or silently drops-and-acks
#   P3  whether DELETE /streams/{id} drains in-flight (apply+ack) or hard-closes,
#       and whether the HTTP call blocks until drain completes
# NATS runs no-auth (probe-local). Readiness is gated by nats-init (nats-box),
# matching the chart pattern, so no per-service healthcheck shell is needed on
# the distroless nats image.

networks:
  probe: { driver: bridge }

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "18222:8222"      # monitor (host) — consumer/stream JSON via nats-box, this is just for humans
    networks: [probe]

  # One-shot: wait for NATS, create the PROBE stream + a pull consumer with a
  # SHORT ack_wait so redelivery (P2/P3) is observable in seconds.
  nats-init:
    image: natsio/nats-box:0.14.5
    depends_on: [nats]
    networks: [probe]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        until nats --server nats://nats:4222 rtt >/dev/null 2>&1; do echo "waiting nats"; sleep 1; done
        nats --server nats://nats:4222 stream add PROBE \
          --subjects 'probe.>' --storage file --replicas 1 --retention limits \
          --discard old --max-age 1h --max-bytes 64MB --max-msgs=-1 \
          --max-msg-size 1MB --dupe-window 2m --defaults
        nats --server nats://nats:4222 consumer add PROBE probe_cons \
          --pull --filter 'probe.>' --ack explicit --deliver all --replay instant \
          --wait 3s --max-pending 1024 --max-deliver=-1 --defaults
        nats --server nats://nats:4222 consumer info PROBE probe_cons
        echo "nats-init done"

  # Long-running nats-box the probe script execs into to publish and read
  # consumer/stream JSON (persistent, unlike the one-shot nats-init).
  box:
    image: natsio/nats-box:0.14.5
    depends_on:
      nats-init: { condition: service_completed_successfully }
    entrypoint: ["sleep", "infinity"]
    networks: [probe]

  connect:
    image: hpdevelop/connect:v4.92.0-batch-nats
    depends_on:
      nats-init: { condition: service_completed_successfully }
    volumes:
      - ./connect/observability.yaml:/etc/connect/observability.yaml:ro
    command: ["streams", "-o", "/etc/connect/observability.yaml"]
    ports:
      - "14195:4195"      # streams REST API (host) — POST/DELETE/GET /streams/{id}
    networks: [probe]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4195/ready"]
      interval: 2s
      timeout: 2s
      retries: 30
