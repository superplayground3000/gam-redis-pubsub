# kind / local overlay. Images for writer+verifier+dashboard+elector are built
# locally and side-loaded via `kind load docker-image`, so pin THOSE to Never
# (fail fast if not loaded, never attempt a registry pull). Public images stay at
# the global IfNotPresent so a fresh kind node can pull them.
writer:
  pullPolicy: Never
verifier:
  pullPolicy: Never
dashboard:
  pullPolicy: Never
elector:
  pullPolicy: Never
nats:
  persistence:
    mode: emptyDir
# kind runs are fresh installs (both connect legs start new together), so the
# binary-safe encoding is safe to enable from the start — and verify-cdc.sh exercises
# it. For an in-place upgrade of an existing deployment use the two-step procedure in
# values.yaml (roll the sink first, then enable encoding on the source).
connect:
  bodyEncoding: "gzip:base64"
