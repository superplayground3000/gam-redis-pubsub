apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-source") }}
  labels:
    app: connect-source
spec:
  replicas: {{ .Values.connect.source.replicas }}
  selector:
    matchLabels:
      app: connect-source
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" "connect-source") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rrcs.name" (dict "root" $ "base" "connect-source-elector") }}
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      initContainers:
        - name: wait-redis-central
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.redis.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - HP="{{ include "rrcs.redis.central.hostPort" . }}"; HOST="${HP%%:*}"; PORT="${HP##*:}"; until redis-cli -h "$HOST" -p "$PORT" ping | grep -q PONG; do echo waiting redis-central; sleep 1; done
        - name: wait-stream
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - until nats --server {{ include "rrcs.nats.url" . | quote }} --creds /etc/nats-creds/publisher/user.creds stream info {{ .Values.nats.stream.name }} >/dev/null 2>&1; do echo waiting stream; sleep 1; done
          volumeMounts:
            - name: nats-creds
              mountPath: /etc/nats-creds/publisher
              readOnly: true
      containers:
        - name: connect
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.connect.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          # streams mode, empty boot (no stream until the elector POSTs one while leading).
          args:
            - streams
            - -o
            - /etc/connect/observability.yaml
          ports:
            - containerPort: 4195
          readinessProbe:
            # /ready returns 200 even with zero streams — a healthy standby is
            # ready yet not consuming until its elector wins the Lease.
            httpGet:
              path: /ready
              port: 4195
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /ping
              port: 4195
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          volumeMounts:
            - name: observability
              mountPath: /etc/connect/observability.yaml
              subPath: observability.yaml
            - name: nats-creds
              mountPath: /etc/nats-creds/publisher
              readOnly: true
          resources:
            {{- toYaml .Values.resources.connect | nindent 12 }}
        - name: elector
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.images.app) }}
          imagePullPolicy: {{ include "rrcs.pullPolicy" (dict "root" $ "override" .Values.elector.pullPolicy) }}
          command: ["/sbin/tini", "--", "/usr/local/bin/app", "elector"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LEASE_NAME
              value: {{ include "rrcs.name" (dict "root" $ "base" .Values.connect.source.lease.name) | quote }}
            - name: CONNECT_ADDR
              value: "http://localhost:4195"
            - name: STREAM_ID
              value: {{ .Values.connect.source.streamID | quote }}
            - name: PIPELINE_PATH
              value: /etc/elector/pipeline.yaml
            - name: HEALTH_ADDR
              value: ":8090"
            - name: LEASE_DURATION
              value: {{ .Values.connect.source.lease.duration | quote }}
            - name: RENEW_DEADLINE
              value: {{ .Values.connect.source.lease.renewDeadline | quote }}
            - name: RETRY_PERIOD
              value: {{ .Values.connect.source.lease.retryPeriod | quote }}
          ports:
            - containerPort: 8090
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          volumeMounts:
            - name: pipeline
              mountPath: /etc/elector
              readOnly: true
          resources:
            {{- toYaml .Values.resources.elector | nindent 12 }}
      volumes:
        - name: observability
          configMap:
            name: {{ include "rrcs.name" (dict "root" $ "base" "connect-observability") }}
        - name: pipeline
          configMap:
            name: {{ include "rrcs.name" (dict "root" $ "base" "connect-source-pipeline") }}
        - name: nats-creds
          secret:
            secretName: {{ include "rrcs.nats.credsSecret.publisher" . }}
            defaultMode: 0444    # Secret is in a per-pod tmpfs; non-root connect user needs read access
---
# Headless Service: DNS returns ALL connect-source pod IPs (active leader +
# standbys), so per-pod metric scrapes don't get round-robined to an idle pod.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-source") }}
  labels:
    app: connect-source
spec:
  clusterIP: None
  selector:
    app: connect-source
  ports:
    - name: http
      port: 4195
      targetPort: 4195
