apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "dashboard") }}
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" "dashboard") | nindent 8 }}
    spec:
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      containers:
        - name: dashboard
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.images.app) }}
          imagePullPolicy: {{ include "rrcs.pullPolicy" (dict "root" $ "override" .Values.dashboard.pullPolicy) }}
          command: ["/usr/local/bin/app", "dashboard"]
          env:
            - name: CENTRAL_ADDR
              value: {{ include "rrcs.redis.central.hostPort" . | quote }}
            - name: REGION_ADDR
              value: {{ include "rrcs.redis.region.hostPort" . | quote }}
            - name: WRITER_URL
              value: "http://{{ include "rrcs.name" (dict "root" $ "base" "writer") }}:8081"
            - name: CONNECT_SINK_URL
              value: "http://{{ include "rrcs.name" (dict "root" $ "base" "connect-sink") }}:4195"
            - name: LISTEN_ADDR
              value: ":8080"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          resources:
            {{- toYaml .Values.resources.dashboard | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "dashboard") }}
  labels:
    app: dashboard
spec:
  selector:
    app: dashboard
  ports:
    - name: http
      port: 8080
      targetPort: 8080
