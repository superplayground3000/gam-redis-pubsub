{{- if .Values.nats.external.enabled }}
{{- /*
  External-JetStream counterpart of nats-init-job.yaml (which runs only when
  nats.external.enabled=false). Against an EXTERNAL NATS the chart does NOT own
  the stream — but the sink still binds (bind:true) to the durable PULL consumer
  named by nats.stream.consumer.durable, and the nats_jetstream input only
  ATTACHES, never creates. So this Job ensures a USABLE consumer exists:
    - verify the user-owned stream is present (fail-closed if not),
    - create the pull consumer if absent; if it already exists, validate it and
      fail-closed when it is unusable (PUSH) or stale (wrong filter_subject).
      We never mutate or delete the user-owned consumer — but we also never
      report success while leaving one the sink cannot bind to.
  Credential: nats.external.auth.adminSecret if set, else subscriberSecret
  (whose JWT must carry $JS.API.CONSUMER.*CREATE grants — gen-nats-auth.sh mints
  them). create-consumer.sh remains the manual fallback when neither cred can
  create the consumer.
*/}}
{{- $credsSecret := .Values.nats.external.auth.adminSecret | default (include "rrcs.nats.credsSecret.subscriber" .) }}
apiVersion: batch/v1
kind: Job
metadata:
  # Helm HOOK (not a plain manifest). pre-install/pre-upgrade means helm RUNS
  # this Job and BLOCKS on it before creating/upgrading the sink — so a
  # fail-closed exit (missing stream, or an unusable/stale consumer) FAILS THE
  # RELEASE rather than letting a "successful" deploy bring up a sink that can't
  # bind. (A plain Job wouldn't gate anything: helm reports success while it
  # retries and fails in the background.) Safe as a hook only in external mode —
  # the external NATS already exists, so the hook can reach it; the bundled
  # nats-init Job can't be a hook because its NATS is deployed by the same
  # release. Stable name + before-hook-creation: helm deletes the prior run by
  # name on each install/upgrade. No hash needed — hook Jobs aren't part of the
  # release manifest, so the immutable-completed-Job upgrade failure (which the
  # bundled Job's hash guards against) does not apply here. A FAILED run is kept
  # (no hook-failed in the delete policy) for debugging.
  name: {{ include "rrcs.name" (dict "root" $ "base" "nats-init-ext") }}
  labels:
    app: nats-init-ext
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" "nats-init-ext") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      volumes:
        - name: manage-creds
          secret:
            secretName: {{ $credsSecret | quote }}
            defaultMode: 0444    # Secret is in a per-pod tmpfs; non-root nats-box user needs read access
      initContainers:
        - name: wait-nats
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              until nats --server {{ include "rrcs.nats.url" . }} --creds /etc/nats-creds/manage/user.creds rtt >/dev/null 2>&1; do
                echo "waiting for nats..."; sleep 1;
              done
          volumeMounts:
            - name: manage-creds
              mountPath: /etc/nats-creds/manage
              readOnly: true
      containers:
        - name: ensure-consumer
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.natsBox.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              SERVER={{ include "rrcs.nats.url" . | quote }}
              CREDS="/etc/nats-creds/manage/user.creds"
              STREAM={{ .Values.nats.stream.name | quote }}
              CONSUMER={{ .Values.nats.stream.consumer.durable | quote }}
              FILTER='{{ include "rrcs.nats.stream.subjects" . }}'

              # The external stream is USER-OWNED — the chart never creates or
              # reconciles it. Fail clearly if it is missing so the operator
              # provisions it first; the Job's backoffLimit retries until it
              # appears (creating a consumer on a non-existent stream errors).
              if ! nats --server "$SERVER" --creds "$CREDS" stream info "$STREAM" >/dev/null 2>&1; then
                echo "ERROR: external stream '$STREAM' not found on $SERVER (or creds lack \$JS.API.STREAM.INFO.$STREAM)." >&2
                echo "Create the stream first — it must bind subjects '$FILTER'. The chart does NOT reconcile external streams." >&2
                exit 1
              fi

              # Pull consumer: create if absent, otherwise VALIDATE. The external
              # consumer is user-owned, so we never edit or delete it (unlike the
              # bundled nats-init Job, which fully reconciles its own). But we must
              # not report success while leaving a consumer the sink cannot use.
              # We FAIL LOUDLY (and tell the operator to fix it) when an existing
              # consumer is PUSH (bind:true can't attach), has a stale
              # filter_subject (subjectPrefix changed → every event dropped), or
              # weakens at-least-once delivery (ack_policy != explicit, or a
              # max_deliver that differs from values and can drop messages).
              if nats --server "$SERVER" --creds "$CREDS" consumer info "$STREAM" "$CONSUMER" --json >/tmp/cons.json 2>/dev/null; then
                DELIVER=$(jq -r '.config.deliver_subject // ""' /tmp/cons.json)
                CUR_FILTER=$(jq -r '.config.filter_subject // ""' /tmp/cons.json)
                if [ -n "$DELIVER" ]; then
                  echo "ERROR: consumer '$CONSUMER' on '$STREAM' is PUSH (deliver_subject=$DELIVER); the sink uses bind:true and needs a PULL consumer." >&2
                  echo "The chart will not mutate a user-owned consumer. Delete it and re-run this Job (or scripts/create-consumer.sh) to recreate it as pull." >&2
                  exit 1
                fi
                if [ "$CUR_FILTER" != "$FILTER" ]; then
                  echo "ERROR: consumer '$CONSUMER' filter_subject [$CUR_FILTER] != desired [$FILTER] (stale — e.g. nats.stream.subjectPrefix changed). The sink would silently drop every event." >&2
                  echo "The chart will not mutate a user-owned consumer. Delete it and re-run this Job, or realign the consumer's filter manually." >&2
                  exit 1
                fi
                # A PULL consumer with the right filter is necessary but NOT
                # sufficient — these two params decide whether at-least-once
                # delivery actually holds, so they are fail-closed too (still
                # never mutating a user-owned consumer):
                #   ack_policy MUST be "explicit": the sink acks on success and
                #     relies on nack->redelivery; "none" drops on a processing
                #     failure, "all" acks earlier un-acked messages with it.
                #   max_deliver MUST match values: the sink's no-loss posture is
                #     "redeliver until acked" (default -1); a finite cap TERMINATES
                #     a still-failing message -> silent divergence / data loss.
                CUR_ACKPOLICY=$(jq -r '.config.ack_policy // ""' /tmp/cons.json)
                CUR_MAXDELIVER=$(jq -r '.config.max_deliver' /tmp/cons.json)
                if [ "$CUR_ACKPOLICY" != "explicit" ]; then
                  echo "ERROR: consumer '$CONSUMER' ack_policy=[$CUR_ACKPOLICY] but the sink requires 'explicit' — it acks on success and relies on nack->redelivery for at-least-once delivery; any other policy silently loses or mis-acks on a processing failure." >&2
                  echo "The chart will not mutate a user-owned consumer. Delete it and re-run this Job (or scripts/create-consumer.sh), which creates it with --ack explicit." >&2
                  exit 1
                fi
                if [ "$CUR_MAXDELIVER" != {{ .Values.nats.stream.consumer.maxDeliver | quote }} ]; then
                  echo "ERROR: consumer '$CONSUMER' max_deliver=[$CUR_MAXDELIVER] != desired [{{ .Values.nats.stream.consumer.maxDeliver }}] — this changes the redelivery/loss posture the sink expects (default -1 = redeliver until acked; a finite cap drops a still-failing message -> silent data loss)." >&2
                  echo "The chart will not mutate a user-owned consumer. Delete it and re-run this Job, or set nats.stream.consumer.maxDeliver to match if that posture is intentional." >&2
                  exit 1
                fi
                # max_ack_pending is pure throughput, not a delivery guarantee —
                # flag drift as a non-fatal note; never mutate a user-owned consumer.
                CUR_MAXPENDING=$(jq -r '.config.max_ack_pending' /tmp/cons.json)
                if [ "$CUR_MAXPENDING" != {{ .Values.nats.stream.consumer.maxAckPending | quote }} ]; then
                  echo "note: consumer '$CONSUMER' max_ack_pending=$CUR_MAXPENDING vs values {{ .Values.nats.stream.consumer.maxAckPending }} (throughput only; still usable, not changing a user-owned consumer)." >&2
                fi
                echo "pull consumer '$CONSUMER' already exists on '$STREAM' with desired filter [$FILTER], ack_policy=explicit, max_deliver=$CUR_MAXDELIVER; usable"
              else
                echo "creating pull consumer '$CONSUMER' (filter [$FILTER]) on external stream '$STREAM'"
                nats --server "$SERVER" --creds "$CREDS" consumer add "$STREAM" "$CONSUMER" \
                  --pull \
                  --filter "$FILTER" \
                  --ack explicit \
                  --deliver all \
                  --replay instant \
                  --wait {{ .Values.nats.stream.consumer.ackWait }} \
                  --max-pending {{ .Values.nats.stream.consumer.maxAckPending }} \
                  --max-deliver={{ .Values.nats.stream.consumer.maxDeliver }} \
                  --defaults
              fi
              nats --server "$SERVER" --creds "$CREDS" consumer info "$STREAM" "$CONSUMER"
          volumeMounts:
            - name: manage-creds
              mountPath: /etc/nats-creds/manage
              readOnly: true
          resources:
            {{- toYaml .Values.resources.verifier | nindent 12 }}
{{- end }}
