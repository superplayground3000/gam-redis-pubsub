apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "writer") }}
  labels:
    app: writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: writer
  template:
    metadata:
      labels:
        {{- include "rrcs.podLabels" (dict "root" $ "app" "writer") | nindent 8 }}
    spec:
      {{- include "rrcs.imagePullSecrets" . | nindent 6 }}
      {{- include "rrcs.scheduling" . | nindent 6 }}
      initContainers:
        - name: wait-redis-central
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.redis.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - HP="{{ include "rrcs.redis.central.hostPort" . }}"; HOST="${HP%%:*}"; PORT="${HP##*:}"; until redis-cli -h "$HOST" -p "$PORT" ping | grep -q PONG; do echo waiting redis-central; sleep 1; done
        - name: wait-connect-source
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.redis.image) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - until wget -q --spider http://{{ include "rrcs.name" (dict "root" $ "base" "connect-source") }}:4195/ready; do echo waiting connect-source; sleep 1; done
      containers:
        - name: writer
          image: {{ include "rrcs.image" (dict "root" $ "ref" .Values.writer.image) }}
          imagePullPolicy: {{ include "rrcs.pullPolicy" (dict "root" $ "override" .Values.writer.pullPolicy) }}
          env:
            - name: REDIS_ADDR
              value: {{ include "rrcs.redis.central.hostPort" . | quote }}
            - name: STREAM_KEY
              value: "app.events"
            - name: INITIAL_RATE
              value: "0"
            - name: HEALTH_ADDR
              value: ":8081"
            - name: STREAM_MAXLEN
              value: {{ .Values.writer.env.STREAM_MAXLEN | quote }}
            - name: WORKERS
              value: {{ .Values.writer.env.WORKERS | quote }}
            - name: PIPELINE_DEPTH
              value: {{ .Values.writer.env.PIPELINE_DEPTH | quote }}
            - name: KEY_SPACE_SIZE
              value: {{ .Values.writer.env.KEY_SPACE_SIZE | quote }}
            - name: PAYLOAD_BYTES
              value: {{ .Values.writer.env.PAYLOAD_BYTES | quote }}
            - name: MAX_RATE
              value: {{ .Values.writer.env.MAX_RATE | quote }}
            - name: OP_CREATE
              value: {{ .Values.writer.env.OP_CREATE | quote }}
            - name: OP_UPDATE
              value: {{ .Values.writer.env.OP_UPDATE | quote }}
            - name: OP_DELETE
              value: {{ .Values.writer.env.OP_DELETE | quote }}
            - name: OP_RENAME
              value: {{ .Values.writer.env.OP_RENAME | quote }}
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources.writer | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "writer") }}
  labels:
    app: writer
spec:
  selector:
    app: writer
  ports:
    - name: http
      port: 8081
      targetPort: 8081
