{{/*
Streams-mode connect boots empty with this observability config (-o flag): it
carries the http/logger/metrics blocks that a run-mode config would hold at the
top level. The per-leg pipeline ConfigMaps below hold ONLY input/pipeline/output
(a valid streams stream config); the elector sidecar POSTs one to its local
connect via the streams REST API while it holds the Lease.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-observability") }}
  labels:
    app: connect
data:
  observability.yaml: |-
{{ tpl (.Files.Get "files/connect/observability.yaml") . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-source-pipeline") }}
  labels:
    app: connect-source
data:
  pipeline.yaml: |-
{{ tpl (.Files.Get (printf "files/connect/%s-forward.yaml" .Values.profile)) . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rrcs.name" (dict "root" $ "base" "connect-sink-pipeline") }}
  labels:
    app: connect-sink
data:
  pipeline.yaml: |-
{{ tpl (.Files.Get (printf "files/connect/%s-reverse.yaml" .Values.profile)) . | indent 4 }}
