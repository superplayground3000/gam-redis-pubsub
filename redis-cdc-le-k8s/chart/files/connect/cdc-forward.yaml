# cdc-forward.yaml — STREAMS-MODE stream config (input/pipeline/output only).
# Reads central app.events stream; publishes each CDC event to NATS JetStream on
# <subjectPrefix>.<op> with Nats-Msg-Id=event_id for dedup. XADD fields
# (event_id/op/kv_key/old_key/new_key/ts) arrive as metadata; the body arrives as
# content (body_key=body). We republish a self-contained JSON ENVELOPE in the
# PAYLOAD (op/keys/body inside it) so the sink never depends on NATS
# header->metadata mapping.
#
# This file is POSTed verbatim by the source elector once it wins the Lease (the
# http/logger/metrics blocks live in observability.yaml). The streams REST API
# does NOT expand environment variables, so client_id and output.label use the
# __POD__ token, which the elector replaces with the pod name before POSTing
# (Connect accepts hyphenated labels, so the raw pod name is used verbatim).
input:
  label: redis_source
  redis_streams:
    url: {{ include "rrcs.redis.central.url" . }}
    kind: {{ include "rrcs.redis.central.connectKind" . }}
    streams:
      - app.events
    consumer_group: cdc_propagator
    client_id: __POD__
    body_key: body
    create_streams: true
    start_from_oldest: false
    commit_period: 200ms
    timeout: 500ms
    limit: 50
    auto_replay_nacks: true

pipeline:
  threads: 2
  processors:
    - mapping: |
        let body = content().string()
        let eid  = meta("event_id").or($body.hash("sha256").encode("hex"))
        root = {
          "event_id": $eid,
          "op":       meta("op").or("update"),
          "kv_key":   meta("kv_key").or(""),
          "old_key":  meta("old_key").or(""),
          "new_key":  meta("new_key").or(""),
          "ts":       meta("ts").or("0"),
          "body":     $body
        }
        meta op       = meta("op").or("update")     # used for the subject interpolation
        meta event_id = $eid                          # used for the Nats-Msg-Id header

output:
  label: __POD__
  nats_jetstream:
    urls:
      - "{{ include "rrcs.nats.url" . }}"
    auth:
      user_credentials_file: {{ .Values.nats.auth.creds.publisher | quote }}
    subject: {{ include "rrcs.nats.stream.publishSubject" . | quote }}
    headers:
      Nats-Msg-Id: ${! meta("event_id") }
      Content-Type: application/json
    max_in_flight: 256
